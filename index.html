const POETRY = {"modules": [{"name": "必修上册", "module_num": "一", "count": 7, "poems": [{"num": 1, "title": "沁园春·长沙", "author": "毛泽东", "source": "", "body": [[{"t": "独立寒秋，湘江北去，", "b": false, "u": false}, {"t": "橘", "b": true, "u": false}, {"t": "子洲头。  ", "b": false, "u": false}], [{"t": "看万山红遍，层林尽染；漫江碧透，百", "b": false, "u": false}, {"t": "舸", "b": true, "u": false}, {"t": "争流。  ", "b": false, "u": false}], [{"t": "鹰击长空，鱼翔浅底，万类霜天竞自由。  ", "b": false, "u": false}], [{"t": "怅", "b": false, "u": false}, {"t": "寥廓", "b": true, "u": false}, {"t": "，问苍茫大地，谁主沉浮？  ", "b": false, "u": false}], [{"t": "携来百侣曾游，忆往昔峥嵘岁月稠。  ", "b": false, "u": false}], [{"t": "恰同学少年，风华正茂；书生意气，挥斥方", "b": false, "u": false}, {"t": "遒", "b": true, "u": false}, {"t": "。  ", "b": false, "u": false}], [{"t": "指点江山，激扬文字，粪土当年万户侯。  ", "b": false, "u": false}], [{"t": "曾记否，到中流击水，浪", "b": false, "u": false}, {"t": "遏", "b": true, "u": false}, {"t": "飞舟？", "b": false, "u": false}]]}, {"num": 2, "title": "短歌行", "author": "魏·曹操", "source": "", "body": [[{"t": "对酒当歌，人生几何！  ", "b": false, "u": false}], [{"t": "譬如朝露，去日苦多。  ", "b": false, "u": false}], [{"t": "慨当以", "b": false, "u": false}, {"t": "慷", "b": true, "u": false}, {"t": "，忧思难忘。  ", "b": false, "u": false}], [{"t": "何以解忧？唯有杜", "b": false, "u": false}, {"t": "康", "b": true, "u": false}, {"t": "。  ", "b": false, "u": false}], [{"t": "青青子", "b": false, "u": false}, {"t": "衿", "b": true, "u": false}, {"t": "，悠悠我心。  ", "b": false, "u": false}], [{"t": "但为君故，沉吟至今。  ", "b": false, "u": false}], [{"t": "呦呦鹿鸣，食野之苹。  ", "b": false, "u": false}], [{"t": "我有嘉宾，鼓瑟吹笙。  ", "b": false, "u": false}], [{"t": "明明如月，何时可", "b": false, "u": false}, {"t": "掇", "b": true, "u": false}, {"t": "？  ", "b": false, "u": false}], [{"t": "忧从中来，不可断绝。  ", "b": false, "u": false}], [{"t": "越陌度阡，枉用相存。  ", "b": false, "u": false}], [{"t": "契阔谈", "b": false, "u": false}, {"t": "讌", "b": true, "u": false}, {"t": "，心念旧恩。  ", "b": false, "u": false}], [{"t": "月明星稀，乌鹊南飞。  ", "b": false, "u": false}], [{"t": "绕树三匝，何枝可依？  ", "b": false, "u": false}], [{"t": "山不厌高，海不厌深。  ", "b": false, "u": false}], [{"t": "周公吐哺，天下归心。", "b": false, "u": false}]]}, {"num": 3, "title": "梦游天姥吟留别", "author": "唐·李白", "source": "", "body": [[{"t": "海客谈", "b": false, "u": false}, {"t": "瀛洲", "b": true, "u": false}, {"t": "，烟涛微茫信难求；  ", "b": false, "u": false}], [{"t": "越人语天姥，云霞明灭或可睹。  ", "b": false, "u": false}], [{"t": "天姥连天向天横，势拔五岳掩赤城。  ", "b": false, "u": false}], [{"t": "天台四万八千丈，对此欲倒东南倾。  ", "b": false, "u": false}], [{"t": "我欲因之梦吴越，一夜飞度镜湖月。  ", "b": false, "u": false}], [{"t": "湖月照我影，送我至", "b": false, "u": false}, {"t": "剡", "b": true, "u": false}, {"t": "溪。  ", "b": false, "u": false}], [{"t": "谢公宿处今尚在，", "b": false, "u": false}, {"t": "渌", "b": true, "u": false}, {"t": "水荡漾清猿啼。  ", "b": false, "u": false}], [{"t": "脚著谢公", "b": false, "u": false}, {"t": "屐", "b": true, "u": false}, {"t": "，身登青云梯。  ", "b": false, "u": false}], [{"t": "半壁见海日，空中闻天鸡。  ", "b": false, "u": false}], [{"t": "千岩万转路不定，迷花倚石忽已", "b": false, "u": false}, {"t": "暝", "b": true, "u": false}, {"t": "。  ", "b": false, "u": false}], [{"t": "熊咆龙吟殷岩泉，栗深林兮惊层巅。  ", "b": false, "u": false}], [{"t": "云青青兮欲雨，水", "b": false, "u": false}, {"t": "澹澹", "b": true, "u": false}, {"t": "兮生烟。  ", "b": false, "u": false}], [{"t": "列缺霹雳，丘峦崩摧。  ", "b": false, "u": false}], [{"t": "洞天石", "b": false, "u": false}, {"t": "扉", "b": true, "u": false}, {"t": "，", "b": false, "u": false}, {"t": "訇", "b": true, "u": false}, {"t": "然中开。  ", "b": false, "u": false}], [{"t": "青冥浩荡不见底，日月照耀金银台。  ", "b": false, "u": false}], [{"t": "霓为衣兮风为马，云之君兮纷纷而来下。  ", "b": false, "u": false}], [{"t": "虎鼓瑟兮鸾回车，仙之人兮列如麻。  ", "b": false, "u": false}], [{"t": "忽魂悸以魄动，恍惊起而长嗟。  ", "b": false, "u": false}], [{"t": "惟觉时之枕席，失向来之烟霞。  ", "b": false, "u": false}], [{"t": "世间行乐亦如此，古来万事东流水。  ", "b": false, "u": false}], [{"t": "别君去兮何时还？  ", "b": false, "u": false}], [{"t": "且放白鹿青崖间，须行即骑访名山。  ", "b": false, "u": false}], [{"t": "安能摧眉折腰事权贵，使我不得开心颜！", "b": false, "u": false}]]}, {"num": 4, "title": "登高", "author": "唐·杜甫", "source": "", "body": [[{"t": "风急天高猿啸哀，渚清沙白鸟飞回。  ", "b": false, "u": false}], [{"t": "无边落木萧萧下，不尽长江滚滚来。  ", "b": false, "u": false}], [{"t": "万里悲秋常作客，百年多病独登台。  ", "b": false, "u": false}], [{"t": "艰难苦恨繁霜", "b": false, "u": false}, {"t": "鬓", "b": true, "u": false}, {"t": "，潦倒新停浊酒杯。", "b": false, "u": false}]]}, {"num": 5, "title": "念奴娇·赤壁怀古", "author": "宋·苏轼", "source": "", "body": [[{"t": "大江东去，浪淘尽，千古风流人物。  ", "b": false, "u": false}], [{"t": "故垒西边，人道是，三国周郎赤壁。  ", "b": false, "u": false}], [{"t": "乱石穿空，惊涛拍岸，卷起千堆雪。  ", "b": false, "u": false}], [{"t": "江山如画，一时多少豪杰。  ", "b": false, "u": false}], [{"t": "遥想公瑾当年，小乔初嫁了，雄姿英发。  ", "b": false, "u": false}], [{"t": "羽扇纶巾，谈笑间，", "b": false, "u": false}, {"t": "樯橹", "b": true, "u": false}, {"t": "灰飞烟灭。  ", "b": false, "u": false}], [{"t": "故国神游，多情应笑我，早生华发。  ", "b": false, "u": false}], [{"t": "人生如梦，一尊还", "b": false, "u": false}, {"t": "酹", "b": true, "u": false}, {"t": "江月。", "b": false, "u": false}]]}, {"num": 6, "title": "劝学（节选）", "author": "战国·荀子", "source": "《荀子》", "body": [[{"t": "君子曰：学不可以已。  ", "b": false, "u": false}], [{"t": "青，取之于蓝，而青于蓝；冰，水为之，而寒于水。木直中绳，", "b": false, "u": false}, {"t": "𫐓", "b": true, "u": false}, {"t": "以为轮，其曲中规。虽有槁暴，不复挺者，", "b": false, "u": false}, {"t": "𫐓", "b": true, "u": false}, {"t": "使之然也。故木受绳则直，金就砺则利，君子博学而日参省乎己，则知明而行无过矣。  ", "b": false, "u": false}], [{"t": "吾尝终日而思矣，不如须臾之所学也；吾尝", "b": false, "u": false}, {"t": "跂", "b": true, "u": false}, {"t": "而望矣，不如登高之博见也。登高而招，臂非加长也，而见者远；顺风而呼，声非加疾也，而闻者彰。假", "b": false, "u": false}, {"t": "舆", "b": true, "u": false}, {"t": "马者，非利足也，而", "b": false, "u": false}, {"t": "致", "b": true, "u": false}, {"t": "千里；假舟", "b": false, "u": false}, {"t": "楫", "b": true, "u": false}, {"t": "者，非能水也，而绝江河。君子", "b": false, "u": false}, {"t": "生", "b": true, "u": false}, {"t": "非异也，善假于物也。  ", "b": false, "u": false}], [{"t": "积土成山，风雨兴焉；积水成渊，蛟龙生焉；积善成德，而神明自得，圣心备焉。故不积跬步，无以", "b": false, "u": false}, {"t": "至", "b": true, "u": false}, {"t": "千里；不积小流，无以成江海。", "b": false, "u": false}, {"t": "骐骥", "b": true, "u": false}, {"t": "一跃，不能十步；", "b": false, "u": false}, {"t": "驽", "b": true, "u": false}, {"t": "马十驾，功在不舍。", "b": false, "u": false}, {"t": "锲", "b": true, "u": false}, {"t": "而舍之，朽木不折；", "b": false, "u": false}, {"t": "锲", "b": true, "u": false}, {"t": "而不舍，金石可", "b": false, "u": false}, {"t": "镂", "b": true, "u": false}, {"t": "。蚓无爪牙之利，筋骨之强，上食埃土，下饮黄泉，用心一也。蟹六跪而二", "b": false, "u": false}, {"t": "螯", "b": true, "u": false}, {"t": "，非蛇鳝之穴无可寄托者，用心躁也。", "b": false, "u": false}]]}, {"num": 7, "title": "师说（第一段）", "author": "唐·韩愈", "source": "", "body": [[{"t": "古之学者必有师。师者，所以传道", "b": false, "u": false}, {"t": "受", "b": true, "u": false}, {"t": "业解惑也。人非生而知之者，孰能无惑？惑而不从师，其为惑也，终不解矣。生乎吾前，其闻道也固先乎吾，吾从而师之；生乎吾后，其闻道也亦先乎吾，吾从而师之。吾师道也，夫庸知其年之先后生于吾乎？是故无贵无贱，无长无少，道之所存，师之所存也。", "b": false, "u": false}]]}, {"num": 8, "title": "赤壁赋", "author": "宋·苏轼", "source": "", "body": [[{"t": "壬戌之秋，七月既望，苏子与客泛舟游于赤壁之下。清风徐来，水波不兴。举酒属客，诵明月之诗，歌窈窕之章。少焉，月出于东山之上，徘徊于斗牛之间。白露横江，水光接天。纵一苇之所如，凌万顷之茫然。浩浩乎如冯虚御风，而不知其所止；飘飘乎如遗世独立，羽化而登仙。"}], [{"t": "于是饮酒乐甚，扣舷而歌之。歌曰：“桂棹兮兰桨，击空明兮溯流光。渺渺兮予怀，望美人兮天一方。”客有吹洞箫者，倚歌而和之。其声呜呜然，如怨如慕，如泣如诉，余音袅袅，不绝如缕。舞幽壑之潜蛟，泣孤舟之嫠妇。"}], [{"t": "苏子愀然，正襟危坐而问客曰：“何为其然也？”客曰：“'月明星稀，乌鹊南飞'，此非曹孟德之诗乎？西望夏口，东望武昌，山川相缪，郁乎苍苍，此非孟德之困于周郎者乎？方其破荆州，下江陵，顺流而东也，舳舻千里，旌旗蔽空，酾酒临江，横槊赋诗，固一世之雄也，而今安在哉？况吾与子渔樵于江渚之上，侣鱼虾而友麋鹿，驾一叶之扁舟，举匏樽以相属。寄蜉蝣于天地，渺沧海之一粟。哀吾生之须臾，羡长江之无穷。挟飞仙以遨游，抱明月而长终。知不可乎骤得，托遗响于悲风。”"}], [{"t": "苏子曰：“客亦知夫水与月乎？逝者如斯，而未尝往也；盈虚者如彼，而卒莫消长也。盖将自其变者而观之，则天地曾不能以一瞬；自其不变者而观之，则物与我皆无尽也，而又何羡乎！且夫天地之间，物各有主，苟非吾之所有，虽一毫而莫取。惟江上之清风，与山间之明月，耳得之而为声，目遇之而成色，取之无禁，用之不竭，是造物者之无尽藏也，而吾与子之所共适。”"}], [{"t": "客喜而笑，洗盏更酌。肴核既尽，杯盘狼籍。相与枕藉乎舟中，不知东方之既白。"}]], "errorChars": ["戌", "棹", "壑", "嫠", "愀", "缪", "槊", "渚", "麋", "匏", "樽", "粟", "臾", "惟", "籍", "藉"]}]}, {"name": "必修下册", "module_num": "二", "count": 3, "poems": [{"num": 1, "title": "子路、曾皙、冉有、公西华侍坐", "author": "孔子及其弟子", "source": "《论语》", "body": [[{"t": "子路、曾皙、冉有、公西华侍坐。  ", "b": false, "u": false}], [{"t": "子曰：“以吾一日长乎尔，毋吾以也。居则曰：‘不吾知也！’如或知尔，则何以哉？”  ", "b": false, "u": false}], [{"t": "子路率尔而对曰：“千乘之国，摄乎大国之间，加之以师旅，因之以饥馑；由也为之，比及三年，可使有勇，且知方也。”  ", "b": false, "u": false}], [{"t": "夫子哂之。  ", "b": false, "u": false}], [{"t": "“求，尔何如？”  ", "b": false, "u": false}], [{"t": "对曰：“方六七十，如五六十，求也为之，比及三年，可使足民。如其礼乐，以俟君子。”  ", "b": false, "u": false}], [{"t": "“赤，尔何如？”  ", "b": false, "u": false}], [{"t": "对曰：“非曰能之，愿学焉。宗庙之事，如会同，端章甫，愿为小相焉。”  ", "b": false, "u": false}], [{"t": "“点，尔何如？”  ", "b": false, "u": false}], [{"t": "鼓瑟希，", "b": false, "u": false}, {"t": "铿", "b": true, "u": false}, {"t": "尔，舍瑟而作，对曰：“异乎三子者之", "b": false, "u": false}, {"t": "撰", "b": true, "u": false}, {"t": "。”  ", "b": false, "u": false}], [{"t": "子曰：“何伤乎？亦各言其志也。”  ", "b": false, "u": false}], [{"t": "曰：“莫春者，春服既成，冠者五六人，童子六七人，浴乎", "b": false, "u": false}, {"t": "沂", "b": true, "u": false}, {"t": "，风乎舞", "b": false, "u": false}, {"t": "雩", "b": true, "u": false}, {"t": "，咏而归。”  ", "b": false, "u": false}], [{"t": "夫子喟然叹曰：“吾与点也！”  ", "b": false, "u": false}], [{"t": "三子者出，曾皙后。曾皙曰：“夫三子者之言何如？”  ", "b": false, "u": false}], [{"t": "子曰：“亦各言其志也已矣。”  ", "b": false, "u": false}], [{"t": "曰：“夫子何", "b": false, "u": false}, {"t": "哂", "b": true, "u": false}, {"t": "由也？”  ", "b": false, "u": false}], [{"t": "曰：“为国以礼，其言不让，是故", "b": false, "u": false}, {"t": "哂", "b": true, "u": false}, {"t": "之。”  ", "b": false, "u": false}], [{"t": "“唯求则非邦也与？”  ", "b": false, "u": false}], [{"t": "“安见方六七十如五六十而非邦也者？”  ", "b": false, "u": false}], [{"t": "“唯赤则非邦也与？”  ", "b": false, "u": false}], [{"t": "“宗庙会同，非诸侯而何？赤也为之小，孰能为之大？”", "b": false, "u": false}]]}, {"num": 2, "title": "阿房宫赋", "author": "唐·杜牧", "source": "", "body": [[{"t": "六王毕，四海一；蜀山", "b": false, "u": false}, {"t": "兀", "b": true, "u": false}, {"t": "，阿房出。覆压三百余里，隔离天日。骊山北构而西折，直走咸阳。二川溶溶，流入宫墙。五步一楼，十步一阁；廊腰", "b": false, "u": false}, {"t": "缦", "b": true, "u": false}, {"t": "回，檐牙高啄；各抱地势，钩心斗角。盘盘焉，囷囷焉，蜂房水涡，矗不知其几千万落！长桥卧波，未云何龙？复道行空，不", "b": false, "u": false}, {"t": "霁", "b": true, "u": false}, {"t": "何虹？高低", "b": false, "u": false}, {"t": "冥", "b": true, "u": false}, {"t": "迷，不", "b": false, "u": false}, {"t": "知", "b": true, "u": false}, {"t": "西东。歌台暖响，春光融融；舞殿冷袖，风雨凄凄。一日之内，一宫之间，而气候不齐。  ", "b": false, "u": false}], [{"t": "妃嫔媵嫱", "b": true, "u": false}, {"t": "，王子皇孙，辞楼下殿，辇来于秦，朝歌夜弦，为秦宫人。明星荧荧，开妆镜也；绿云扰扰，梳晓", "b": false, "u": false}, {"t": "鬟", "b": true, "u": false}, {"t": "也；渭流涨腻，弃脂水也；烟斜雾横，焚椒兰也。雷霆乍惊，宫车过也；辘辘远听，", "b": false, "u": false}, {"t": "杳", "b": true, "u": false}, {"t": "不", "b": false, "u": false}, {"t": "知", "b": true, "u": false}, {"t": "其所之也。一肌一容，尽态极妍，", "b": false, "u": false}, {"t": "缦", "b": true, "u": false}, {"t": "立远视，而望幸焉；有不得见者，三十六年。  ", "b": false, "u": false}], [{"t": "燕赵之收藏，韩魏之经营，齐楚之精英，几世几年，", "b": false, "u": false}, {"t": "剽", "b": true, "u": false}, {"t": "掠其人，倚叠如山。一旦不能有，输来其间。", "b": false, "u": false}, {"t": "鼎铛", "b": true, "u": false}, {"t": "玉石，金块珠", "b": false, "u": false}, {"t": "砾", "b": true, "u": false}, {"t": "，弃", "b": false, "u": false}, {"t": "掷逦迤", "b": true, "u": false}, {"t": "，秦人视之，亦不甚惜。  ", "b": false, "u": false}], [{"t": "嗟乎！一人之心，千万人之心也。秦爱纷奢，人亦念其家。奈何取之尽", "b": false, "u": false}, {"t": "锱铢", "b": true, "u": false}, {"t": "，用之如泥沙？使负栋之柱，多于南亩之农夫；架梁之", "b": false, "u": false}, {"t": "椽", "b": true, "u": false}, {"t": "，多于机上之工女；钉头", "b": false, "u": false}, {"t": "磷磷", "b": true, "u": false}, {"t": "，多于在", "b": false, "u": false}, {"t": "庾", "b": true, "u": false}, {"t": "之粟粒；瓦缝参差，多于周身之", "b": false, "u": false}, {"t": "帛", "b": true, "u": false}, {"t": "缕；直栏横", "b": false, "u": false}, {"t": "槛", "b": true, "u": false}, {"t": "，多于九土之城郭；管弦", "b": false, "u": false}, {"t": "呕哑", "b": true, "u": false}, {"t": "，多于市人之言语。使天下之人，不敢言而敢怒；独夫之心，日益骄固。", "b": false, "u": false}, {"t": "戍", "b": true, "u": false}, {"t": "卒叫，函谷举；楚人一炬，可怜焦土。  ", "b": false, "u": false}], [{"t": "呜呼！灭六国者，六国也，非秦也。族秦者，秦也，非天下也。嗟乎！使六国各爱其人，则足以拒秦；使秦复爱六国之人，则递三世可至万世而为君，谁得而族灭也？秦人不暇自哀，而后人哀之；后人哀之而不鉴之，亦使后人而复哀后人也。", "b": false, "u": false}]]}, {"num": 3, "title": "六国论", "author": "宋·苏洵", "source": "", "body": [[{"t": "六国破灭，非兵不利，战不善，弊在赂秦。赂秦而力亏，破灭之道也。或曰：六国互丧，率赂秦耶？曰：不赂者以赂者丧，盖失强援，不能独完。故曰：弊在赂秦也。  ", "b": false, "u": false}], [{"t": "秦以攻取之外，小则获邑，大则得城。较秦之所得，与战胜而得者，其实百倍；诸侯之所亡，与战败而亡者，其实亦百倍。则秦之所大欲，诸侯之所大患，固不在战矣。思", "b": false, "u": false}, {"t": "厥", "b": true, "u": false}, {"t": "先祖父，暴霜露，斩荆棘，以有尺寸之地。子孙视之不甚惜，举以予人，如弃草", "b": false, "u": false}, {"t": "芥", "b": true, "u": false}, {"t": "。今日割五城，明日割十城，然后得一夕安寝。起视四境，而秦兵又至矣。然则诸侯之地有限，暴秦之欲无厌，奉之", "b": false, "u": false}, {"t": "弥", "b": true, "u": false}, {"t": "繁，侵之愈急。故不战而强弱胜负已判矣。至于颠覆，理固宜然。古人云：“以地事秦，犹抱薪救火，薪不尽，火不灭。”此言得之。  ", "b": false, "u": false}], [{"t": "齐人未尝赂秦，终继五国迁灭，何哉？与", "b": false, "u": false}, {"t": "嬴", "b": true, "u": false}, {"t": "而不助五国也。五国既丧，齐亦不免矣。燕赵之君，始有远略，能守其土，义不赂秦。是故燕虽小国而后亡，斯用兵之效也。至丹以荆卿为计，始速祸焉。赵尝五战于秦，二败而三胜。后秦击赵者再，李牧连却之。", "b": false, "u": false}, {"t": "洎", "b": true, "u": false}, {"t": "牧以", "b": false, "u": false}, {"t": "谗", "b": true, "u": false}, {"t": "诛，邯郸为郡，惜其用武而不终也。且燕赵处秦革灭殆尽之际，可谓智力孤危，战败而亡，诚不得已。向使三国各爱其地，齐人勿附于秦，刺客不行，良将犹在，则胜负之数，存亡之理，当与秦相较，或未易量。  ", "b": false, "u": false}], [{"t": "呜呼！以赂秦之地，封天下之谋臣，以事秦之心，礼天下之奇才，并力西向，则吾恐秦人食之不得下咽也。悲夫！有如此之势，而为秦人积威之所劫，日削月割，以趋于亡。为国者无使为积威之所劫哉！  ", "b": false, "u": false}], [{"t": "夫六国与秦皆诸侯，其势弱于秦，而犹有可以不赂而胜之之势。苟以天下之大，下而从六国破亡之故事，是又在六国下矣。", "b": false, "u": false}]]}]}, {"name": "选择性必修上册", "module_num": "三", "count": 3, "poems": [{"num": 1, "title": "论语", "author": "孔子及其弟子", "source": "《论语》", "body": [[{"t": "子曰：“君子食无求饱，居无求安，敏于事而慎于言，就有道而正焉，可谓好学也已。”（《学而》）", "b": false, "u": false}], [{"t": "子曰：“人而不仁，如礼何？人而不仁，如乐何？”（《八", "b": false, "u": false}, {"t": "佾", "b": true, "u": false}, {"t": "》）", "b": false, "u": false}], [{"t": "子曰：“朝闻道，夕死可矣。”（《里仁》）", "b": false, "u": false}], [{"t": "子曰：“君子喻于义，小人喻于利。”（《里仁》）", "b": false, "u": false}], [{"t": "子曰：“见贤思齐焉，见不贤而内自省也。”（《里仁》）", "b": false, "u": false}], [{"t": "子曰：“质胜文则野，文胜质则史。文质彬彬，然后君子。”（《", "b": false, "u": false}, {"t": "雍", "b": true, "u": false}, {"t": "也》）", "b": false, "u": false}], [{"t": "子曰：“知者不惑，仁者不忧，勇者不惧。”（《子罕》）", "b": false, "u": false}], [{"t": "曾子曰：”士不可以不弘毅，任重而道远。仁以为己任，不亦重乎？死而后己，不亦远乎?”（《泰伯》）", "b": false, "u": false}], [{"t": "子曰：“譬如为山，未成一篑，止，吾止也。譬如平地，虽覆一篑，进，吾往也。”（《子", "b": false, "u": false}], [{"t": "罕》）", "b": false, "u": false}], [{"t": "颜渊问仁。子曰：“克已复礼为仁。一日克己复礼，天下归仁焉。为仁由己，而由人乎哉？”颜渊曰：“请问其目。子曰：”非礼勿视，非礼勿听，非礼勿言，非礼勿动。“颜渊曰：”回虽不敏，请事斯语矣。”（《颜渊》）", "b": false, "u": false}], [{"t": "子贡问曰：“有一言而可以终身行之者乎？“子日：”其’恕‘乎！己所不欲，勿施于人。“（《卫灵公》）", "b": false, "u": false}], [{"t": "子曰：”小子何莫学夫《诗》？《诗》可以兴，可以观，可以群，可以怨。迩之事父，远之事君。多识于鸟兽草木之名。”（《阳货》）", "b": false, "u": false}]]}, {"num": 2, "title": "大学之道", "author": "西汉·戴圣", "source": "《礼记》", "body": [[{"t": "大学之道，在明明德，在亲民，在止于至善。知止而后有定，定而后能静，静而后能安，安而后能虑，虑而后能得。物有本末，事有终始。知所先后，则近道矣。  ", "b": false, "u": false}], [{"t": "古之欲明明德于天下者，先治其国；欲治其国者，先齐其家；欲齐其家者，先修其身；欲修其身者，先正其心；欲正其心者，先诚其意；欲诚其意者，先致其知；致知在格物。  ", "b": false, "u": false}], [{"t": "物格而后知至，知至而后意诚，意诚而后心正，心正而后身修，身修而后家齐，家齐而后国治，国治而后天下平。自天子以至于庶人，", "b": false, "u": false}, {"t": "壹", "b": true, "u": false}, {"t": "是皆以修身为本。  ", "b": false, "u": false}]]}, {"num": 3, "title": "老子", "author": "", "source": "", "body": [[{"t": "老子", "b": false, "u": false}], [{"t": "《道德经》", "b": false, "u": false}], [{"t": "第十一章", "b": true, "u": false}, {"t": "  ", "b": false, "u": false}], [{"t": "三十辐共一", "b": false, "u": false}, {"t": "毂", "b": true, "u": false}, {"t": "，当其无，有车之用。", "b": false, "u": false}, {"t": "埏埴", "b": true, "u": false}, {"t": "以为器，当其无，有器之用。凿户", "b": false, "u": false}, {"t": "牖", "b": true, "u": false}, {"t": "以为室，当其无，有室之用。故有之以为利，无之以为用。", "b": false, "u": false}], [{"t": "第二十四章", "b": true, "u": false}, {"t": "  ", "b": false, "u": false}], [{"t": "企者不立，跨者不行，自见者不明，自是者不彰，自伐者无功，自矜者不长。其在道也，曰余食", "b": false, "u": false}, {"t": "赘", "b": true, "u": false}, {"t": "行。物或恶之，故有道者不处。", "b": false, "u": false}], [{"t": "第三十三章", "b": true, "u": false}, {"t": "  ", "b": false, "u": false}], [{"t": "知人者智，自知者明。胜人者有力，自胜者强。知足者富，强行者有志。不失其所者久，死而不亡者寿。", "b": false, "u": false}], [{"t": "第六十四章", "b": true, "u": false}, {"t": "  ", "b": false, "u": false}], [{"t": "其安易持，其未兆易谋，其脆易", "b": false, "u": false}, {"t": "泮", "b": true, "u": false}, {"t": "，其微易散。为之于未有，治之于未乱。合抱之木，生于毫末；九层之台，起于累土；千里之行，始于足下。为者败之，执者失之。是以圣人无为，故无败；无执，故无失。民之从事，常于几成而败之。慎终如始，则无败事。是以圣人欲不欲，不贵难得之货；学不学，复众人之所过。以辅万物之自然而不敢为。", "b": false, "u": false}]]}]}, {"name": "选择性必修中册", "module_num": "四", "count": 2, "poems": [{"num": 1, "title": "屈原列传", "author": "西汉·司马迁", "source": "《史记》", "body": [[{"t": "屈平疾王听之不聪也，", "b": false, "u": false}, {"t": "谗谄", "b": true, "u": false}, {"t": "之蔽明也，邪曲之害公也，方正之不容也，故忧愁幽思而作《离骚》。“离骚”者，犹离忧也。夫天者，人之始也；父母者，人之本也。人穷则反本，故劳苦倦极，未尝不呼天也；疾痛惨", "b": false, "u": false}, {"t": "怛", "b": true, "u": false}, {"t": "，未尝不呼父母也。屈平正道直行，竭忠尽智以事其君，", "b": false, "u": false}, {"t": "谗", "b": true, "u": false}, {"t": "人间之，可谓穷矣。信而见疑，忠而被谤，能无怨乎？屈平之作《离骚》，盖自怨生也。《国风》好色而不淫，《小雅》怨诽而不乱。若《离骚》者，可谓兼之矣。上称帝", "b": false, "u": false}, {"t": "喾", "b": true, "u": false}, {"t": "，下道齐桓，中述汤、武，以刺世事。明道德之广崇，治乱之条贯，", "b": false, "u": false}, {"t": "靡", "b": true, "u": false}, {"t": "不毕见。其文约，其辞微，其志洁，其行廉。其称文小而其指极大，举类迩而见义远。其志洁，故其称物芳；其行廉，故死而不容。自疏", "b": false, "u": false}, {"t": "濯淖", "b": true, "u": false}, {"t": "污泥之中，蝉蜕于浊秽，以浮游尘埃之外，不获世之滋垢，", "b": false, "u": false}, {"t": "皭", "b": true, "u": false}, {"t": "然泥而不", "b": false, "u": false}, {"t": "滓", "b": true, "u": false}, {"t": "者也。推此志也，虽与日月争光可也。", "b": false, "u": false}]]}, {"num": 2, "title": "过秦论", "author": "汉·贾谊", "source": "", "body": [[{"t": "秦孝公据", "b": false, "u": false}, {"t": "崤", "b": true, "u": false}, {"t": "函之固，拥雍州之地，君臣固守以窥周室，有席卷天下，包举宇内，囊括四海之意，并吞八荒之心。当是时也，商君佐之，内立法度，务耕织，修守战之具；外连", "b": false, "u": false}, {"t": "衡", "b": true, "u": false}, {"t": "而斗诸侯。于是秦人拱手而取西河之外。  ", "b": false, "u": false}], [{"t": "孝公既", "b": false, "u": false}, {"t": "没", "b": true, "u": false}, {"t": "，惠文、武、昭襄蒙故业，因遗策，南取汉中，西举巴、蜀，东割", "b": false, "u": false}, {"t": "膏腴", "b": true, "u": false}, {"t": "之地，北收要害之郡。诸侯恐惧，会盟而谋弱秦，不爱珍器重宝肥饶之地，以致天下之士，", "b": false, "u": false}, {"t": "合从", "b": true, "u": false}, {"t": "缔交，相与为一。当此之时，齐有孟尝，赵有平原，楚有春申，魏有信陵。此四君者，皆明智而忠信，宽厚而爱人，尊贤而重士，约从离", "b": false, "u": false}, {"t": "衡", "b": true, "u": false}, {"t": "，", "b": false, "u": false}, {"t": "兼韩、魏、燕、楚、齐、赵、宋、卫、中山之众。于是六国之士，有宁越、徐尚、苏秦、杜赫之属为之谋，齐明、周最、陈轸、召滑、楼缓、翟", "b": false, "u": true}, {"t": "景", "b": true, "u": true}, {"t": "、苏厉、乐毅之徒通其意，吴起、孙膑、带佗、倪良、王廖、田忌、廉颇、赵奢之伦制其兵。", "b": false, "u": true}, {"t": "尝以十倍之地，百万之众，叩关而攻秦。秦人开关延敌，九国之师，", "b": false, "u": false}, {"t": "逡巡", "b": true, "u": false}, {"t": "而不敢进。秦无亡矢遗", "b": false, "u": false}, {"t": "镞", "b": true, "u": false}, {"t": "之费，而天下诸侯已困矣。于是从散约败，争割地而", "b": false, "u": false}, {"t": "赂", "b": true, "u": false}, {"t": "秦。秦有余力而制其弊，追亡逐北，伏尸百万，流血漂", "b": false, "u": false}, {"t": "橹", "b": true, "u": false}, {"t": "；因利乘便，宰割天下，分裂山河。强国请服，弱国入朝。  ", "b": false, "u": false}], [{"t": "延及孝文王、庄襄王，享国之日浅，国家无事。  ", "b": false, "u": false}], [{"t": "及至始皇，奋六世之余烈，振长策而御宇内，吞二周而亡诸侯，履至尊而制六合，执敲扑而鞭笞天下，威振四海。南取百越之地，以为桂林、象郡；百越之君，俯首系颈，委命下吏。乃使蒙恬北筑长城而守藩篱，却匈奴七百余里；胡人不敢南下而牧马，士不敢弯弓而报怨。于是废先王之道，焚百家之言，以愚黔首；", "b": false, "u": false}, {"t": "隳", "b": true, "u": false}, {"t": "名城，杀豪杰；收天下之兵，聚之咸阳，", "b": false, "u": false}, {"t": "销锋镝", "b": true, "u": false}, {"t": "，铸以为金人十二，以弱天下之民。然后践华为城，因河为池，据亿丈之城，临不测之渊，以为固。良将劲弩守要害之处，信臣精卒陈利兵而谁何。天下已定，始皇之心，自以为关中之固，金城千里，子孙帝王万世之业也。  ", "b": false, "u": false}], [{"t": "始皇既没，余威震于殊俗。然陈涉", "b": false, "u": false}, {"t": "瓮牖", "b": true, "u": false}, {"t": "绳枢之子，", "b": false, "u": false}, {"t": "氓", "b": true, "u": false}, {"t": "隶之人，而迁徙之徒也；才能不及中人，非有仲尼、墨翟之贤，陶朱、猗顿之富；蹑足行伍之间，而", "b": false, "u": false}, {"t": "倔", "b": true, "u": false}, {"t": "起阡陌之中，率疲弊之卒，将数百之众，转而攻秦；斩木为兵，揭竿为旗，天下云集响应，", "b": false, "u": false}, {"t": "赢", "b": true, "u": false}, {"t": "粮而景从。山东豪俊遂并起而亡秦族矣。  ", "b": false, "u": false}], [{"t": "且夫天下非小弱也，", "b": false, "u": false}, {"t": "雍", "b": true, "u": false}, {"t": "州之地，", "b": false, "u": false}, {"t": "崤", "b": true, "u": false}, {"t": "函之固，自若也。陈涉之位，非尊于齐、楚、燕、赵、韩、魏、宋、卫、中山之君也；", "b": false, "u": false}, {"t": "锄耰棘矜", "b": true, "u": false}, {"t": "，非", "b": false, "u": false}, {"t": "铦", "b": true, "u": false}, {"t": "于", "b": false, "u": false}, {"t": "钩戟", "b": true, "u": false}, {"t": "长", "b": false, "u": false}, {"t": "铩", "b": true, "u": false}, {"t": "也；", "b": false, "u": false}, {"t": "谪戍", "b": true, "u": false}, {"t": "之众，非抗于九国之师也；深谋远虑，行军用兵之道，非及向时之士也。然而成败异变，功业相反，何也？试使山东之国与陈涉度长", "b": false, "u": false}, {"t": "絜", "b": true, "u": false}, {"t": "大，比权量力，则不可同年而语矣。然秦以区区之地，致万乘之势，序八州而朝同列，百有余年矣；然后以六合为家，崤函为宫；一夫作难而七庙", "b": false, "u": false}, {"t": "隳", "b": true, "u": false}, {"t": "，身死人手，为天下笑者，何也？仁义不施而攻守之势异也。", "b": false, "u": false}]]}]}, {"name": "选择性必修下册", "module_num": "五", "count": 5, "poems": [{"num": 1, "title": "离骚", "author": "楚·屈原", "source": "《楚辞》", "body": [[{"t": "长太息以掩涕兮，哀民生之多艰。  ", "b": false, "u": false}], [{"t": "余虽好修", "b": false, "u": false}, {"t": "姱", "b": true, "u": false}, {"t": "以", "b": false, "u": false}, {"t": "𩉜羁", "b": true, "u": false}, {"t": "兮，", "b": false, "u": false}, {"t": "謇", "b": true, "u": false}, {"t": "朝", "b": false, "u": false}, {"t": "谇", "b": true, "u": false}, {"t": "而夕替。  ", "b": false, "u": false}], [{"t": "既替余以", "b": false, "u": false}, {"t": "蕙𬙋", "b": true, "u": false}, {"t": "兮，又申之以", "b": false, "u": false}, {"t": "揽茝", "b": true, "u": false}, {"t": "。  ", "b": false, "u": false}], [{"t": "亦余心之所善兮，虽九死其犹未悔。  ", "b": false, "u": false}], [{"t": "怨灵修之浩荡兮，终不察夫民心。  ", "b": false, "u": false}], [{"t": "众女嫉余之", "b": false, "u": false}, {"t": "蛾眉", "b": true, "u": false}, {"t": "兮，", "b": false, "u": false}, {"t": "谣诼", "b": true, "u": false}, {"t": "谓余以善淫。  ", "b": false, "u": false}], [{"t": "固时俗之工巧兮，偭规矩而改错。  ", "b": false, "u": false}], [{"t": "背绳墨以追曲兮，竞周容以为度。  ", "b": false, "u": false}], [{"t": "忳郁邑", "b": true, "u": false}, {"t": "余", "b": false, "u": false}, {"t": "侘傺", "b": true, "u": false}, {"t": "兮，吾独穷困乎此时也。  ", "b": false, "u": false}], [{"t": "宁溘死以流亡兮，余不忍为此态也！  ", "b": false, "u": false}], [{"t": "鸷鸟之不群兮，自前世而固然。  ", "b": false, "u": false}], [{"t": "何方", "b": false, "u": false}, {"t": "圜", "b": true, "u": false}, {"t": "之能周兮？夫孰异道而相安？  ", "b": false, "u": false}], [{"t": "屈心而抑志兮，忍尤而", "b": false, "u": false}, {"t": "攘诟", "b": true, "u": false}, {"t": "。  ", "b": false, "u": false}], [{"t": "伏清白以死直兮，固前圣之所厚。", "b": false, "u": false}]]}, {"num": 2, "title": "蜀道难", "author": "唐·李白", "source": "", "body": [[{"t": "噫吁嚱", "b": true, "u": false}, {"t": "，危乎高哉！蜀道之难，难于上青天！  ", "b": false, "u": false}], [{"t": "蚕丛及鱼凫，开国何茫然！  ", "b": false, "u": false}], [{"t": "尔来四万八千岁，不与秦塞通人烟。  ", "b": false, "u": false}], [{"t": "西当太白有鸟道，可以横绝峨眉巅。  ", "b": false, "u": false}], [{"t": "地崩山摧壮士死，然后天梯石栈相钩连。  ", "b": false, "u": false}], [{"t": "上有六龙回日之高标，下有冲波逆折之回川。  ", "b": false, "u": false}], [{"t": "黄鹤之飞尚不得过，猿", "b": false, "u": false}, {"t": "猱", "b": true, "u": false}, {"t": "欲度愁攀援。  ", "b": false, "u": false}], [{"t": "青泥何盘盘，百步九折", "b": false, "u": false}, {"t": "萦", "b": true, "u": false}, {"t": "岩峦。  ", "b": false, "u": false}], [{"t": "扪参历井仰胁息，以手抚膺坐长叹。  ", "b": false, "u": false}], [{"t": "问君西游何时还？畏途", "b": false, "u": false}, {"t": "巉", "b": true, "u": false}, {"t": "岩不可攀。  ", "b": false, "u": false}], [{"t": "但见悲鸟号古木，雄飞雌从绕林间。  ", "b": false, "u": false}], [{"t": "又闻子规啼夜月，愁空山。  ", "b": false, "u": false}], [{"t": "蜀道之难，难于上青天，使人听此凋朱颜！  ", "b": false, "u": false}], [{"t": "连峰去天不盈尺，枯松倒挂倚绝壁。  ", "b": false, "u": false}], [{"t": "飞湍瀑流争喧豗，砯崖转石万壑雷。  ", "b": false, "u": false}], [{"t": "其险也如此，嗟尔远道之人胡为乎来哉！  ", "b": false, "u": false}], [{"t": "剑阁峥嵘而", "b": false, "u": false}, {"t": "崔嵬", "b": true, "u": false}, {"t": "，一夫当关，万夫莫开。  ", "b": false, "u": false}], [{"t": "所守或匪亲，化为狼与豺。  ", "b": false, "u": false}], [{"t": "朝避猛虎，夕避长蛇；磨牙吮血，杀人如麻。  ", "b": false, "u": false}], [{"t": "锦城虽云乐，不如早还家。  ", "b": false, "u": false}], [{"t": "蜀道之难，难于上青天，侧身西望长咨嗟！", "b": false, "u": false}]]}, {"num": 3, "title": "蜀相", "author": "唐·杜甫", "source": "", "body": [[{"t": "丞相祠堂何处寻？锦官城外柏森森。  ", "b": false, "u": false}], [{"t": "映阶碧草自春色，隔叶黄鹂空好音。  ", "b": false, "u": false}], [{"t": "三顾频烦天下计，两朝开济老臣心。  ", "b": false, "u": false}], [{"t": "出师未捷身先死，长使英雄泪满襟。", "b": false, "u": false}]]}, {"num": 4, "title": "陈情表", "author": "西晋·李密", "source": "", "body": [[{"t": "臣密言：臣以险衅，夙遭闵凶。生孩六月，慈父见背；行年四岁，舅夺母志。祖母刘", "b": false, "u": false}, {"t": "愍", "b": true, "u": false}, {"t": "臣孤弱，躬亲抚养。臣少多疾病，九岁不行，零丁孤苦，至于成立。既无伯叔，终鲜兄弟，门衰祚薄，晚有儿息。外无期功强近之亲，内无应门五尺之僮，茕茕孑立，形影相吊。而刘夙婴疾病，常在床", "b": false, "u": false}, {"t": "蓐", "b": true, "u": false}, {"t": "，臣侍汤药，未曾废离。  ", "b": false, "u": false}], [{"t": "逮奉圣朝，沐浴清化。前太守臣逵，察臣孝廉；后刺史臣荣，举臣秀才。臣以供养无主，辞不赴命。诏书特下，拜臣郎中，寻蒙国恩，除臣洗马。", "b": false, "u": false}, {"t": "猥", "b": true, "u": false}, {"t": "以微贱，当侍东宫，非臣陨首所能上报。臣具以表闻，辞不就职。诏书切峻，责臣", "b": false, "u": false}, {"t": "逋", "b": true, "u": false}, {"t": "慢；郡县逼迫，催臣上道；州司临门，急于星火。臣欲奉诏奔驰，则刘病日笃；欲苟顺私情，则告诉不许：臣之进退，实为狼狈。  ", "b": false, "u": false}], [{"t": "伏惟圣朝以孝治天下，凡在故老，犹蒙矜育，况臣孤苦，特为尤甚。且臣少仕伪朝，历职郎署，本图宦达，不矜名节。今臣亡国贱俘，至微至陋，过蒙拔擢，宠命优渥，岂敢盘桓，有所希冀！但以刘日薄西山，气息奄奄，人命危浅，朝不虑夕。臣无祖母，无以至今日；祖母无臣，无以终余年。母孙二人，更相为命，是以区区不能废远。  ", "b": false, "u": false}], [{"t": "臣密今年四十有四，祖母今年九十有六，是臣尽节于陛下之日长，报养刘之日短也。乌鸟私情，愿乞终养。臣之辛苦，非独蜀之人士及二州牧伯所见明知，皇天后土，实所共鉴。愿陛下矜愍愚诚，听臣微志，庶刘侥幸，保卒余年。臣生当陨首，死当结草。臣不胜犬马怖惧之情，谨拜表以闻。", "b": false, "u": false}]]}, {"num": 5, "title": "兰亭集序", "author": "东晋·王羲之", "source": "", "body": [[{"t": "永和九年，岁在癸丑，暮春之初，会于会", "b": false, "u": false}, {"t": "稽", "b": true, "u": false}, {"t": "山阴之兰亭，修禊事也。群贤毕至，少长咸集。此地有崇山峻岭，茂林修竹，又有清流激湍，映带左右，引以为流觞曲水，列坐其次。虽无丝竹管弦之盛，一觞一咏，亦足以畅叙幽情。  ", "b": false, "u": false}], [{"t": "是日也，天朗气清，惠风和畅。仰观宇宙之大，俯察品类之盛，所以游目", "b": false, "u": false}, {"t": "骋", "b": true, "u": false}, {"t": "怀，足以极视听之娱，信可乐也。  ", "b": false, "u": false}], [{"t": "夫人之相与，俯仰一世。或取诸怀抱，悟言一室之内；或因寄所托，放浪形骸之外。虽取舍万殊，静躁不同，当其欣于所遇，暂得于己，快然自足，不知老之将至；及其所之既倦，情随事迁，感慨系之矣。向之所欣，俯仰之间，已为陈迹，犹不能不以之兴怀，况修短随化，终期于尽！古人云：“死生亦大矣。”岂不痛哉！  ", "b": false, "u": false}], [{"t": "每览昔人兴感之由，若合一契，未尝不临文嗟悼，不能喻之于怀。固知一死生为虚诞，齐", "b": false, "u": false}, {"t": "彭殇", "b": true, "u": false}, {"t": "为妄作。后之视今，亦犹今之视昔，悲夫！故列叙时人，录其所述，虽世殊事异，所以兴怀，其致一也。后之览者，亦将有感于斯文。", "b": false, "u": false}]]}]}]};
const DICTATION = [{"title": "沁园春·长沙", "module": "## 一、必修上册（7篇）", "questions": [{"id": 1, "question": "在《沁园春·长沙》中，面对大千世界，词人发出慨叹，表现词人雄心壮志的词句", "answer": "怅寥廓，问苍茫大地，谁主沉浮？"}, {"id": 2, "question": "____两句在《沁园春·长沙》中起过渡作用，描写词人旧地重游，引发了对往昔生活的回忆。", "answer": "“携来百侣曾游，忆往昔峥嵘岁月稠”"}, {"id": 3, "question": "在《沁园春·长沙》中表现同学少年评论国家大事，写出激浊扬清的文章，蔑视反动者的词句", "answer": "指点江山，激扬文字，粪土当年万户侯"}, {"id": 4, "question": "《沁园春·长沙》中____用夸张手法写出了劈波斩浪的气魄。", "answer": "“到中流击水，浪遏飞舟”"}, {"id": 5, "question": "《沁园春·长沙》中用动物来表现生机勃勃的秋景的两句", "answer": "鹰击长空，鱼翔浅底"}, {"id": 6, "question": "《沁园春·长沙》中____两句表现了青年学子意气奔放，正当强劲有力之时。", "answer": "“书生意气，挥斥方遒”"}, {"id": 7, "question": "《沁园春·长沙》中点明时间、地点和特定的环境的句子", "answer": "独立寒秋，湘江北去，橘子洲头"}, {"id": 9, "question": "《沁园春·长沙》中，词人面对“万类霜天竞自由”的自然之景，发出了的慨叹，表现了自己的雄心壮志。", "answer": "“问苍茫大地，谁主沉浮”"}, {"id": 11, "question": "《沁园春·长沙》中以设问结尾，巧妙回答“谁主沉浮”这一问题的句子", "answer": "曾记否，到中流击水，浪遏飞舟"}, {"id": 12, "question": "《沁园春·长沙》上片中描写近景并使用动静结合手法的句子", "answer": "漫江碧透，百舸争流"}, {"id": 13, "question": "《沁园春·长沙》中起过渡作用的句子", "answer": "携来百侣曾游，忆往昔峥嵘岁月稠"}, {"id": 14, "question": "《沁园春·长沙》一词中表现青年学子撰写文章评论国事的句子", "answer": "指点江山，激扬文字"}]}, {"title": "短歌行", "module": "## 一、必修上册（7篇）", "questions": [{"id": 1, "question": "汉乐府民歌《长歌行》诗中“东皋薄暮望，徒倚欲何依”化用了曹操《短歌行》中的诗句，来表现诗人的彷徨之情。", "answer": "“月明星稀，乌鹊南飞，绕树三匝，何枝可依”"}, {"id": 2, "question": "曹操《短歌行》中____几句写诗人一边喝酒一边高歌，感叹人生短促，日月如梭，失去的时日实在太多，好比晨露转瞬即逝。", "answer": "“对酒当歌，人生几何，譬如朝露，去日苦多”"}, {"id": 3, "question": "曹操《短歌行》中____写诗人在酒席上歌声激昂慷慨，忧郁长久难遣，靠什么来排解忧闷？唯有狂饮方可解脱。", "answer": "“慨当以慷，忧思难忘。何以解忧？唯有杜康”"}, {"id": 4, "question": "曹操在《短歌行》中化用《诗经·小雅·鹿鸣》中的诗句____，表达了诗人欢迎贤才的心情。一旦四方贤才光临舍下，诗人将奏瑟吹笙，宴请宾客，不甚欣喜。", "answer": "“呦呦鹿鸣，食野之苹。我有嘉宾，鼓瑟吹笙”"}, {"id": 5, "question": "曹操《短歌行》中____几句用比喻的手法，以明月的可望而不可取，比喻求贤才而不得，点明了忧愁不断的原因。", "answer": "“明明如月，何时可掇？忧从中来，不可断绝”"}, {"id": 11, "question": "曹操《短歌行》中____两句比喻新颖，生动形象地抒发了诗人对人生短暂的深沉感慨。", "answer": "“譬如朝露，去日苦多”"}, {"id": 12, "question": "曹操在《短歌行》中借用《诗经》中的诗句____，表达了自己对贤才的渴求。 ---", "answer": "“青青子衿，悠悠我心”"}]}, {"title": "梦游天姥吟留别", "module": "## 一、必修上册（7篇）", "questions": [{"id": 1, "question": "古代诗词常以“月”烘托意境，比如李白的《梦游天姥吟留别》中的____。", "answer": "“湖月照我影，送我至剡溪”"}, {"id": 2, "question": "李白的《梦游天姥吟留别》中表现诗人蔑视权贵的", "answer": "“安能摧眉折腰事权贵，使我不得开心颜？”"}, {"id": 3, "question": "李白善于描写想象的世界，他在《梦游天姥吟留别》中描写云中仙人出场时的穿着与出行工具的诗句____和“虎鼓瑟兮鸾回车”，令人叹为观止。", "answer": "“霓为衣兮风为马”"}, {"id": 4, "question": "李白的《梦游天姥吟留别》中由现实转入梦境的过渡句____。", "answer": "“我欲因之梦吴越，一夜飞度镜湖月”"}, {"id": 5, "question": "李白的《梦游天姥吟留别》中由梦境转入现实的过渡句____。", "answer": "“忽魂悸以魄动，恍惊起而长嗟”"}, {"id": 6, "question": "《梦游天姥吟留别》流露出诗人对人生的几多失意和深沉的感慨，此时此刻诗人感到最能抚慰心灵的", "answer": "“且放白鹿青崖间，须行即骑访名山”。在诗人看来，徜徉山水的乐趣，才是最快意的"}, {"id": 7, "question": "李白在《梦游天姥吟留别》中，以____两句写登天姥仙山的所见所闻，只见东方的海中涌出一轮红日，四周是苍翠的群山，耳际是山顶的天鸡的叫声。", "answer": "“半壁见海日，空中闻天鸡”"}, {"id": 10, "question": "《梦游天姥吟留别》中，写天姥山巍峨挺拔的", "answer": "“天姥连天向天横，势拔五岳掩赤城。天台四万八千丈，对此欲倒东南倾”"}, {"id": 13, "question": "《梦游天姥吟留别》中，描写南朝诗人谢灵运住过的地方溪水清澈、猿啼凄清的", "answer": "“谢公宿处今尚在，渌水荡漾清猿啼”"}, {"id": 14, "question": "《梦游天姥吟留别》中____四句写仙境的石门訇然打开，放眼望去，天空广阔，不见边际，在日月光辉的照耀下，金银筑成的楼台发出夺目的光彩。", "answer": "“洞天石扉，訇然中开。青冥浩荡不见底，日月照耀金银台”"}, {"id": 16, "question": "一些古典诗词都曾流露出某种消极情绪。当感到失落，想发泄内心的愁苦时，我们可以吟咏____。", "answer": "“世间行乐亦如此，古来万事东流水”"}, {"id": 20, "question": "《梦游天姥吟留别》中____两句，描写天姥山上的天气和环境，渲染了紧张凝重的气氛，为下文仙人出场做了铺垫。", "answer": "“云青青兮欲雨，水澹澹兮生烟”"}, {"id": 22, "question": "浪漫主义诗人李白善于描写想象的世界，他在《梦游天姥吟留别》中，描写云中仙人出场时穿着的诗句____与出行工具的诗句“虎鼓瑟兮鸾回车”令人叹为观止。 ---", "answer": "“霓为衣兮风为马”"}]}, {"title": "登高", "module": "## 一、必修上册（7篇）", "questions": [{"id": 1, "question": "杜甫的《登高》中道出郁积诗人心中的自身之苦和国运之恨，无限悲凉难以排遣的句子", "answer": "“艰难苦恨繁霜鬓，潦倒新停浊酒杯。”"}, {"id": 2, "question": "杜甫的《登高》中____一句描绘秋天落叶飘摇的悲凉之景，“百年多病独登台”一句则直述自己身体不好还孤身登高。", "answer": "“无边落木萧萧下”"}, {"id": 3, "question": "杜甫《登高》中抓住“猿”“鸟”等意象描写夔州秋天景色的名句", "answer": "“风急天高猿啸哀，渚清沙白鸟飞回。”"}, {"id": 4, "question": "杜甫《登高》中____两句，表现了作者漂泊异乡、年老体衰的处境，也蕴含着要与命运进行抗争的精神。 ---", "answer": "“万里悲秋常作客，百年多病独登台”"}]}, {"title": "念奴娇·赤壁怀古", "module": "## 一、必修上册（7篇）", "questions": [{"id": 1, "question": "《念奴娇·赤壁怀古》中表现千百年来，才华横溢的英雄豪杰都被长江淘洗干净的词句", "answer": "大江东去，浪淘尽，千古风流人物"}, {"id": 2, "question": "苏轼《念奴娇·赤壁怀古》中，运用比喻修辞情写赤壁的险要地势的词句", "answer": "乱石穿空，惊涛拍岸，卷起千堆雪"}, {"id": 3, "question": "苏轼《念奴娇·赤壁怀古》中____两句，收束了对赤壁雄奇景物的描写，引起后面对历史的缅怀。", "answer": "“江山如画，一时多少豪杰”"}, {"id": 4, "question": "苏轼在《念奴娇·赤壁怀古》中从不同方面对周瑜的形象进行了刻画____以婚事衬托其少年得意；“羽扇纶巾”写其装束，表现了他的儒雅风度。", "answer": "“小乔初嫁了”"}, {"id": 9, "question": "苏轼《念奴娇·赤壁怀古》中表现周瑜有儒将风度，且指挥若定的", "answer": "“谈笑间，樯橹灰飞烟灭”"}, {"id": 10, "question": "《念奴娇·赤壁怀古》中，苏轼以洒酒祭奠江月的豪举来抒发人生似梦、壮志难酬的感叹的", "answer": "“人生如梦，一尊还酹江月”"}, {"id": 20, "question": "《念奴娇·赤壁怀古》中感叹自己多愁善感，过早长出花白头发的", "answer": "“多情应笑我，早生华发”"}]}, {"title": "劝学", "module": "## 一、必修上册（7篇）", "questions": [{"id": 3, "question": "《劝学》中____两句，表明君子并非天资过人，只是他们善于利用外部条件来弥补自身的不足。", "answer": "“君子生非异也，善假于物也”"}, {"id": 4, "question": "儒、道两家都曾用行路来形象地论述积累的重要性。《老子》中说____《劝学》中则说：“故不积跬步，无以至千里。”", "answer": "“九层之台，起于累土；千里之行，始于足下。”"}, {"id": 5, "question": "《劝学》以蚯蚓为例，论证了为学必须锲而不舍，坚持不懈；同篇中与之相反的例证____。", "answer": "“蟹六跪而二螯，非蛇鳝之穴无可寄托者，用心躁也”"}, {"id": 6, "question": "孔子曰：“学而时习之。”又说____荀子在《劝学》中提出“学不可以已”的观点，继承并发展了孔子对学习的认识。", "answer": "“生而知之者上也，学而知之者次也。”"}, {"id": 7, "question": "刘禹锡诗云____和荀子《劝学》中的“青，取之于蓝，而青于蓝”都表达出学生可以超过老师或后人超过前人思想。", "answer": "“芳林新叶催陈叶，流水前波让后波。”"}, {"id": 8, "question": "荀子认为人的知识、道德、才能是后天不断广泛学习改造获得的。“金”要锋利，须“就砺”；人要改造成为“知明而行无过”的君子，就要____，可见，学习的意义是十分重大的。", "answer": "“博学而日参省乎己”"}, {"id": 10, "question": "《论语》中孔子说：“学而不思则罔，思而不学则殆。”论述了学习和思考的关系，在荀子的《劝学》中，也有直接提到了学与思的关系，这个句子", "answer": "吾尝终日而思矣，不如须臾之所学也"}, {"id": 11, "question": "《劝学》中以雕刻为喻，强调学习应当坚持，说明只有坚持不懈、持之以恒，才会有所成就的句子", "answer": "锲而不舍，金石可镂"}, {"id": 13, "question": "韩愈《师说》中____这句话与荀子《劝学》中的“青，取之于蓝，而青于蓝”观点相同。", "answer": "“是故弟子不必不如师，师不必贤于弟子”"}, {"id": 14, "question": "荀子在《劝学》中说，君子需要通过广泛学习来提升自己的两个句子", "answer": "君子博学而日参省乎己，则知明而行无过矣"}, {"id": 15, "question": "《劝学》开篇就提出了全文的中心论点，即“ 学不可以已”。在后面又阐明了学习要持之以恒的句子", "answer": "锲而舍之，朽木不折；锲而不舍，金石可镂"}, {"id": 18, "question": "《荀子·劝学》中____，通过“木”与“金”的变化来进一步说明客观事物经过人工改造，可以改变原来的状况。", "answer": "“故木受绳则直，金就砺则利”"}, {"id": 1, "question": "《荀子·劝学》中举例论证借助外物的重要性时说，终日殚精竭虑思考，却____，踮起脚极目远望，也“不如登高之博见也”。", "answer": "“不如须臾之所学也”"}, {"id": 2, "question": "《荀子·劝学》中强调了积累的重要。以积土成山、积水成渊可以兴风雨、生蛟龙设喻，引出的观点。", "answer": "“积善成德，而神明自得，圣心备焉”"}, {"id": 3, "question": "《荀子·劝学》指出，蚯蚓虽然身体柔弱，却能____，是用心专一的缘故。", "answer": "“上食埃土，下饮黄泉”"}, {"id": 10, "question": "荀子在《劝学》中用劣马的事例强调人生贵在坚持的", "answer": "“驽马十驾，功在不舍”"}]}, {"title": "师说", "module": "## 一、必修上册（7篇）", "questions": [{"id": 1, "question": "韩愈在《师说》第一段中，开篇提出全文核心观点的句子", "answer": "古之学者必有师"}, {"id": 2, "question": "韩愈在《师说》第一段中，清晰定义老师核心职责的句子", "answer": "师者，所以传道受业解惑也"}, {"id": 3, "question": "韩愈在《师说》第一段中，阐述人皆有疑惑、从师必要性的句子", "answer": "人非生而知之者，孰能无惑？"}, {"id": 4, "question": "韩愈在《师说》第一段中，指出有惑却不从师的严重后果的句子", "answer": "惑而不从师，其为惑也，终不解矣"}, {"id": 5, "question": "韩愈在《师说》第一段中，提出择师核心标准，打破年龄、身份限制的句子", "answer": "道之所存，师之所存也"}, {"id": 6, "question": "韩愈在《师说》第一段中，明确自己从师的原则，不在意对方年龄大小的句子", "answer": "吾师道也，夫庸知其年之先后生于吾乎？"}, {"id": 7, "question": "韩愈在《师说》第一段中，针对生乎吾后却先闻道的人，表明自己从师态度的句子", "answer": "生乎吾后，其闻道也亦先乎吾，吾从而师之"}, {"id": 8, "question": "韩愈在《师说》第一段中，针对生乎吾前先闻道的人，表明自己从师态度的句子", "answer": "生乎吾前，其闻道也固先乎吾，吾从而师之"}, {"id": 9, "question": "韩愈在《师说》第一段中，总结择师不分贵贱、不分长幼的句子", "answer": "是故无贵无贱，无长无少，道之所存，师之所存也"}]}, {"title": "子路、曾皙、冉有、公西华侍坐", "module": "## 二、必修下册（3篇）", "questions": [{"id": 1, "question": "《子路、曾皙、冉有、公西华侍坐》中面对孔子的询问，公西华（点）认为自己能力不足仍需要学习，对于宗庙祭祀之事，他说____。", "answer": "“端章甫，愿为小相焉”"}, {"id": 2, "question": "孔子认为”礼”在国家治理中有重要地位。在《侍坐》中他嗤笑子路是因为子路____。", "answer": "“为国以礼，其言不让”"}, {"id": 3, "question": "《子路、曾皙、冉有、公西华侍坐》中，孔子没有直接让弟子言志，而是先用温和自谦的话打消学生的顾虑，为他们创造一个轻松、亲切、活跃的环境。 他说____。", "answer": "“以吾一日长乎尔，毋吾以也”"}, {"id": 5, "question": "《子路、曾皙、冉有、公西华侍坐》中，孔子最赞同曾皙的回答，从夫子喟然叹曰____这句话可以看出来。", "answer": "“吾与点也”"}, {"id": 6, "question": "《子路、曾皙、冉有、公西华侍坐》中，从言谈、动作、神态可以看出四个学生不同的性格特点。冉有比较谦虚，从他述志时说____。", "answer": "“如其礼乐，以俟君子”"}]}, {"title": "阿房宫赋", "module": "## 二、必修下册（3篇）", "questions": [{"id": 1, "question": "杜牧《阿房宫赋》一文用对比的手法突出阿房宫中音乐声之繁多的两句", "answer": "“管弦呕哑，多于市人之言语”"}, {"id": 2, "question": "杜牧《阿房宫赋》一文以叙述的表达方式表现秦人对从六国掠夺来的珍宝毫不珍惜的对偶句", "answer": "“鼎铛玉石，金块珠砾”"}, {"id": 3, "question": "杜牧《阿房宫赋》一文告诫人们如果不吸取历史教训就会重蹈覆辙的句子", "answer": "“后人哀之而不鉴之，亦使后人而复哀后人也”"}, {"id": 3, "question": "杜牧在《阿房宫赋》中，用带着谴责语气的问句对秦国贪婪掠夺而又肆意挥霍财富的行为提出批评的句子", "answer": "“奈何取之尽锱铢，用之如泥沙？”"}, {"id": 4, "question": "杜牧在《阿房宫赋》中写通过外貌与神态的细节描写刻画出宫女对君王宠幸的期盼之情后，再用____两句写出了现实的残酷和时间的无情。", "answer": "“有不见者，三十六年”"}, {"id": 5, "question": "杜牧的《阿房宫赋》中，描写渭水、樊川两条河流水流平缓地经过阿房宫的两句", "answer": "“二川溶溶，流入宫墙”"}, {"id": 6, "question": "杜牧的《阿房宫赋》中，用夸张的手法写出阿房宫占地之广、宫殿楼阁之高之大的两句", "answer": "“覆压三百余里，隔离天日”"}, {"id": 7, "question": "杜牧的《阿房宫赋》中，用倒置式的暗喻，以璀璨的晶亮的闪闪明星来比喻宫女纷纷打开的妆镜的句子", "answer": "“明星荧荧，开妆镜也”"}, {"id": 7, "question": "杜牧的《阿房宫赋》中____这两句可以看出，阿房宫里的宫女，有很多原来在六国是身份很高贵的。", "answer": "“妃嫔媵嫱，王子皇孙”"}, {"id": 8, "question": "杜牧的《阿房宫赋》中，用作疑问的话、把阿房宫中水面上的长桥比作“云中龙”的句子", "answer": "“长桥卧波，未云何龙？”"}, {"id": 9, "question": "杜牧的《阿房宫赋》中，用作疑问的话、把阿房宫中楼阁之间架木筑成的通道比作天上的彩虹的句子", "answer": "“复道行空，不霁何虹？”"}, {"id": 10, "question": "杜牧的《阿房宫赋》中，用比喻的手法生动形象地描写出阿房宫里走廊以及屋檐的形状的", "answer": "“廊腰缦回，檐牙高啄”"}, {"id": 11, "question": "杜牧的《阿房宫赋》中，作者连用五个有比喻色彩的对比写出了阿旁宫建筑用材之多，其中____这个可以看出古代中国农民在普通家庭的重要地位。", "answer": "“使负栋之柱，多于南亩之农夫”"}, {"id": 12, "question": "杜牧在《阿房宫赋》中连用了五组判断句作排比，写出了阿房宫的宫女梳妆打扮的情景以及君王宫车经过的震撼，但得到的结果却____，失望之情表露无遗。", "answer": "“辘辘远听，杳不知其所之也”"}, {"id": 13, "question": "杜牧的《阿房宫赋》中，把阿房宫宫殿之多比作蜂房和水涡的", "answer": "“蜂房水涡，矗不知其几千万落”"}, {"id": 14, "question": "杜牧的《阿房宫赋》中____这两句写出了老百姓对于秦始皇的暴君行为有怨气却不敢说。", "answer": "“使天下之人，不敢言而敢怒”"}, {"id": 15, "question": "杜牧的《阿房宫赋》中____这两句写出了奢华宏伟的阿房宫最终的结局——被项羽一把火给烧了，语气中流露出作者对其的惋惜之情。", "answer": "“楚人一炬，可怜焦土”"}, {"id": 16, "question": "杜牧的《阿房宫赋》中____这两句写出了秦始皇变得越来越骄横顽固、专制极端，为后文写全国各地纷纷起义作了铺垫。", "answer": "“独夫之心，日益骄固”"}, {"id": 17, "question": "杜牧的《阿房宫赋》中____这两句通过一个肯定句和否定句写出了曾经无比强大的秦帝国最终被灭族的原因。", "answer": "“族秦者秦也，非天下也”"}, {"id": 18, "question": "杜牧的《阿房宫赋》中____这两句通过一个肯定句和否定句写出了六国灭亡的原因，角度独特，观点大胆。", "answer": "“灭六国者六国也，非秦也”"}, {"id": 19, "question": "杜牧的《阿房宫赋》中____这两句用假设的语气发表议论，说明六国国君不够爱民是被秦灭国的根本原因。", "answer": "“使六国各爱其人，则足以拒秦”"}, {"id": 20, "question": "杜牧的《阿房宫赋》中____这两句用假设的语气发表议论，说明秦始皇建立的强大的秦帝国没法延续下去的根本原因的不够爱民。", "answer": "“使秦复爱六国之人，则递三世可至万世而为君”"}, {"id": 21, "question": "不吸取经验教训让人痛惜，《阿房宫赋》中说____。", "answer": "“后人哀之而不鉴之，亦使后人而复哀后人也”"}, {"id": 22, "question": "杜牧指出六国足以抵御秦国而保全自己的途径____。", "answer": "“使六国各爱其人，则足以拒秦”"}, {"id": 23, "question": "（2016年全国卷2）杜牧《阿房宫赋》中以____描写阿房宫宫人的美丽，她们伫立远眺，盼望着皇帝临幸。", "answer": "“一肌一容，尽态极妍”"}, {"id": 24, "question": "(2017全国卷Ⅰ）杜牧在《阿房宫赋》的结尾处感叹道，如果六国爱护自己的百姓，就足以抵抗秦国，紧接着说____---", "answer": "“使秦复爱六国之人，则递三世可至万世而为君，谁得而族灭也？”"}]}, {"title": "六国论", "module": "## 二、必修下册（3篇）", "questions": [{"id": 1, "question": "苏洵《六国论》评论六国败亡的历史，他认为六国的最终灭亡，不是通常所认为的____，而是弊在赂秦。", "answer": "“兵不利，战不善”"}, {"id": 2, "question": "苏洵在《六国论》中，用____描写六国的祖辈创业的艰难，但他们的子孙对得来的土地却不太珍惜。", "answer": "“暴霜露，斩荆棘”"}, {"id": 3, "question": "苏洵认为，那些没赂秦的国家的灭亡也跟那些赂秦的国家有关，因为他们____，最终灭亡。", "answer": "“盖失强援，不能独完”"}, {"id": 4, "question": "苏洵认为，齐国没有贿赂秦国，结果“终继五国迁灭”，原因____。", "answer": "“与嬴而不助五国也”"}, {"id": 5, "question": "苏洵认为燕国虽小却最后灭亡，这是“用兵之效也”。而燕国____，才招来大祸。", "answer": "“至丹以荆卿为计”"}, {"id": 6, "question": "苏洵对赵国开始的战略是很赞赏的，最初赵国曾与秦国交战五次，战绩是“二败而三胜”，但非常可惜的____。", "answer": "“其用武而不终也”"}, {"id": 7, "question": "苏洵用精妙的比喻____，形象地批判了六国的赂秦行为。", "answer": "“以地事秦，犹抱薪救火”"}, {"id": 8, "question": "苏洵认为用割让土地的方法求得安寝的方法只能解决一时的问题，解决不了根本问题，这是因为____。", "answer": "“诸侯之地有限，暴秦之欲无厌”"}, {"id": 9, "question": "苏洵认为燕赵的灭亡令人同情，因为他们____，尽管如此也是打了败仗才灭亡的，是非常不得已的。", "answer": "“燕赵处秦革灭殆尽之际，可谓智力孤危”"}, {"id": 10, "question": "苏洵认为，如果六国国君丢掉幻想，不去取悦秦国，而是“并力西向”，那么一定会出现的结果。", "answer": "“秦人食之不得下咽也”"}, {"id": 11, "question": "杜牧《阿房宫赋》主要借秦王灭亡的教训批评唐敬宗广建宫室，不顾百姓死活，而苏洵的《六国论》则是批评北宋王朝____，天天给贿赂辽国送，实在是不应该。", "answer": "“有如此之势，而为秦人积威之所劫”"}, {"id": 12, "question": "苏洵在《六国论》中讲述赵国败亡的原因时说____，指出杀害良将是导致国家灭亡的原因之一。", "answer": "“洎牧以谗诛，邯郸为郡”"}, {"id": 13, "question": "苏洵在《六国论》中对北宋王朝的批评是很尖锐的，他说____还比不上六国国君的智慧。", "answer": "“苟以天下之大，下而从六国破亡之故事”"}, {"id": 14, "question": "苏洵认为，六国和秦国都是平起平坐的诸侯，实力比不上秦国，但“犹有可以不赂而胜之之势”，借此劝说北宋统治者____。", "answer": "“为国者无使为积威之所劫哉”"}, {"id": 15, "question": "《六国论》中论述齐国灭亡根源的句子", "answer": "不赂者以赂者丧"}, {"id": 16, "question": "苏洵在《六国论》中借助____，敏锐地指出了对抗秦国的办法，此举会让对方寝食难安。", "answer": "“以赂秦之地封天下之谋臣，以事秦之心礼天下之奇才”"}, {"id": 17, "question": "为了证明自己的论点,作者在文中列举齐、赵、燕三国破灭的史实并对此加以分析。作者认为,赵国灭亡的原因", "answer": "其用武而不终也"}]}, {"title": "论语", "module": "## 三、选择性必修上册（3篇）", "questions": [{"id": 1, "question": "孔子在《论语·雍也》中探讨文与质的关系的句子", "answer": "“质胜文则野，文胜质则史。”"}, {"id": 2, "question": "孔子在《论语·学而》中谈到君子不要求吃足，不要求居住舒适的句子", "answer": "“君子食无求饱，居无求安。”"}, {"id": 3, "question": "孔子在《论语·里仁》中谈到早晨得知道理，当晚死去也甘心的句子", "answer": "“朝闻道，夕死可矣。”"}, {"id": 4, "question": "孔子在《论语·里仁》中谈到君子和小人不同的义利观的句子", "answer": "“君子喻于义，小人喻于利。”"}, {"id": 5, "question": "《论语·卫灵公》中，子贡询问孔子有没有可以拿终身去实践的一个字，孔子告诉他是“恕”。接着孔子又对“恕”做了进一步的解释", "answer": "“己所不欲，勿施于人。”"}, {"id": 6, "question": "唐太宗李世民曾说“以人为鉴，以明得失”，由此可以想到《论语·里仁》中的", "answer": "“见贤思齐焉，见不贤而内自省也。”"}, {"id": 7, "question": "青年担当着国家兴盛的重责，应当以《论语·泰伯》中曾子所说的____自勉。 ---", "answer": "“士不可以不弘毅，任重而道远”"}]}, {"title": "大学之道", "module": "## 三、选择性必修上册（3篇）", "questions": [{"id": 1, "question": "《大学之道》中，提纲挈领地提出“三纲”的主要内容的", "answer": "大学之道，在明明德，在亲民，在止于至善"}, {"id": 2, "question": "阐述“止”“静”“安”三者的关系的", "answer": "知止而后有定，定而后能静，静而后能安，安而后能虑"}, {"id": 3, "question": "要想使自己的意念真诚，一定要先获得知识的句子", "answer": "欲诚其意者，先致其知"}, {"id": 4, "question": "点明获得知识的途径的句子", "answer": "致知在格物"}, {"id": 5, "question": "提出普天之下，不论身份高低，都应将加强个人品性修养作为根本的", "answer": "自天子以至于庶人，壹是皆以修身为本"}, {"id": 6, "question": "写儒家以修、齐、治、平层层推进，由己及人，达到天下太平的句子", "answer": "身修而后家齐，家齐而后国治，国治而后天下平"}]}, {"title": "老子", "module": "## 三、选择性必修上册（3篇）", "questions": [{"id": 1, "question": "____一个对自己事业追求执着的人，人可谢世，而精神事业价值万古长存。", "answer": "“不失其所者久，死而不亡者寿”"}, {"id": 2, "question": "儒、道两家都曾用“行路”来论述积累的重要性，荀子在《劝学》中说____，《老子》中说千里之行，始于足下。", "answer": "“故不积跬步,无以至千里”"}, {"id": 3, "question": "与“人贵有自知之明”表达的意思相同的句子", "answer": "知人者智，自知者明"}, {"id": 4, "question": "总是提醒世人注意观察日常事物那通常被忽视的一面。如通过观察车子器皿房室等日常事物，老子看到了“无”的意义，并得出的结论。", "answer": "“故有之以为利，无之以为用”"}, {"id": 7, "question": "老子以树木为喻，表达大的事物总是从小的东西发展起来的道理的句子", "answer": "合抱之木，生于毫末"}, {"id": 9, "question": "表达了“有”能给人便利，是因为“无”发挥了它的作用的句子", "answer": "故有之以为利，无之以为用"}]}, {"title": "屈原列传", "module": "## 四、选择性必修中册（2篇）", "questions": [{"id": 1, "question": "在《屈原列传》第三段中，司马迁认为屈原《离骚》的创作背景除了楚怀王听信谗言、不能明辨是非以外，还有____，一针见血地指出了当时朝廷小人当道、正直之人遭到排挤的黑暗现实。", "answer": "“邪曲之害公也，方正之不容也”"}, {"id": 2, "question": "在《屈原列传》第三段中，作者司马迁连用了____这两个被动句写出了屈原诚信待人却被猜疑、忠心耿耿却被诽谤的现实，为下文写屈原心生怨气并作《离骚》作铺垫。", "answer": "“信而见疑，忠而被谤”"}, {"id": 3, "question": "一个人在辛苦困倦到极点的时候，往往会仰头长叹：“天啊!”，这种情况在司马迁的《屈原列传》第三段中有形象的描述____。", "answer": "“故劳苦倦极，未尝不呼天也”"}, {"id": 4, "question": "在《屈原列传》第三段中，司马迁对屈原的《离骚》评价极高，其中认为其文字练、用辞精到的两句", "answer": "“其文约，其辞微。”"}, {"id": 5, "question": "我们读屈原的《离骚》，发现屈原在文章中经常用香花芳草作比喻，关于这一点，司马迁在《屈原列传》第三段中作出了自己的解释____。", "answer": "“其志洁，故其称物芳”"}, {"id": 6, "question": "《屈原列传》第三段中司马迁用比喻高度评价屈原之志____。", "answer": "“推此志也，虽与日月争光可也”"}, {"id": 7, "question": "《屈原列传》第三段中，司马迁对“离骚”一词作出自己的解释的句子", "answer": "“离骚”者，犹离忧也"}, {"id": 8, "question": "《屈原列传》第三段中，称赞《离骚》“言浅意深”的两句", "answer": "其称文小而其指极大，举类迩而见义远"}, {"id": 9, "question": "《屈原列传》第三段中，指出小人离间令屈原处于困厄处境的句子", "answer": "谗人间之，可谓穷矣"}, {"id": 10, "question": "在《屈原列传》第三段中，司马迁对《诗经》里的《国风》和《小雅》进行了评价的句子", "answer": "“《国风》好色而不淫，《小雅》怨诽而不乱”"}, {"id": 11, "question": "在《屈原列传》第三段中，司马迁分析了屈原《离骚》用来列举事实讽刺当世政治的包括____这三方面。", "answer": "“上称帝喾，下道齐桓，中述汤、武”"}, {"id": 12, "question": "《屈原列传》第三段中，表现屈原竭尽忠心侍奉君主却被小人离间的句子", "answer": "屈平正道直行，竭忠尽智以事其君，谗人间之，可谓穷矣"}, {"id": 13, "question": "《屈原列传》第三段中，写人遭遇病痛磨难时会呼唤父母的句子", "answer": "疾痛惨怛，未尝不呼父母也"}]}, {"title": "过秦论", "module": "## 四、选择性必修中册（2篇）", "questions": [{"id": 1, "question": "《过秦论》中，秦始皇继承前代功业、靠武力征服天下的两句", "answer": "奋六世之余烈，振长策而御宇内"}, {"id": 2, "question": "《过秦论》中,最能揭示秦始皇奴役天下百姓的一句是“执敲扑而鞭笞天下”,而最能表现秦始皇对待北方少数民族的一句则____。", "answer": "“乃使蒙恬北筑长城而守藩篱”"}, {"id": 3, "question": "在完成统一天下大业后，为了北方的长治久安，秦始皇采取了____等系列行动。", "answer": "“乃使蒙恬北筑长城而守藩篱，却匈奴七百余里”"}, {"id": 4, "question": "《过秦论》中秦始皇统一天下后，在政治军事上采取了一系列措施，作者用____这两句写采取措施后的影响。", "answer": "“胡人不敢南下而牧马，士不敢弯弓而抱怨”"}, {"id": 5, "question": "贾谊《过秦论》通篇采用对比论证，在对陈涉和九国的对比中，体现二者军力差距的语句____。", "answer": "“谪戍之众，非抗于九国之师也”"}, {"id": 6, "question": "《过秦论》中,秦国控制天下之后以华山、黄河为天然屏障的句子", "answer": "然后践华为城，因河为池"}, {"id": 7, "question": "《过秦论》中，描写战国四公子的特点", "answer": "皆明智而忠信，宽厚而爱人，尊贤而重士"}, {"id": 8, "question": "《过秦论》中，总括惠文王、武王、昭襄王时秦国强大盛况的句子", "answer": "强国请服，弱国入朝"}, {"id": 9, "question": "《过秦论》中，写秦孝公时期占有有利地势的两句", "answer": "“秦孝公据崤函之固，拥雍州之地。”"}, {"id": 10, "question": "《过秦论》中，用____两句形象地描写了秦始皇派遣得力将领、精锐的士兵守卫要害之地的情形。", "answer": "“良将劲弩守要害之处，信臣精卒陈利兵而谁何”"}, {"id": 11, "question": "《过秦论》中，以议论方式来写陈涉起义军战争装备极为简陋的句子", "answer": "“锄櫌棘矜，非铦于钩戟长铩也。”"}, {"id": 12, "question": "《过秦论》中描写陈涉起义时一呼百应的句子____。", "answer": "“天下云集响应，赢粮而景从”"}, {"id": 13, "question": "《过秦论》中结尾一段在列举了陈涉的诸多弱点后，总结出了陈涉与当年诸侯联盟完全不能相提并论的结论", "answer": "“试使山东之国与陈涉度长絜大，比权量力，则不可同年而语矣。”"}, {"id": 14, "question": "陆机《文赋》指出，写作的奥秘之一是“立片言而居要，乃一篇之警策”。贾谊《过秦论》点明秦亡原因的警策语", "answer": "“仁义不施而攻守之势异也”"}, {"id": 15, "question": "《过秦论》中，写秦始皇统一天下后，在文化上采取措施____。", "answer": "“于是废先王之道，焚百家之言”"}, {"id": 16, "question": "《过秦论》中，描写秦末起义的结果是", "answer": "“山东豪俊遂并起而亡秦族矣”"}, {"id": 17, "question": "《过秦论》中，秦国利用诸侯国的弱点，乘胜追击，把诸侯打得____。", "answer": "“伏尸百万，流血漂橹”"}, {"id": 18, "question": "贾谊在《过秦论》中写陈涉起义队伍的武器装备极其简陋的", "answer": "“斩木为兵，揭竿为旗”"}, {"id": 19, "question": "贾谊在《过秦论》中写陈涉起义队伍数量少、不堪一击的两句", "answer": "“率疲弊之卒，将数百之众”"}, {"id": 20, "question": "在《过秦论》中，贾谊认为，由于九国之师各怀心思，谁都不愿意率先进军秦国，使得秦国____。合纵政策就这样解体了。", "answer": "“秦无亡矢遗镞之费，而天下诸侯已困矣”"}, {"id": 21, "question": "《过秦论》中，写陈涉起义导致秦国灭亡，被天下人耻笑的句子", "answer": "一夫作难而七庙隳，身死人手，为天下笑者"}, {"id": 22, "question": "文中以____三句极言陈涉的出身贫寒和地位低贱。 ---", "answer": "“然陈涉瓮牖绳枢之子，氓隶之人，而迁徙之徒也”"}]}, {"title": "离骚", "module": "## 五、选择性必修下册（5篇）", "questions": [{"id": 1, "question": "《离骚》节选第三段中，写诗人长声叹息掩面流泪，哀伤百姓生活多艰的句子", "answer": "长太息以掩涕兮，哀民生之多艰"}, {"id": 2, "question": "《离骚》节选第三段中，写诗人虽崇尚美德约束自身，却早上进谏晚上就被罢黜的句子", "answer": "余虽好修姱以鞿羁兮，謇朝谇而夕替"}, {"id": 3, "question": "《离骚》节选第三段中，写诗人既因为佩戴蕙草而被罢官，又因为采集白芷而被加罪的句子", "answer": "既替余以蕙纕兮，又申之以揽茝"}, {"id": 4, "question": "《离骚》节选第三段中，直抒胸臆，表明自己对美好德行的追求至死不改的句子", "answer": "亦余心之所善兮，虽九死其犹未悔"}, {"id": 5, "question": "《离骚》节选第三段中，抱怨君王荒唐放纵，始终不能体察自己苦心的句子", "answer": "怨灵修之浩荡兮，终不察夫民心"}, {"id": 6, "question": "《离骚》节选第三段中，写小人嫉妒自己的美好品行，造谣诽谤自己作风放荡的句子", "answer": "众女嫉余之蛾眉兮，谣诼谓余以善淫"}, {"id": 7, "question": "《离骚》节选第三段中，批判世俗之人善于投机取巧，违背规矩随意改变法度的句子", "answer": "固时俗之工巧兮，偭规矩而改错"}, {"id": 8, "question": "《离骚》节选第三段中，批判世人违背准绳追求邪曲，竞相把苟合取悦奉行为法度的句子", "answer": "背绳墨以追曲兮，竞周容以为度"}, {"id": 9, "question": "《离骚》节选第三段中，写诗人内心烦闷失意，独自在此时陷入穷困潦倒境地的句子", "answer": "忳郁邑余侘傺兮，吾独穷困乎此时也"}, {"id": 10, "question": "《离骚》节选第三段中，表明自己宁愿突然死去随流水消逝，也不肯做出世俗小人的丑态的句子", "answer": "宁溘死以流亡兮，余不忍为此态也"}, {"id": 11, "question": "《离骚》节选第三段中，以雄鹰不与凡鸟同群为喻，表明自己绝不与世俗同流合污的句子", "answer": "鸷鸟之不群兮，自前世而固然"}, {"id": 12, "question": "《离骚》节选第三段中，用方枘和圆凿不能相合为喻，表明志向不同的人无法相安的句子", "answer": "何方圜之能周兮，夫孰异道而相安"}, {"id": 13, "question": "《离骚》节选第三段中，写自己委屈心志压抑情感，忍受责骂和侮辱的句子", "answer": "屈心而抑志兮，忍尤而攘诟"}, {"id": 14, "question": "《离骚》节选第三段中，表明自己要保持清白为正道献身，以古代圣贤为榜样的句子", "answer": "伏清白以死直兮，固前圣之所厚"}]}, {"title": "蜀道难", "module": "## 五、选择性必修下册（5篇）", "questions": [{"id": 1, "question": "《蜀道难》的主旨句", "answer": "蜀道之难，难于上青天"}, {"id": 2, "question": "《蜀道难》中，用夸张手法写蜀地开国久远、与世隔绝的句子", "answer": "尔来四万八千岁，不与秦塞通人烟"}, {"id": 3, "question": "《蜀道难》中，引用“五丁开山”神话传说，写出蜀道开辟过程的句子", "answer": "地崩山摧壮士死，然后天梯石栈相钩连"}, {"id": 4, "question": "《蜀道难》中，用夸张手法写蜀道之高，上有太阳神的车驾都无法越过的高峰，下有冲波逆折的回旋河流的句子", "answer": "上有六龙回日之高标，下有冲波逆折之回川"}, {"id": 5, "question": "《蜀道难》中，用黄鹤、猿猱都无法越过蜀道，侧面烘托蜀道险峻的句子", "answer": "黄鹤之飞尚不得过，猿猱欲度愁攀援"}, {"id": 6, "question": "《蜀道难》中，写青泥岭山路曲折盘旋，百步之内就有很多转弯的句子", "answer": "青泥何盘盘，百步九折萦岩峦"}, {"id": 7, "question": "《蜀道难》中，生动刻画行人走在蜀道上屏住呼吸、抚胸长叹的惶恐情态的句子", "answer": "扪参历井仰胁息，以手抚膺坐长叹"}, {"id": 8, "question": "《蜀道难》中，用夸张手法写山峰之高，枯松倒挂在绝壁之上的句子", "answer": "连峰去天不盈尺，枯松倒挂倚绝壁"}, {"id": 9, "question": "《蜀道难》中，写急流瀑布飞泻而下，冲击岩石发出雷鸣般巨响的句子", "answer": "飞湍瀑流争喧豗，砯崖转石万壑雷"}, {"id": 10, "question": "《蜀道难》中，写蜀道剑阁地势险要，易守难攻的句子", "answer": "剑阁峥嵘而崔嵬，一夫当关，万夫莫开"}, {"id": 11, "question": "《蜀道难》中，用悲鸟在古树上哀鸣、雌雄相随飞绕林间，渲染蜀道凄清氛围的句子", "answer": "但见悲鸟号古木，雄飞雌从绕林间"}, {"id": 12, "question": "《蜀道难》中，用子规夜啼、愁满空山，进一步渲染蜀道孤寂凄清氛围的句子", "answer": "又闻子规啼夜月，愁空山"}]}, {"title": "蜀相", "module": "## 五、选择性必修下册（5篇）", "questions": [{"id": 1, "question": "《蜀相》中，写诗人寻访武侯祠，描写祠堂外柏树茂盛、春意盎然的句子", "answer": "丞相祠堂何处寻，锦官城外柏森森"}, {"id": 2, "question": "《蜀相》中，以乐景衬哀情，描写碧草自绿、黄鹂空鸣，烘托祠堂寂寥冷清氛围的句子", "answer": "映阶碧草自春色，隔叶黄鹂空好音"}, {"id": 3, "question": "《蜀相》中，高度概括诸葛亮一生雄才大略、鞠躬尽瘁的丰功伟绩的句子", "answer": "三顾频烦天下计，两朝开济老臣心"}, {"id": 4, "question": "《蜀相》中，抒发对诸葛亮壮志未酬、身死五丈原的惋惜之情，也寄寓诗人自身怀才不遇感慨的千古名句", "answer": "出师未捷身先死，长使英雄泪满襟"}]}, {"title": "陈情表", "module": "## 五、选择性必修下册（5篇）", "questions": [{"id": 1, "question": "《陈情表》中，写自己幼年不幸，刚出生六个月父亲就去世的句子", "answer": "臣以险衅，夙遭闵凶。生孩六月，慈父见背"}, {"id": 2, "question": "《陈情表》中，写自己幼年孤苦，四岁时母亲被迫改嫁，由祖母抚养长大的句子", "answer": "行年四岁，舅夺母志。祖母刘悯臣孤弱，躬亲抚养"}, {"id": 3, "question": "《陈情表》中，写自己年少时体弱多病，九岁还不能走路，孤苦无依的句子", "answer": "臣少多疾病，九岁不行，零丁孤苦，至于成立"}, {"id": 4, "question": "《陈情表》中，用对仗句写自己家族人丁单薄、内外无亲的句子", "answer": "外无期功强近之亲，内无应门五尺之僮"}, {"id": 5, "question": "《陈情表》中，写自己形单影只，只有身体和影子相互安慰的千古名句", "answer": "茕茕孑立，形影相吊"}, {"id": 6, "question": "《陈情表》中，写祖母常年卧病在床，自己侍奉汤药从未间断的句子", "answer": "而刘夙婴疾病，常在床蓐，臣侍汤药，未曾废离"}, {"id": 7, "question": "《陈情表》中，用“日薄西山”比喻祖母生命垂危、时日无多的句子", "answer": "但以刘日薄西山，气息奄奄，人命危浅，朝不虑夕"}, {"id": 8, "question": "《陈情表》中，写自己没有祖母就无法活到今天，祖母没有自己就无法安度晚年的句子", "answer": "臣无祖母，无以至今日；祖母无臣，无以终余年"}, {"id": 9, "question": "《陈情表》中，写自己和祖母相依为命，因此不能废止奉养而远离的句子", "answer": "母孙二人，更相为命，是以区区不能废远"}, {"id": 10, "question": "《陈情表》中，写自己活着不惜性命为国尽忠，死后也要结草报恩的句子", "answer": "臣生当陨首，死当结草"}]}, {"title": "兰亭集序", "module": "## 五、选择性必修下册（5篇）", "questions": [{"id": 1, "question": "《兰亭集序》中，点明集会的时间、地点、事由的句子", "answer": "永和九年，岁在癸丑，暮春之初，会于会稽山阴之兰亭，修禊事也"}, {"id": 2, "question": "《兰亭集序》中，描写集会时贤才齐聚、老少皆来的盛况的句子", "answer": "群贤毕至，少长咸集"}, {"id": 3, "question": "《兰亭集序》中，描写兰亭周围环境优美，有茂密的树林和修长的竹子的句子", "answer": "此地有崇山峻岭，茂林修竹"}, {"id": 4, "question": "《兰亭集序》中，描写兰亭前清澈的溪流曲折环绕，映衬着集会的亭子的句子", "answer": "又有清流激湍，映带左右"}, {"id": 5, "question": "《兰亭集序》中，写大家引溪水作为流觞的曲水，依次坐在水边，虽然没有音乐盛况，但饮酒咏诗也足以畅叙深情的句子", "answer": "引以为流觞曲水，列坐其次。虽无丝竹管弦之盛，一觞一咏，亦足以畅叙幽情"}, {"id": 6, "question": "《兰亭集序》中，描写集会当天天气晴朗、和风舒畅的句子", "answer": "是日也，天朗气清，惠风和畅"}, {"id": 7, "question": "《兰亭集序》中，写抬头纵观广阔的天地，低头察看繁多的万物，纵目远眺舒展胸怀，足以尽享视听的乐趣的句子", "answer": "仰观宇宙之大，俯察品类之盛，所以游目骋怀，足以极视听之娱"}, {"id": 8, "question": "《兰亭集序》中，写人与人相处，一生很快就会度过的句子", "answer": "夫人之相与，俯仰一世"}, {"id": 9, "question": "《兰亭集序》中，表达对生死的看法，认为把生死等同、把长寿和短命等同的说法是虚妄荒诞的句子", "answer": "固知一死生为虚诞，齐彭殇为妄作"}, {"id": 10, "question": "《兰亭集序》中，写后人看待今天，就像今天的人看待过去一样，引发对时光流逝、世事变迁的感慨的句子", "answer": "后之视今，亦犹今之视昔"}]}];

// ===== STATE =====
let curCh = null;    // current chapter letter
let ci = 0;          // card index within current chapter
let chStart = 0;     // global start index of current chapter
let mode = 'f';
let animating = false;

// Quiz state
let qq = [], qi = 0, qs = 0, qt = 0, qa = false, qch = null;

// ===== PERSISTENCE v3: c=count, lr=lastReviewDate =====
function lk() { return 'gkyw_counts_v3'; }
function ld() {
  try {
    const raw = JSON.parse(localStorage.getItem(lk()));
    if (!raw) return {};
    // Migrate from old format v2
    const sample = Object.values(raw)[0];
    if (typeof sample === 'number') {
      const migrated = {};
      Object.entries(raw).forEach(([k,v]) => { migrated[k] = {c:v, lr:''}; });
      localStorage.setItem(lk(), JSON.stringify(migrated));
      return migrated;
    }
    return raw;
  } catch {} return {};
}
function sv() {
  const d = {};
  C.forEach((c,i) => { if(c.c) d[i] = {c:c.c, lr:c.lr||''}; });
  localStorage.setItem(lk(), JSON.stringify(d));
}
(function() {
  const d = ld();
  C.forEach((c,i) => {
    const s = d[i];
    if (s) { c.c = s.c||0; c.lr = s.lr||''; }
    else { c.c = 0; c.lr = ''; }
  });
})();

// Wrong answers persistence
function lwk() { return 'gkyw_wrong_v1'; }
function lwd() { try { return JSON.parse(localStorage.getItem(lwk()))||{}; } catch {} return {}; }
function svw() {
  localStorage.setItem(lwk(), JSON.stringify(window._wrongData || {}));
}
(function() { window._wrongData = lwd(); })();

function trackWrong(gi, correct) {
  if (!window._wrongData[gi]) window._wrongData[gi] = {w:0, t:0};
  window._wrongData[gi].t++;
  if (!correct) window._wrongData[gi].w++;
  svw();
}

// Spaced repetition priority
function getPriority(card) {
  const cnt = card.c || 0;
  if (!card.lr) return -1000 - cnt;  // never reviewed = highest priority
  const days = Math.floor((Date.now() - new Date(card.lr).getTime()) / 86400000);
  return cnt - (days / 2);
}

function buildChHome() {
  const g = document.getElementById('ch-grid'); g.innerHTML = '';
  LETTERS.forEach(l => {
    const ch = CH[l];
    const el = document.createElement('div');
    el.className = 'ch-grid-item' + (ch.card_count === 0 ? ' dim' : '');
    el.innerHTML = '<div class="ch-letter">'+l+'章</div><div class="ch-info">'+ch.card_count+'卡 · '+ch.word_count+'词</div>';
    el.onclick = () => enterChapter(l);
    g.appendChild(el);
  });
}

  document.getElementById('ch-home').style.display = 'flex';
  document.getElementById('fm').style.display = 'none';
  document.getElementById('ch-nav').style.display = 'none';
  document.getElementById('qm').style.display = 'none';

  document.getElementById('pth').style.display = 'none';
  document.getElementById('ptv').style.display = 'none';
  document.getElementById('ptv-body').innerHTML = '';

function enterChapter(letter, sortMode) {
  // sortMode: 'sr'=spaced repetition, 'seq'=sequential. Default depends on current preference
  window._srMode = sortMode || window._srMode || 'sr';
  curCh = letter; chStart = CH[letter].start; ci = 0;

  // Update content first, then show
  document.getElementById('ch-badge').textContent = letter + '章 · ' + CH[letter].card_count + '卡';
  updateSrBadge();
  buildChSelect();
  renderCard();

  // Toggle visibility after content is ready
  document.getElementById('ch-home').style.display = 'none';
  document.getElementById('fm').style.display = 'flex';
  document.getElementById('ch-nav').style.display = 'flex';
  document.getElementById('qm').style.display = 'none';
  document.querySelectorAll('[data-m]').forEach(b => b.classList.toggle('active', b.dataset.m === 'f'));
  document.querySelectorAll('[data-w]').forEach(b => b.classList.remove('active'));
  mode = 'f';
}

function toggleSr() {
  window._srMode = window._srMode === 'sr' ? 'seq' : 'sr';
  ci = 0;
  updateSrBadge();
  renderCard();
}

function updateSrBadge() {
  const el = document.getElementById('sr-mode');
  if (el) el.textContent = window._srMode === 'sr' ? '🧠 间隔' : '📖 顺序';
}

// ── Custom dropdown (no native select, no black flash) ──
let _activeMenu = null;

function closeAllMenus() {
  if (_activeMenu) {
    _activeMenu.classList.remove('open');
    _activeMenu.parentElement.querySelector('.csel-trigger').classList.remove('open');
    _activeMenu = null;
  }
}

function createCSelect(container, items, currentVal, onChange) {
  container.innerHTML = '';
  const trigger = document.createElement('div');
  trigger.className = 'csel-trigger';
  const current = items.find(i => i.value === currentVal) || items[0];
  trigger.textContent = current ? current.label : '';

  const menu = document.createElement('div');
  menu.className = 'csel-menu';

  items.forEach(item => {
    const opt = document.createElement('div');
    opt.className = 'csel-opt' + (item.value === currentVal ? ' active' : '');
    opt.textContent = item.label;
    opt.dataset.value = item.value;
    opt.onclick = (e) => {
      e.stopPropagation();
      trigger.textContent = item.label;
      menu.querySelectorAll('.csel-opt').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      closeAllMenus();
      if (onChange) onChange(item.value);
    };
    menu.appendChild(opt);
  });

  trigger.onclick = (e) => {
    e.stopPropagation();
    const isOpen = menu.classList.contains('open');
    closeAllMenus();
    if (!isOpen) {
      menu.classList.add('open');
      trigger.classList.add('open');
      _activeMenu = menu;
    }
  };

  container.appendChild(trigger);
  container.appendChild(menu);
}

// Close menus on outside click
document.addEventListener('click', () => closeAllMenus());

function buildChSelect() {
  const items = LETTERS.map(l => ({ value: l, label: l + '章 (' + CH[l].card_count + '卡)' }));
  createCSelect(document.getElementById('ch-csel'), items, curCh, (val) => {
    if (val !== curCh) enterChapter(val);
  });
}

// ===== FLASHCARD =====
function getChCards() {
  if (!curCh) return [];
  const ch = CH[curCh];
  const cards = C.slice(ch.start, ch.end + 1);
  // Apply spaced repetition sorting
  if (window._srMode === 'sr') {
    return cards.sort((a,b) => getPriority(a) - getPriority(b));
  }
  return cards; // sequential order
}

function renderCard() {
  const cards = getChCards();
  if (cards.length === 0) return;
  const c = cards[ci]; if (!c) return;
  const globalIdx = C.indexOf(c);

  document.getElementById('wd').textContent = c.w;
  document.getElementById('pyd').textContent = c.p;
  document.getElementById('dd').textContent = c.d;
  const ee = document.getElementById('ed');
  const se = document.getElementById('sd');
  if (c.e) {
    ee.innerHTML = c.e.split(c.w).join('<span class="dotted">'+c.w+'</span>');
    ee.style.display = 'block';
  } else { ee.style.display = 'none'; }
  se.textContent = c.s; se.style.display = c.s ? 'block' : 'none';
  document.getElementById('cnt').textContent = c.c||0;

  // Wrong answer info
  const wi = document.getElementById('wrong-info');
  const wd = window._wrongData[globalIdx];
  if (wd && wd.w > 0) {
    wi.textContent = '❌ ' + wd.w + '/' + wd.t;
    wi.style.display = 'block';
  } else {
    wi.style.display = 'none';
  }

  const total = cards.length;
  document.getElementById('pp').textContent = (ci+1) + ' / ' + total + ' · ' + curCh + '章';
  const pct = ((ci+1)/total)*100;
  document.getElementById('pf').style.width = pct + '%';
  document.getElementById('ppc').textContent = Math.round(pct) + '%';
  document.getElementById('pb').disabled = ci === 0;
  document.getElementById('nb').disabled = ci === total - 1;

  const cd = document.getElementById('card');
  cd.classList.remove('pop'); void cd.offsetWidth; cd.classList.add('pop');
}

function nav(d) {
  if (animating) return;
  const cards = getChCards();
  const ni = ci + d;
  if (ni < 0 || ni >= cards.length) return;
  animating = true; ci = ni; renderCard();
  setTimeout(() => animating = false, 300);

  // Check if we finished the chapter
  if (d > 0 && ni === cards.length - 1 && LETTERS.indexOf(curCh) < LETTERS.length - 1) {
    nextChLetter = LETTERS[LETTERS.indexOf(curCh) + 1];
    setTimeout(() => {
      document.getElementById('ncm-title').textContent = '🎉 ' + curCh + '章已完成！';
      document.getElementById('ncm-text').textContent = '即将进入 ' + nextChLetter + '章（' + CH[nextChLetter].card_count + '卡）';
      document.getElementById('next-ch-modal').classList.add('o');
    }, 500);
  }
}

function inc() {
  const cards = getChCards();
  if (ci >= cards.length) return;
  const c = cards[ci];
  c.c = (c.c||0) + 1;
  c.lr = new Date().toISOString().slice(0,10);
  document.getElementById('cnt').textContent = c.c;
  sv();
}

function dec() {
  const cards = getChCards();
  if (ci >= cards.length) return;
  const c = cards[ci];
  if (c.c > 0) {
    c.c--;
    c.lr = new Date().toISOString().slice(0,10);
    document.getElementById('cnt').textContent = c.c;
    sv();
  }
}

// ===== OVERVIEW =====
function buildSecContent(l) {
  const ch = CH[l];
  const chCards = C.slice(ch.start, ch.end + 1);
  const wordMap = {};
  chCards.forEach((c,i) => {
    if (!wordMap[c.w]) wordMap[c.w] = {p:c.p, defs:[]};
    wordMap[c.w].defs.push({d:c.d, e:c.e, c:c.c||0, gi: ch.start + i});
  });
  let html = '<div class="ov-sec-body-inner">';
  Object.entries(wordMap).forEach(([word, info]) => {
    const wd = window._wrongData;
    const totalW = Object.values(info.defs).reduce((s,d) => s + ((wd[d.gi]&&wd[d.gi].w)||0), 0);
    html += '<div class="ov-word" data-word="'+word+'" data-ch="'+l+'" data-first-gi="'+info.defs[0].gi+'">' +
      '<span class="ww">'+word+'</span><span class="wp">'+info.p+'</span>' +
      (totalW > 0 ? '<span style="font-size:.62rem;color:var(--accent)">❌'+totalW+'</span>' : '') +
      info.defs.map(function(d) {
        var ex = d.e ? ' · '+d.e.slice(0,30)+(d.e.length>30?'…':'') : '';
        if (ex) {
          var re = new RegExp(word, 'g');
          ex = ex.replace(re, '<span class="dotted">'+word+'</span>');
        }
        return '<span class="ov-def"><span>'+d.d+'</span>' +
          (ex ? '<span class="dw">'+ex+'</span>' : '') +
          '<span class="dc">'+(d.c||0)+'次</span></span>';
      }).join('') +
    '</div>';
  });
  html += '</div>';
  return html;
}

// ===== QUIZ =====
const quizSessions = {};  // per-chapter saved progress

function sh(a) { return [...a].sort(()=>Math.random()-.5); }

function saveQuizState() {
  if (!qch) return;
  quizSessions[qch] = { qi, qs, qt, qq };
}

function loadQuizState(letter) {
  const saved = quizSessions[letter];
  if (saved) {
    qi = saved.qi; qs = saved.qs; qt = saved.qt; qq = saved.qq;
    return true;
  }
  return false;
}

function switchQuizCh(letter) {
  if (letter === qch) return;
  saveQuizState();
  const saved = quizSessions[letter];
  if (saved) {
    qch = letter;
    qi = saved.qi; qs = saved.qs; qt = saved.qt; qq = saved.qq;
    qa = false;
    showQuizQ();
  } else {
    startQuiz(letter, true);
  }
}

function showQuizHome() {
  document.getElementById('qc').innerHTML =
    '<div class="qch-sel"><h2>选择章节进行练习</h2><p>每题会给出例句，选择划线词的正确含义</p>' +
    '<div class="qch-grid" id="qch-grid"></div></div>';
  const g = document.getElementById('qch-grid');
  LETTERS.forEach(l => {
    const ch = CH[l];
    if (ch.card_count === 0) return;
    const el = document.createElement('div');
    el.className = 'qch-item';
    const saved = quizSessions[l];
    el.innerHTML = '<div class="qch-l">'+l+'章</div><div class="qch-n">'+ch.card_count+'卡' +
      (saved ? '<br><span style="font-size:.65rem;color:var(--accent)">进行中 '+(saved.qi+1)+'/'+saved.qt+'</span>' : '') +
      '</div>';
    el.onclick = () => switchQuizCh(l);
    g.appendChild(el);
  });
  qch = null;
}

function buildQuizQuestions(letter) {
  const ch = CH[letter];
  const chCards = C.slice(ch.start, ch.end + 1);
  const allOtherDefs = C.filter((x,i) => i < ch.start || i > ch.end).map(x => x.d);
  const uniqueOther = [...new Set(allOtherDefs)];
  const questions = [];
  chCards.forEach((c, idx) => {
    if (!c.e) return;
    const sd = sh(uniqueOther).slice(0,3);
    if (sd.length < 3) return;
    const ops = sh([{t:c.d,ok:true},{t:sd[0]},{t:sd[1]},{t:sd[2]}]);
    questions.push({w:c.w, s:c.e, ca:c.d, ops, gi: ch.start + idx});
  });
  return sh(questions);
}

function startQuiz(letter, forceFresh) {
  qch = letter;
  if (forceFresh || !loadQuizState(letter)) {
    qq = buildQuizQuestions(letter);
    qi = 0; qs = 0; qt = qq.length;
  }
  qa = false;
  showQuizQ();
}

function showQuizQ() {
  if (qi >= qt) { showQuizR(); return; }
  const q = qq[qi];
  let sh = q.s, w = q.w, r = new RegExp(w, 'g');
  sh = sh.replace(r, '<span class="dotted">'+w+'</span>');

  // Build DOM
  const c = document.getElementById('qc'); c.innerHTML = '';
  const header = document.createElement('div');
  header.style.cssText = 'text-align:center;margin-bottom:10px';

  // Chapter select dropdown
  const wrap = document.createElement('span');
  wrap.className = 'csel-wrap';
  const items = LETTERS.map(l => ({ value: l, label: l + '章 (' + CH[l].card_count + '卡)' }));
  createCSelect(wrap, items, qch, (val) => switchQuizCh(val));
  // Make it compact for quiz area
  wrap.querySelector('.csel-trigger').style.cssText = 'font-size:.8rem;padding:4px 26px 4px 10px';
  header.appendChild(wrap);
  c.appendChild(header);

  // Progress
  const prog = document.createElement('div');
  prog.className = 'qp';
  prog.textContent = '第 ' + (qi + 1) + ' / ' + qt + ' 题';
  c.appendChild(prog);

  // Word
  const wd = document.createElement('div');
  wd.className = 'qw'; wd.textContent = q.w;
  c.appendChild(wd);

  // Context label
  const ctx = document.createElement('div');
  ctx.className = 'qt'; ctx.textContent = '选择划线词在句中的含义';
  c.appendChild(ctx);

  // Sentence
  const sent = document.createElement('div');
  sent.className = 'qs'; sent.innerHTML = sh;
  c.appendChild(sent);

  // Options
  const wo = document.createElement('div');
  wo.className = 'qo';
  q.ops.forEach((o,i) => {
    const opt = document.createElement('div');
    opt.className = 'qopt';
    opt.dataset.ok = o.ok;
    opt.textContent = String.fromCharCode(65 + i) + '. ' + o.t;
    opt.onclick = () => aq(opt, i);
    wo.appendChild(opt);
  });
  c.appendChild(wo);

  // Feedback
  const fb = document.createElement('div');
  fb.className = 'qf'; fb.id = 'qf';
  c.appendChild(fb);

  // Next button
  const nbtn = document.createElement('button');
  nbtn.className = 'qnext'; nbtn.id = 'qn';
  nbtn.textContent = '下一题 →';
  nbtn.onclick = nq;
  c.appendChild(nbtn);

  qa = false;
}

function aq(el, si) {
  if (qa) return; qa = true;
  const q = qq[qi], ok = q.ops[si].ok;
  document.querySelectorAll('.qopt').forEach((o,i) => {
    o.classList.add('d');
    if (q.ops[i].ok) o.classList.add('c');
    if (i === si && !ok) o.classList.add('w');
  });
  // Track wrong answer
  trackWrong(q.gi, ok);
  const fb = document.getElementById('qf');
  if (ok) { qs++; fb.innerHTML = '✅ 正确！'; fb.style.color='#27ae60'; }
  else { fb.innerHTML = '❌ 错误。正确答案：'+q.ca; fb.style.color='#c0392b'; }
  document.getElementById('qn').classList.add('s');
}

function nq() { qi++; qa=false; showQuizQ(); }

function showQuizR() {
  const p = Math.round((qs/qt)*100);
  // Show result with chapter select
  const c = document.getElementById('qc'); c.innerHTML = '';

  const wrap = document.createElement('span');
  wrap.style.cssText = 'margin-bottom:10px;display:inline-block';
  wrap.className = 'csel-wrap';
  const items = LETTERS.map(l => ({ value: l, label: l + '章 (' + CH[l].card_count + '卡)' }));
  createCSelect(wrap, items, qch, (val) => switchQuizCh(val));
  wrap.querySelector('.csel-trigger').style.cssText = 'font-size:.8rem;padding:4px 26px 4px 10px';
  c.appendChild(wrap);

  const res = document.createElement('div');
  res.className = 'qres';
  res.innerHTML = '<h2>练习完成！</h2>'+
    '<div class="sn">'+qs+' / '+qt+'</div>'+
    '<div class="ss">正确率 '+p+'%</div>'+

    '<button class="qrst" onclick="showQuizHome()">选择其他章节</button>';
  c.appendChild(res);
}

// ===== STATISTICS =====
function calcStreak() {
  // Count consecutive days with any review activity (c.c > 0 for any card)
  const dates = new Set();
  C.forEach(c => { if (c.lr) dates.add(c.lr); });
  const sorted = [...dates].sort().reverse();
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < sorted.length; i++) {
    const d = new Date(sorted[i]);
    const expected = new Date(today);
    expected.setDate(expected.getDate() - i);
    if (d.toISOString().slice(0,10) === expected.toISOString().slice(0,10)) streak++;
    else break;
  }
  return streak;
}

function buildCalendar() {
  const today = new Date();
  let html = '<div class="cal-grid">';
  const dows = ['一','二','三','四','五','六','日'];
  dows.forEach(d => { html += '<div class="cal-dow">' + d + '</div>'; });

  const dayCount = {};
  C.forEach(c => { if (c.lr) { dayCount[c.lr] = (dayCount[c.lr]||0) + 1; } });

  const start = new Date(today);
  start.setDate(start.getDate() - 29);
  const dayOfWeek = start.getDay();
  const alignStart = new Date(start);
  alignStart.setDate(alignStart.getDate() - dayOfWeek);

  for (let d = new Date(alignStart); d <= today; d.setDate(d.getDate() + 1)) {
    const ds = d.toISOString().slice(0,10);
    const count = dayCount[ds] || 0;
    const isToday = ds === today.toISOString().slice(0,10);
    let bg = 'var(--bg)';
    if (count > 0) {
      if (count <= 3) bg = '#c8e6c9';
      else if (count <= 9) bg = '#81c784';
      else bg = '#388e3c';
    }
    if (ds > today.toISOString().slice(0,10)) bg = 'transparent';
    const tc = count > 3 ? '#fff' : 'var(--soft)';
    html += '<div class="cal-cell' + (isToday?' today':'') + '" style="background:' + bg + ';color:' + tc + '">' + d.getDate() + '</div>';
  }
  html += '</div>';
  return html;
}
