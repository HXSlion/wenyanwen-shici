/* Poetry Module - injected separately to avoid f-string escaping issues */
var curPoem = null, curPtTab = 'r', ptSegI = 0, ptqMode = 'c', ptdMode = 'i';
var ptDiff = 40;
var ptqData = null;

function buildPoetryHome() {
  const g = document.getElementById('pt-mod-list'); g.innerHTML = '';
  POETRY.modules.forEach((mod, mi) => {
    const sec = document.createElement('div');
    sec.className = 'pt-mod';
    const bodyHtml = mod.poems.map((p, pi) => {
      const chars = p.body.reduce((s, segs) => s + segs.reduce((ss, seg) => ss + seg.t.length, 0), 0);
      return '<div class="pt-poem-item" onclick="enterPoem(' + mi + ',' + pi + ')">' +
        '<div class="pt-icon">' + p.title.charAt(0) + '</div>' +
        '<div class="pt-info">' +
          '<div class="pt-title">' + p.title + '</div>' +
          '<div class="pt-meta">' + p.author + ' \u00b7 ' + chars + '\u5b57</div>' +
        '</div>' +
        (function(){ try { var read = JSON.parse(localStorage.getItem('_poetryRead') || '[]'); return read.indexOf(p.title) >= 0 ? '<span class="pt-status">\u5df2\u8bfb</span>' : ''; } catch(e){return '';} })() +
      '</div>';
    }).join('');
    sec.innerHTML =
      '<div class="pt-mod-hdr" onclick="this.nextElementSibling.classList.toggle(\'o\');this.querySelector(\'.arrow\').classList.toggle(\'o\')">' +
        '<span class="arrow">\u25b6</span>' +
        '<span style="font-family:var(--serif);font-weight:700">' + mod.module_num + '\u3001' + mod.name + '</span>' +
        '<span style="font-size:.75rem;color:var(--soft)">' + mod.poems.length + '\u7bc7</span>' +
      '</div>' +
      '<div class="pt-mod-body">' + bodyHtml + '</div>';
    g.appendChild(sec);
  });
}

function enterPoem(mi, pi) {
  curPoem = POETRY.modules[mi].poems[pi];
  ptSegI = 0;
  // Track poem read
  var read = JSON.parse(localStorage.getItem('_poetryRead') || '[]');
  if (read.indexOf(curPoem.title) < 0) { read.push(curPoem.title); localStorage.setItem('_poetryRead', JSON.stringify(read)); }
  document.getElementById('pth').style.display = 'none';
  document.getElementById('ptv').style.display = 'flex';
  document.getElementById('ptv-title').textContent = '\u300a' + curPoem.title + '\u300b';
  const src = curPoem.source ? ' \u00b7 ' + curPoem.source : '';
  document.getElementById('ptv-auth').textContent = curPoem.author + src;
  ptSwitch('r');
}

function ptSwitch(tab) {
  curPtTab = tab;
  document.querySelectorAll('.ptv-tab').forEach(b => b.classList.toggle('act', b.dataset.pt === tab));
  const body = document.getElementById('ptv-body');
  if (tab === 'r') showPtRead(body);
  else if (tab === 'q') showPtQuiz(body);
  else if (tab === 'd') showPtDict(body);
  else if (tab === 'u') showPtUD(body);
  // Clear dictation state when leaving full-dictation tab
  if (tab !== 'd') window._ptdData = null;
}

function getPtSegments() {
  const segs = [];
  let cur = [];
  let len = 0;
  curPoem.body.forEach(line => {
    line.forEach(seg => {
      cur.push(seg);
      len += seg.t.length;
      if (len >= 50 && /[\u3002\uff01\uff1f\uff1b\n\u201d]/.test(seg.t.slice(-1))) {
        segs.push(cur);
        cur = [];
        len = 0;
      }
    });
  });
  if (cur.length) segs.push(cur);
  return segs;
}

function renderSegText(segs, opts) {
  opts = opts || {};
  let html = '';
  var errSet = (opts.showErrors && curPoem && curPoem.errorChars) ? new Set(curPoem.errorChars) : null;
  segs.forEach(seg => {
    let t = seg.t;
    if (seg.u && !opts.showSkip) return;
    if (seg.b && opts.showBold) t = '<span class="bold-char">' + t + '</span>';
    if (seg.u && opts.showSkip) t = '<span class="skip-char">' + t + '</span>';
    if (errSet) {
      t = t.split('').map(function(ch) {
        return errSet.has(ch) ? '<span class="err-char">' + ch + '</span>' : ch;
      }).join('');
    }
    html += t;
  });
  return html;
}

function showPtRead(body) {
  const segs = getPtSegments();
  if (!segs.length) { body.innerHTML = '<div class="pt-empty">\u6682\u65e0\u5185\u5bb9</div>'; return; }
  if (ptSegI >= segs.length) ptSegI = segs.length - 1;
  const seg = segs[ptSegI];
  body.innerHTML =
    '<div class="ptv-seg">' + renderSegText(seg, {showBold:true, showSkip:true, showErrors:true}) + '</div>' +
    '<div class="ptv-nav">' +
      '<button onclick="ptNavSeg(-1)"' + (ptSegI===0?' disabled':'') + '>\u25c0 \u4e0a\u4e00\u6bb5</button>' +
      '<span>' + (ptSegI+1) + ' / ' + segs.length + '</span>' +
      '<button onclick="ptNavSeg(1)"' + (ptSegI>=segs.length-1?' disabled':'') + '>\u4e0b\u4e00\u6bb5 \u25b6</button>' +
    '</div>';
}


function showPtQuiz(body) {
  const segs = getPtSegments();
  if (ptSegI >= segs.length) ptSegI = segs.length - 1;
  const seg = segs[ptSegI]; // only current segment
  const chars = [];
  seg.forEach(function(s) {
    for (var i = 0; i < s.t.length; i++) {
      chars.push({ch: s.t[i], b: s.b, u: s.u});
    }
  });
  const punct = /[\uff0c\u3002\uff01\uff1f\uff1b\u3001\uff1a\u201c\u201d\u300c\u300d\uff08\uff09\u300a\u300b\s\n\r\t ]/;
  const candidates = chars.filter(function(c) { return !c.u && !punct.test(c.ch); });
  const blankCount = Math.max(1, Math.round(candidates.length * ptDiff / 100));
  const indices = new Set();
  while (indices.size < blankCount) indices.add(Math.floor(Math.random() * candidates.length));
  const blankSet = new Set(Array.from(indices).map(function(i) { return chars.indexOf(candidates[i]); }));
  ptqData = { chars: chars, blankSet: blankSet, blankCount: blankCount, answered: new Set(), correct: 0, wrong: 0, _answers: {}, currentIdx: -1 };
  for (var i = 0; i < chars.length; i++) {
    if (blankSet.has(i)) { ptqData.currentIdx = i; break; }
  }
  renderPtQuiz(body);
}

function ptqNextBlank() {
  var d = ptqData;
  for (var i = d.currentIdx + 1; i < d.chars.length; i++) {
    if (d.blankSet.has(i) && !d.answered.has(i)) {
      d.currentIdx = i;
      return true;
    }
  }
  d.currentIdx = -1;
  return false;
}

function ptNavSeg(d) {
  ptSegI += d;
  // Go back to quiz tab if in quiz mode
  if (curPtTab === 'q') showPtQuiz(document.getElementById('ptv-body'));
  else showPtRead(document.getElementById('ptv-body'));
  document.querySelectorAll('.ptv-tab').forEach(function(b) { return b.classList.toggle('act', b.dataset.pt === curPtTab); });
}

function renderPtQuiz(body) {
  var d = ptqData;
  var segs = getPtSegments();
  var html = '<div class="ptq-toolbar">' +
    '<span class="ptq-label">\u96be\u5ea6\uff1a</span>' +
    '<button class="ptv-tab' + (ptDiff===40?' act':'') + '" onclick="ptDiff=40;showPtQuiz(document.getElementById(\'ptv-body\'))">40%</button>' +
    '<button class="ptv-tab' + (ptDiff===80?' act':'') + '" onclick="ptDiff=80;showPtQuiz(document.getElementById(\'ptv-body\'))">80%</button>' +
    '<span class="ptq-label" style="margin-left:12px">\u6a21\u5f0f\uff1a</span>' +
    '<button class="ptv-tab' + (ptqMode==='c'?' act':'') + '" onclick="ptqMode=\'c\';renderPtQuiz(document.getElementById(\'ptv-body\'))">\u9009\u62e9</button>' +
    '<button class="ptv-tab' + (ptqMode==='i'?' act':'') + '" onclick="ptqMode=\'i\';renderPtQuiz(document.getElementById(\'ptv-body\'))">\u8f93\u5165</button>' +
    '<span style="margin-left:auto;font-size:.75rem;color:var(--soft)">\u2705' + d.correct + ' \u274c' + d.wrong + ' / ' + d.blankCount + '</span>' +
  '</div>';

  html += '<div class="ptq-text" id="ptq-text">';
  d.chars.forEach((c, i) => {
    if (d.blankSet.has(i)) {
      const answered = d.answered.has(i);
      const isCorrect = answered && d._answers[i] === c.ch;
      const isCurrent = !answered && i === d.currentIdx;
      html += '<span class="ptq-char">';
      if (ptqMode === 'c') {
        if (answered) {
          html += '<span class="ptq-answered' + (isCorrect ? ' correct' : ' wrong') + '">' + (d._answers[i] || '') + '</span>';
        } else {
          html += '<span class="ptq-blank' + (isCurrent ? ' cur' : '') + '" onclick="ptqSetCurrent(' + i + ')"></span>';
        }
      } else {
        if (answered) {
          html += '<span class="ptq-answered' + (isCorrect ? ' correct' : ' wrong') + '">' + (d._answers[i] || '') + '</span>';
        } else {
          html += '<input class="ptd-blank" style="width:1.2em" maxlength="1" data-ptq-i="' + i + '" onblur="ptqCheckInput(this,' + i + ')" onkeydown="ptqInputKey(event,' + i + ')">';
        }
      }
      html += '</span>';
    } else {
      let t = c.ch;
      if (c.b) t = '<span class="bold-char">' + t + '</span>';
      if (c.u) t = '<span class="skip-char">' + t + '</span>';
      html += t;
    }
  });
  html += '</div>';

  // Segment navigation
  html += '<div class="ptv-nav">' +
    '<button onclick="ptNavSeg(-1)"' + (ptSegI===0?' disabled':'') + '>\u25c0 \u4e0a\u4e00\u6bb5</button>' +
    '<span>' + (ptSegI+1) + ' / ' + segs.length + '</span>' +
    '<button onclick="ptNavSeg(1)"' + (ptSegI>=segs.length-1?' disabled':'') + '>\u4e0b\u4e00\u6bb5 \u25b6</button>' +
  '</div>';

  // Choice area below text
  if (ptqMode === 'c' && d.currentIdx >= 0) {
    const curCh = d.chars[d.currentIdx].ch;
    const pool = d.chars.filter((c2, i2) => !d.blankSet.has(i2) && c2.ch !== curCh && c2.ch.length === 1 && !/[\uff0c\u3002\uff01\uff1f\uff1b\u3001\uff1a\u201c\u201d\u300c\u300d\uff08\uff09\u300a\u300b\s]/.test(c2.ch));
    const shuffled = pool.sort(function(){return Math.random()-0.5}).slice(0, 3).map(function(c2){return c2.ch});
    const opts = [curCh].concat(shuffled).sort(function(){return Math.random()-0.5});
    const keys = ['A','S','D','F'];
    html += '<div class="ptq-choice-bar">';
    html += opts.map(function(o, oi) {
      return '<button class="ptq-choice-btn" onclick="ptqPick(this,\'' + o.replace(/'/g, "\\'") + '\',' + d.currentIdx + ')">' + o + '</button>';
    }).join('');
    html += '</div>';
    // Keyboard hint bar below choices
    html += '<div class="ptq-keybar">快捷键：' +
      '<kbd>A</kbd><kbd>S</kbd><kbd>D</kbd><kbd>F</kbd> 选择 · ' +
      '<kbd>←</kbd><kbd>→</kbd> 切换段落' +
    '</div>';
  }

  if (d.answered.size >= d.blankCount) {
    const pct = Math.round(d.correct / d.blankCount * 100);
    html += '<div style="text-align:center;margin-top:12px;font-size:.9rem">\u5b8c\u6210\uff01\u6b63\u786e\u7387 <strong>' + pct + '%</strong> \uff08' + d.correct + '/' + d.blankCount + '\uff09</div>';
  }

  body.innerHTML = html;
  // Auto-focus first input in input mode
  if (ptqMode === 'i') {
    const first = body.querySelector('.ptd-blank');
    if (first) setTimeout(function(){first.focus()}, 50);
  }
}

function ptqSetCurrent(idx) {
  ptqData.currentIdx = idx;
  renderPtQuiz(document.getElementById('ptv-body'));
}

function ptqPick(btn, ch, idx) {
  const d = ptqData;
  if (ch !== d.chars[idx].ch) {
    d.wrong++;
    btn.classList.add('shake');
    setTimeout(function(){btn.classList.remove('shake')}, 500);
    return;
  }
  d._answers[idx] = ch;
  d.answered.add(idx);
  d.correct++;
  ptqNextBlank();
  renderPtQuiz(document.getElementById('ptv-body'));
}

function ptqCheckInput(el, idx) {
  const d = ptqData;
  const val = el.value;
  if (!val || !val.trim()) return;
  if (val !== d.chars[idx].ch) {
    d.wrong++;
    el.classList.add('shake');
    var self = el;
    setTimeout(function(){self.classList.remove('shake'); self.value = ''; self.focus();}, 450);
    return;
  }
  d._answers[idx] = val;
  d.answered.add(idx);
  d.correct++;
  ptqNextBlank();
  renderPtQuiz(document.getElementById('ptv-body'));
}

function ptqInputKey(ev, idx) {
  if (ev.key === 'Enter') {
    ptqCheckInput(ev.target, idx);
  }
}

function showPtDict(body) {
  const allSegs = curPoem.body.flat();
  const chars = [];
  allSegs.forEach(seg => { for (let i = 0; i < seg.t.length; i++) chars.push(seg.t[i]); });

  const punct = /[\uff0c\u3002\uff01\uff1f\uff1b\u3001\uff1a\u201c\u201d\u300c\u300d\uff08\uff09\u300a\u300b\n\r\t ]/;

  // Preserve state across mode switches for the same poem
  if (!window._ptdData || window._ptdData.poemTitle !== curPoem.title) {
    const candidates = [];
    chars.forEach(function(ch, i) { if (!punct.test(ch)) candidates.push(i); });
    window._ptdData = { poemTitle: curPoem.title, chars: chars, candidates: candidates, answered: {}, correct: 0, wrong: 0, total: candidates.length };
  }
  var d = window._ptdData;

  var modeHtml = '<div class="ptq-toolbar" style="margin-bottom:8px">' +
    '<span class="ptq-label">\u6a21\u5f0f\uff1a</span>' +
    '<button class="ptv-tab' + (ptdMode==='c'?' act':'') + '" onclick="ptdMode=\'c\';showPtDict(document.getElementById(\'ptv-body\'))">\u9009\u62e9</button>' +
    '<button class="ptv-tab' + (ptdMode==='i'?' act':'') + '" onclick="ptdMode=\'i\';showPtDict(document.getElementById(\'ptv-body\'))">\u8f93\u5165</button>' +
    '<span style="margin-left:auto;font-size:.75rem;color:var(--soft)" id="ptd-progress">\u2705 ' + d.correct + ' \u274c ' + d.wrong + ' / ' + d.total + '</span>' +
  '</div>';

  if (ptdMode === 'i') {
    let html = modeHtml + '<div style="margin-bottom:8px;font-size:.85rem;color:var(--soft);text-align:center">\u9010\u5b57\u586b\u5199\u5168\u6587 \u00b7 \u6807\u70b9\u7b26\u53f7\u5df2\u81ea\u52a8\u586b\u5165</div><div class="ptd-text" id="ptd-text">';
    chars.forEach((ch, i) => {
      if (punct.test(ch)) {
        html += '<span style="color:var(--soft)">' + ch + '</span>';
      } else {
        var a = d.answered[i];
        if (a !== undefined) {
          var cls = a === ch ? 'correct' : 'wrong';
          html += '<input class="ptd-blank ' + cls + '" style="width:1.1em" maxlength="1" data-ptd-i="' + i + '" value="' + a + '" oninput="ptdCheck(this,' + i + ')">';
        } else {
          html += '<input class="ptd-blank" style="width:1.1em" maxlength="1" data-ptd-i="' + i + '" oninput="ptdCheck(this,' + i + ')">';
        }
      }
    });
    html += '</div>';
    html += '<div style="text-align:center;margin-top:12px"><button class="ptv-tab" onclick="ptdGrade()">\ud83d\udcca \u6279\u6539</button> <button class="ptv-tab" onclick="ptdReveal()">\ud83d\udc41 \u663e\u793a\u7b54\u6848</button></div>';
    html += '<div id="ptd-result" style="text-align:center;margin-top:8px;font-size:.85rem"></div>';
    body.innerHTML = html;
  } else {
    // Choice mode: show text with clickable blanks
    let html = modeHtml + '<div class="ptd-text" id="ptd-text">';
    var d = window._ptdData;
    chars.forEach((ch, i) => {
      if (punct.test(ch)) {
        html += '<span style="color:var(--soft)">' + ch + '</span>';
      } else {
        var a = d.answered[i];
        if (a !== undefined) {
          var cls = a === ch ? 'ptd-blank ptd-done correct' : 'ptd-blank ptd-done wrong';
          html += '<span class="' + cls + '" style="width:1.1em;display:inline-block;text-align:center;font-size:.85rem;border-radius:3px;cursor:default">' + a + '</span>';
        } else {
          html += '<span class="ptd-blank ptd-gap" data-ptd-i="' + i + '" onclick="ptdPickChoice(' + i + ')" style="width:1.1em;display:inline-block;text-align:center;border-bottom:2px solid var(--accent);cursor:pointer;color:transparent">_</span>';
        }
      }
    });
    html += '</div>';
    html += '<div id="ptd-choices" style="text-align:center;margin-top:12px;min-height:36px"></div>';
    html += '<div style="text-align:center;margin-top:6px"><button class="ptv-tab" onclick="ptdReveal()">\ud83d\udc41 \u663e\u793a\u7b54\u6848</button></div>';
    body.innerHTML = html;
    // Auto-trigger first gap
    if (window._ptdRevealTimer) clearTimeout(window._ptdRevealTimer);
    window._ptdRevealTimer = setTimeout(function() {
      var firstGap = document.querySelector('.ptd-gap');
      if (firstGap) { firstGap.scrollIntoView({behavior:'smooth',block:'center'}); ptdPickChoice(parseInt(firstGap.dataset.ptdI)); }
    }, 100);
  }
}

function ptdPickChoice(idx) {
  var d = window._ptdData;
  if (d.answered[idx] !== undefined) return;
  var correct = d.chars[idx];
  // Generate 3 distractors from other candidates
  var pool = d.candidates.filter(function(i) { return i !== idx && d.answered[i] === undefined; });
  var distractors = [];
  var used = new Set([correct]);
  while (distractors.length < 3 && pool.length > 0) {
    var ri = Math.floor(Math.random() * pool.length);
    var ch = d.chars[pool[ri]];
    if (!used.has(ch)) { distractors.push(ch); used.add(ch); }
    pool.splice(ri, 1);
  }
  while (distractors.length < 3) { distractors.push('\u25cb'); }
  var opts = [correct].concat(distractors).sort(function() { return Math.random() - 0.5; });
  var html = opts.map(function(o, oi) {
    return '<button class="ptq-choice-btn" onclick="ptdSubmitChoice(' + idx + ',\'' + o.replace(/'/g, "\\'") + '\')">' + o + '</button>';
  }).join('');
  html += '<div class="ptq-keybar">\u5feb\u6377\u952e\uff1a<kbd>A</kbd><kbd>S</kbd><kbd>D</kbd><kbd>F</kbd> \u9009\u62e9</div>';
  document.getElementById('ptd-choices').innerHTML = html;
}

function ptdSubmitChoice(idx, chosen) {
  var d = window._ptdData;
  if (d.answered[idx] !== undefined) return;
  var correct = d.chars[idx];
  var gapEl = document.querySelector('.ptd-gap[data-ptd-i="' + idx + '"]');
  d.answered[idx] = chosen;
  if (chosen === correct) {
    d.correct++;
    if (gapEl) {
      gapEl.className = 'ptd-blank ptd-done correct';
      gapEl.textContent = chosen;
      gapEl.style.cssText = 'width:1.1em;display:inline-block;text-align:center;font-size:.85rem;border-radius:3px;cursor:default';
    }
  } else {
    d.wrong++;
    if (gapEl) {
      gapEl.className = 'ptd-blank ptd-done wrong';
      gapEl.textContent = chosen;
      gapEl.style.cssText = 'width:1.1em;display:inline-block;text-align:center;font-size:.85rem;border-radius:3px;cursor:default';
    }
  }
  document.getElementById('ptd-progress').textContent = '\u2705 ' + d.correct + ' \u274c ' + d.wrong + ' / ' + d.total;

  // Find next unanswered blank
  var next = -1;
  for (var i = idx + 1; i < d.chars.length; i++) {
    if (d.candidates.indexOf(i) >= 0 && d.answered[i] === undefined) { next = i; break; }
  }
  if (next < 0) {
    for (var i = 0; i < idx; i++) {
      if (d.candidates.indexOf(i) >= 0 && d.answered[i] === undefined) { next = i; break; }
    }
  }
  if (next >= 0) {
    var nextGap = document.querySelector('.ptd-gap[data-ptd-i="' + next + '"]');
    if (nextGap) {
      nextGap.scrollIntoView({behavior:'smooth', block:'center'});
      ptdPickChoice(next);
    }
  } else {
    document.getElementById('ptd-choices').innerHTML = '<div style="font-size:.85rem;color:var(--accent);margin-top:8px">\u5168\u90e8\u5b8c\u6210\uff01</div>';
  }
}

function ptdCheck(el, idx) {
  const allSegs = curPoem.body.flat();
  const chars = [];
  allSegs.forEach(seg => { for (let i = 0; i < seg.t.length; i++) chars.push(seg.t[i]); });
  if (el.value === chars[idx]) {
    el.classList.add('correct');
    el.classList.remove('wrong');
  } else if (el.value) {
    el.classList.add('wrong');
    el.classList.remove('correct');
  } else {
    el.classList.remove('correct', 'wrong');
  }
}

function ptdGrade() {
  const allSegs = curPoem.body.flat();
  const chars = [];
  allSegs.forEach(seg => { for (let i = 0; i < seg.t.length; i++) chars.push(seg.t[i]); });
  const inputs = document.querySelectorAll('.ptd-blank');
  let correct = 0, total = 0;
  inputs.forEach(inp => {
    const idx = parseInt(inp.dataset.ptdI);
    total++;
    if (inp.value === chars[idx]) { correct++; inp.classList.add('correct'); }
    else { inp.classList.add('wrong'); }
  });
  const pct = Math.round(correct / total * 100);
  document.getElementById('ptd-result').innerHTML = '\u6b63\u786e <strong>' + correct + '</strong>/' + total + ' = <strong>' + pct + '%</strong>';
}

function ptdReveal() {
  const allSegs = curPoem.body.flat();
  const chars = [];
  allSegs.forEach(seg => { for (let i = 0; i < seg.t.length; i++) chars.push(seg.t[i]); });

  if (ptdMode === 'i') {
    // Input mode: only fill blank (empty) inputs, don't overwrite user input
    document.querySelectorAll('.ptd-blank').forEach(function(inp) {
      if (!inp.value) {
        const idx = parseInt(inp.dataset.ptdI);
        inp.value = chars[idx];
        inp.classList.add('correct');
        inp.classList.remove('wrong');
      }
    });
  } else {
    // Choice mode: fill all unanswered gaps, show corrections for wrong answers
    var d = window._ptdData;
    if (!d) return;

    // Fill unanswered gaps
    document.querySelectorAll('.ptd-gap').forEach(function(el) {
      var i = parseInt(el.dataset.ptdI);
      d.answered[i] = chars[i];
      d.correct++;
      el.className = 'ptd-blank ptd-done correct';
      el.textContent = chars[i];
      el.style.cssText = 'width:1.1em;display:inline-block;text-align:center;font-size:.85rem;border-radius:3px;cursor:default';
    });
    // Show correction overlay for wrong answers
    document.querySelectorAll('.ptd-done.wrong').forEach(function(el) {
      var i = parseInt(el.dataset.ptdI);
      el.dataset.ptdCorrect = chars[i];
      el.style.position = 'relative';
    });
    document.getElementById('ptd-choices').innerHTML = '';
    document.getElementById('ptd-progress').textContent = '\u2705 ' + d.correct + ' \u274c ' + d.wrong + ' / ' + d.total;
    // Clear the auto-trigger timeout so it doesn't interfere
    if (window._ptdRevealTimer) clearTimeout(window._ptdRevealTimer);
  }
}

// ===== UNDERSTANDING DICTATION =====
var ptuData = null; // {poemQuestions, currentIdx, answered: {}}

function showPtUD(body) {
  // Find DICTATION questions for current poem
  var pq = null;
  for (var i = 0; i < DICTATION.length; i++) {
    if (DICTATION[i].title === curPoem.title) { pq = DICTATION[i]; break; }
  }
  if (!pq || !pq.questions || pq.questions.length === 0) {
    body.innerHTML = '<div class="pt-empty">\u6682\u65e0\u7406\u89e3\u6027\u9ed8\u5199\u9898\u76ee</div>';
    return;
  }
  ptuData = { poem: pq, currentIdx: 0, answered: {}, correct: 0, wrong: 0, total: pq.questions.length };
  renderPtUD(body);
}

function renderPtUD(body) {
  var d = ptuData;
  var q = d.poem.questions[d.currentIdx];
  var isDone = d.answered[d.currentIdx] !== undefined;
  var isCorrect = isDone && d.answered[d.currentIdx].correct;

  var html = '<div class="ptu-box">';
  html += '<div class="ptu-progress">' + (d.currentIdx + 1) + ' / ' + d.total + ' \u00b7 \u2705' + d.correct + ' \u274c' + d.wrong + '</div>';
  html += '<div class="ptu-q"><span class="ptu-q-num">' + (d.currentIdx + 1) + '</span>' + q.question + '</div>';

  if (isDone) {
    var cls = isCorrect ? 'correct' : 'wrong';
    html += '<div class="ptu-feedback ' + cls + '">' + (isCorrect ? '\u2705 \u56de\u7b54\u6b63\u786e\uff01' : '\u274c \u56de\u7b54\u9519\u8bef') + '</div>';
    if (!isCorrect) {
      html += '<div class="ptu-answer">\u6b63\u786e\u7b54\u6848\uff1a' + q.answer + '</div>';
    }
    html += '<div class="ptu-input" style="cursor:default;opacity:.8">' + d.answered[d.currentIdx].input + '</div>';
  } else {
    html += '<div class="ptu-input-wrap">';
    html += '<input class="ptu-input" id="ptu-input" placeholder="\u8f93\u5165\u5bf9\u5e94\u8bd7\u53e5..." onkeydown="ptuInputKey(event)">';
    html += '<button class="ptv-tab" onclick="ptuCheck()">\u786e\u5b9a</button>';
    html += '</div>';
    html += '<div style="text-align:center;font-size:.72rem;color:var(--soft)">\u6309 Enter \u786e\u8ba4 \u00b7 \u82e5\u591a\u53e5\u7528\u82f1\u6587\u9017\u53f7\u5206\u9694</div>';
  }

  html += '<div class="ptu-nav">';
  html += '<button onclick="ptuNav(-1)"' + (d.currentIdx===0?' disabled':'') + '>\u25c0 \u4e0a\u4e00\u9898</button>';
  html += '<button onclick="ptuReveal()">\u663e\u793a\u7b54\u6848</button>';
  html += '<button onclick="ptuNav(1)"' + (d.currentIdx>=d.total-1?' disabled':'') + '>\u4e0b\u4e00\u9898 \u25b6</button>';
  html += '</div></div>';

  body.innerHTML = html;
  if (!isDone) {
    var inp = document.getElementById('ptu-input');
    if (inp) setTimeout(function(){inp.focus()}, 50);
  }
}

function ptuInputKey(ev) {
  if (ev.key === 'Enter') {
    ev.preventDefault();
    ptuCheck();
  }
}

function ptuCheck() {
  var inp = document.getElementById('ptu-input');
  if (!inp) return;
  var input = inp.value.trim();
  if (!input) return;
  var q = ptuData.poem.questions[ptuData.currentIdx];
  var correct = normalizeAnswer(input) === normalizeAnswer(q.answer);
  ptuData.answered[ptuData.currentIdx] = { input: input, correct: correct };
  if (correct) ptuData.correct++; else ptuData.wrong++;
  ptuSaveProgress();
  renderPtUD(document.getElementById('ptv-body'));
}

function ptuReveal() {
  if (ptuData.answered[ptuData.currentIdx] !== undefined) return;
  ptuData.answered[ptuData.currentIdx] = { input: '', correct: false };
  ptuData.wrong++;
  renderPtUD(document.getElementById('ptv-body'));
}

function ptuNav(d) {
  ptuData.currentIdx += d;
  renderPtUD(document.getElementById('ptv-body'));
}

function normalizeAnswer(s) {
  // Remove punctuation, extra spaces, book title marks
  return s.replace(/[\u300a\u300b\u300c\u300d\u201c\u201d\uff0c\u3002\uff01\uff1f\uff1b\u3001\uff1a\uff08\uff09\n\r\t ]/g, '').trim();
}

function ptuSaveProgress() {
  var d = ptuData;
  if (!d || !d.poem) return;
  var key = 'ud_' + d.poem.title;
  var ud = JSON.parse(localStorage.getItem('_udData') || '{}');
  ud[key] = {total: d.total, answered: Object.keys(d.answered).length, correct: d.correct, updated: new Date().toISOString().slice(0,10)};
  localStorage.setItem('_udData', JSON.stringify(ud));
}


// Global keyboard shortcut for choice mode: A/B/C/D to pick option

var pexData = null; // {items: [...], currentIdx, correct, wrong, total, mode}

function enterExamReview() {
  document.getElementById('pth').style.display = 'none';
  document.getElementById('ptv').style.display = 'none';
  var home = document.querySelector('.pt-home');
  if (home) home.style.display = 'none';
  var ex = document.getElementById('pt-exam');
  ex.style.display = 'flex';
  
  // Load key sentences - defined in main script
  var sentences = [];
  try {
    sentences = KEY_SENTENCES || [];
    console.log('KEY_SENTENCES loaded:', sentences.length);
  } catch(e) {
    console.log('KEY_SENTENCES error:', e.message);
    sentences = [];
  }
  if (!sentences || sentences.length === 0) {
    document.getElementById('pex-body').innerHTML = '<div style="padding:40px;text-align:center;color:var(--soft)">暂无数据</div>';
    return;
  }
  
  // Build question pool: mix sentence pairs with understanding dictation
  var pool = [];
  sentences.forEach(function(s) {
    pool.push({type:'sentence', data:s});
  });
  // Add understanding dictation questions
  try {
    if (DICTATION && DICTATION.length) {
      DICTATION.forEach(function(d) {
        d.questions.forEach(function(q) {
          pool.push({type:'dictation', data:q, poemTitle:d.title});
        });
      });
    }
  } catch(e) {}
  
  // Shuffle
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  
  pexData = { items: pool, idx: 0, correct: 0, wrong: 0, total: pool.length };
  document.getElementById('pex-result').style.display = 'none';
  document.getElementById('pex-main').style.display = 'block';
  pexNext();
}

function closeExamReview() {
  var ex = document.getElementById('pt-exam');
  ex.style.display = 'none';
  // Completely clear all exam content
  ex.innerHTML = '';
  document.getElementById('pth').style.display = 'flex';
  // Switch to poetry sub-nav
  document.getElementById('sub-nav-c').style.display = 'none';
  document.getElementById('sub-nav-p').style.display = 'flex';
  // Activate poetry main tab
  document.querySelectorAll('.main-tab').forEach(function(b) {
    b.classList.toggle('act', b.dataset.main === 'p');
  });
}

function restartExamReview() {
  enterExamReview();
}

function pexNext() {
  var d = pexData;
  if (d.idx >= d.total) {
    // Show result
    document.getElementById('pex-main').style.display = 'none';
    var r = document.getElementById('pex-result');
    r.style.display = 'block';
    document.getElementById('pex-result-stats').innerHTML =
      '正确 <strong>' + d.correct + '</strong> / ' + d.total +
      ' = <strong>' + Math.round(d.correct / d.total * 100) + '%</strong><br>' +
      '错误 <strong>' + d.wrong + '</strong> 题';
    return;
  }
  
  document.getElementById('pex-stats').textContent = (d.idx + 1) + '/' + d.total;
  document.getElementById('pex-progress-bar').style.width = (d.idx / d.total * 100) + '%';
  
  var item = d.items[d.idx];
  var body = document.getElementById('pex-body');
  pexData._locked = false;
  
  if (item.type === 'sentence') {
    pexShowSentence(item.data, d.idx);
  } else {
    pexShowDictation(item.data, item.poemTitle, d.idx);
  }
}

function pexShowSentence(s, idx) {
  pexData._locked = false;
  
  // Random: give upper or lower; random: hide author
  var giveUpper = Math.random() < 0.5;
  var hideAuthor = Math.random() < 0.33;
  
  var correct = giveUpper ? s.lower : s.upper;
  
  var html = '<div class="pex-question">';
  html += '<div class="pex-q-title">';
  html += '<span>' + s.title + '</span>';
  html += '<span style="color:var(--soft)">' + s.dynasty + '</span>';
  if (hideAuthor) {
    html += '<input id="pex-author-input" placeholder="" style="width:4em;padding:0 4px;border:none;border-bottom:2px solid var(--accent);font-size:.78rem;background:transparent;color:var(--text);text-align:center;outline:none">';
  } else {
    html += '<span>' + s.author + '</span>';
  }
  html += '</div>';
  html += '<div class="pex-q-text">';
  if (giveUpper) {
    html += '<span>' + s.upper + '</span>，<span class="blank" id="pex-answer-area"></span>';
  } else {
    html += '<span class="blank" id="pex-answer-area"></span>，<span>' + s.lower + '</span>';
  }
  html += '</div></div>';
  
  // Input area instead of choices
  html += '<textarea class="pex-input" id="pex-input" placeholder="输入答案..." rows="1"></textarea>';
  html += '<div class="pex-feedback" id="pex-fb"></div>';
  html += '<div class="pex-btns">';
  html += '<button class="pex-btn" onclick="pexSubmitSentence()">提交</button>';
  html += '<button class="pex-btn secondary" onclick="pexRevealSentence()">显示答案</button>';
  html += '<button class="pex-btn secondary" onclick="pexNext()" id="pex-skip-btn" style="display:none">下一题 →</button>';
  html += '</div>';
  
  var body = document.getElementById('pex-body');
  body.innerHTML = html;
  
  // Focus input
  var inp = document.getElementById('pex-input');
  if (inp) setTimeout(function() { inp.focus(); }, 50);
  
  // Keyboard support: Enter to submit
  var keyHandler = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      pexSubmitSentence();
    }
  };
  if (inp) inp.addEventListener('keydown', keyHandler);
  
  pexData._correct = correct;
  pexData._author = s.author;
  pexData._hideAuthor = hideAuthor;
  pexData._locked = false;
}

function pexSubmitSentence() {
  if (pexData._locked) return;
  var inp = document.getElementById('pex-input');
  var fb = document.getElementById('pex-fb');
  var authorInput = document.getElementById('pex-author-input');
  var correct = pexData._correct;
  
  var val = inp ? inp.value.trim() : '';
  var authorVal = authorInput ? authorInput.value.trim() : '';
  
  // If both are completely empty, don't submit
  if (!val && (!authorInput || !authorVal)) return;
  
  pexData._locked = true;
  
  // Check main answer
  var mainOk = false;
  if (val) {
    var normInput = val.replace(/[\u300a\u300b\u300c\u300d\u201c\u201d\uff0c\u3002\uff01\uff1f\uff1b\u3001\uff1a\uff08\uff09\n\r\t ,.;:!?]/g, '').trim();
    var normCorrect = correct.replace(/[\u300a\u300b\u300c\u300d\u201c\u201d\uff0c\u3002\uff01\uff1f\uff1b\u3001\uff1a\uff08\uff09\n\r\t ,.;:!?]/g, '').trim();
    mainOk = normInput === normCorrect || normCorrect.indexOf(normInput) >= 0;
  }
  
  // Check author
  console.log('authorCheck:', 'inputExists=' + (authorInput ? 'yes' : 'no'), 'inputVal="' + authorVal + '"', 'expected="' + pexData._author + '"');
  var authorOk = !authorInput || authorVal === pexData._author;
  console.log('authorOk=' + authorOk, 'msgs before:', JSON.stringify(msgs));
  
  // Build feedback message
  var msgs = [];
  if (!mainOk) msgs.push('正确答案：' + correct);
  if (!authorOk) msgs.push('作者：' + pexData._author);
  
  if (mainOk && authorOk) {
    pexData.correct++;
    fb.innerHTML = '<span style="color:#27ae60">✓ 正确</span>';
    if (inp) inp.classList.add('correct');
    if (authorInput) authorInput.style.color = '#27ae60';
  } else {
    pexData.wrong++;
    fb.innerHTML = '<span style="color:var(--accent)">✗ ' + msgs.join(' · ') + '</span>';
    if (inp) inp.classList.add('wrong');
    if (authorInput && !authorOk) {
      authorInput.style.color = 'var(--accent)';
    }
  }
  
  pexData.idx++;
  document.getElementById('pex-skip-btn').style.display = 'block';
  if (inp) inp.style.pointerEvents = 'none';
  if (authorInput) authorInput.style.pointerEvents = 'none';
}

function pexRevealSentence() {
  if (pexData._locked) return;
  pexData._locked = true;
  var inp = document.getElementById('pex-input');
  var fb = document.getElementById('pex-fb');
  var authorInput = document.getElementById('pex-author-input');
  if (inp) inp.style.pointerEvents = 'none';
  if (authorInput) authorInput.style.pointerEvents = 'none';
  pexData.wrong++;
  var msg = '答案：' + pexData._correct;
  if (authorInput) msg += ' · 作者：' + pexData._author;
  fb.innerHTML = '<span style="color:var(--accent)">' + msg + '</span>';
  pexData.idx++;
  document.getElementById('pex-skip-btn').style.display = 'block';
}

function pexRevealDictation() {
  if (pexData._locked) return;
  pexData._locked = true;
  var inp = document.getElementById('pex-input');
  var fb = document.getElementById('pex-fb');
  if (inp) inp.style.pointerEvents = 'none';
  pexData.wrong++;
  fb.innerHTML = '<span style="color:var(--accent)">答案：' + pexData._correctAnswer + '</span>';
  pexData.idx++;
  document.getElementById('pex-skip-btn2').style.display = 'block';
}

function pexShowDictation(q, poemTitle, idx) {
  pexData._locked = false;
  var qText = q.question;
  var answer = q.answer;
  var given = q.given || '';
  
  var html = '<div class="pex-question">';
  html += '<div class="pex-q-title"><span>' + poemTitle + '</span><span style="color:var(--soft)">理解性默写</span></div>';
  html += '<div class="pex-q-text">' + qText + '</div></div>';
  html += '<textarea class="pex-input" id="pex-input" placeholder="输入答案..." rows="2"></textarea>';
  html += '<div class="pex-feedback" id="pex-fb"></div>';
  html += '<div class="pex-btns"><button class="pex-btn" onclick="pexSubmitInput()">提交</button>';
  html += '<button class="pex-btn secondary" onclick="pexRevealDictation()">显示答案</button>';
  html += '<button class="pex-btn secondary" onclick="pexSkipInput()" id="pex-skip-btn2" style="display:none">下一题 →</button></div>';
  
  var body = document.getElementById('pex-body');
  body.innerHTML = html;
  var inp = document.getElementById('pex-input');
  if (inp) {
    inp.focus();
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        pexSubmitInput();
      }
    });
  }
  
  pexData._correctAnswer = answer;
  pexData._poemTitle = poemTitle;
}

function pexSubmitInput() {
  if (pexData._locked) return;
  pexData._locked = true;
  
  var input = document.getElementById('pex-input');
  var val = input.value.trim();
  var answer = pexData._correctAnswer;
  var fb = document.getElementById('pex-fb');
  
  // Check if answer contains the input (partial match is OK for dictation)
  var isCorrect = answer.indexOf(val) >= 0 || val.indexOf(answer) >= 0;
  // More strict: if val is empty or too short, it's wrong
  if (val.length < 3) isCorrect = false;
  
  if (isCorrect) {
    pexData.correct++;
    fb.innerHTML = '<span style="color:#27ae60">✓ 正确</span>';
    input.classList.add('correct');
  } else {
    pexData.wrong++;
    fb.innerHTML = '<span style="color:var(--accent)">✗ 答案：' + answer + '</span>';
    input.classList.add('wrong');
  }
  
  pexData.idx++;
  document.getElementById('pex-skip-btn2').style.display = 'block';
  input.style.pointerEvents = 'none';
}

function pexSkipInput() {
  pexData._locked = false;
  pexNext();
}
