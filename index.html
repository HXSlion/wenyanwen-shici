<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== SUPABASE SYNC =====
var _supabase = supabase.createClient(
  'https://gslyywlkdntytbfgznyp.supabase.co',
  'sb_publishable_1H5pVagqgKCTOTho0XvxMg_aEzTUT3W'
);

function toggleSyncPanel() {
  var p = document.getElementById('sync-panel');
  if (p.style.display === 'flex') { p.style.display = 'none'; return; }
  p.style.display = 'flex';
  syncRefreshUI();
}

function syncRefreshUI() {
  document.getElementById('sync-error').textContent = '';
  // Load saved config into inputs
  var urlInput = document.getElementById('sync-su-url');
  var keyInput = document.getElementById('sync-su-key');
  if (urlInput) urlInput.value = getSupabaseUrl();
  if (keyInput) keyInput.value = getSupabaseKey();
  var sessionStr = localStorage.getItem('supabase_session');
  var loggedOut = document.getElementById('sync-logged-out');
  var loggedIn = document.getElementById('sync-logged-in');
  if (sessionStr) {
    try { var session = JSON.parse(sessionStr); if (session.user) {
      loggedOut.style.display = 'none';
      loggedIn.style.display = 'block';
      document.getElementById('sync-user-email').textContent = session.user.email || session.user.id;
      return;
    }} catch(e) {}
  }
  // Check Supabase client session
  if (_supabase) {
    _supabase.auth.getSession().then(function(resp) {
      if (resp.data.session) {
        localStorage.setItem('supabase_session', JSON.stringify(resp.data.session));
        loggedOut.style.display = 'none';
        loggedIn.style.display = 'block';
        document.getElementById('sync-user-email').textContent = resp.data.session.user.email || resp.data.session.user.id;
      } else {
        loggedOut.style.display = 'block';
        loggedIn.style.display = 'none';
        localStorage.removeItem('supabase_session');
      }
    })['catch'](function() {
      loggedOut.style.display = 'block';
      loggedIn.style.display = 'none';
    });
  } else {
    loggedOut.style.display = 'block';
    loggedIn.style.display = 'none';
  }
}



function syncSetError(msg) {
  document.getElementById('sync-error').textContent = msg;
}

function syncLogin() {
  var email = document.getElementById('sync-email').value.trim();
  var pass = document.getElementById('sync-password').value;
  if (!email || !pass) { syncSetError('请输入邮箱和密码'); return; }
  syncSetError('');
  _supabase.auth.signInWithPassword({ email: email, password: pass }).then(function(resp) {
    if (resp.error) { syncSetError(resp.error.message); return; }
    localStorage.setItem('supabase_session', JSON.stringify(resp.data.session));
    syncRefreshUI();
  });
}

function syncRegister() {
  var email = document.getElementById('sync-email').value.trim();
  var pass = document.getElementById('sync-password').value;
  if (!email || !pass) { syncSetError('请输入邮箱和密码'); return; }
  if (pass.length < 6) { syncSetError('密码至少6位'); return; }
  syncSetError('');
  _supabase.auth.signUp({ email: email, password: pass }).then(function(resp) {
    if (resp.error) { syncSetError(resp.error.message); return; }
    syncSetError('注册成功，请查看邮箱确认（或直接登录）');
  });
}

function syncLogout() {
  if (_supabase) {
    _supabase.auth.signOut().then(function() {
      localStorage.removeItem('supabase_session');
      syncRefreshUI();
    });
  } else {
    localStorage.removeItem('supabase_session');
    syncRefreshUI();
  }
}

function syncGetAllData() {
  var keys = ['gkyw_counts_v3', 'gkyw_wrong_v1', 'gkyw_goal_v1', '_udData', '_poetryRead'];
  var data = {};
  keys.forEach(function(k) {
    try {
      var v = localStorage.getItem(k);
      if (v) data[k] = JSON.parse(v);
    } catch(e) {}
  });
  return data;
}

function syncSetAllData(data) {
  Object.keys(data).forEach(function(k) {
    try { localStorage.setItem(k, JSON.stringify(data[k])); } catch(e) {}
  });
}

function syncUpload() {
  if (!_supabase) { syncSetError('未连接'); return; }
  var statusEl = document.getElementById('sync-status');
  statusEl.textContent = '上传中...';
  var data = syncGetAllData();
  var records = Object.keys(data).map(function(k) {
    return { data_key: k, data_value: data[k], updated_at: new Date().toISOString() };
  });
  // Upsert each key
  var promises = records.map(function(r) {
    return _supabase.from('user_sync').upsert(
      { data_key: r.data_key, data_value: r.data_value, updated_at: r.updated_at },
      { onConflict: 'user_id,data_key' }
    );
  });
  Promise.all(promises).then(function(results) {
    var ok = results.filter(function(r) { return !r.error; }).length;
    statusEl.textContent = '上传完成：' + ok + '/' + records.length + ' 项';
    setTimeout(function() { statusEl.textContent = ''; }, 3000);
  })['catch'](function(err) {
    statusEl.textContent = '上传失败';
    syncSetError(String(err));
  });
}

function syncDownload() {
  if (!_supabase) { syncSetError('未连接'); return; }
  var statusEl = document.getElementById('sync-status');
  statusEl.textContent = '下载中...';
  _supabase.from('user_sync').select('data_key,data_value,updated_at').then(function(resp) {
    if (resp.error) { syncSetError(resp.error.message); statusEl.textContent = ''; return; }
    var data = {};
    resp.data.forEach(function(r) { data[r.data_key] = r.data_value; });
    if (Object.keys(data).length === 0) { statusEl.textContent = '云端暂无数据'; return; }
    syncSetAllData(data);
    statusEl.textContent = '下载完成：' + Object.keys(data).length + ' 项';
    // Reload page data
    if (typeof buildChHome === 'function') buildChHome();
    setTimeout(function() { statusEl.textContent = ''; }, 3000);
  })['catch'](function(err) {
    statusEl.textContent = '下载失败';
    syncSetError(String(err));
  });
}

</script>

cān", "d": "检查、省察", "e": "君子博学而日参省乎己。", "s": "（《劝学》）", "ch": "C"}, {"w": "参", "p": "cān", "d": "同“三”", "e": "先王之制，大都不过参国之一。", "s": "（《左 传 隐公元年》）", "ch": "C"}, {"w": "参", "p": "cān", "d": "【参乘】", "e": "在车左右边陪乘：沛公之参乘樊哙者也。", "s": "（《项羽本纪》）", "ch": "C"}, {"w": "参", "p": "cān", "d": "【参差】", "e": "长短不齐的样子：瓦缝参差。", "s": "（《阿房 宫赋》）", "ch": "C"}, {"w": "操", "p": "cāo", "d": "持，拿", "e": "大王来何操？ (《鸿门宴》)", "s": "", "ch": "C"}, {"w": "操", "p": "cāo", "d": "从事……行业", "e": "操童子业。 (《促织》)", "s": "", "ch": "C"}, {"w": "操", "p": "cāo", "d": "品德，操守", "e": "穷不易操。", "s": "（《淮南子·主术》）", "ch": "C"}, {"w": "曹", "p": "cáo", "d": "辈，类", "e": "尔曹身与名俱裂，不废江河万古流。", "s": "（《戏 为六绝句》）", "ch": "C"}, {"w": "曹", "p": "cáo", "d": "分科办事的官署", "e": "品其名位，犹不失下曹从事。", "s": "（《资 治通鉴 赤壁之战》）", "ch": "C"}, {"w": "曾", "p": "céng", "d": "曾经", "e": "臣侍汤药，未曾废离。", "s": "（《陈情表》）", "ch": "C"}, {"w": "曾", "p": "céng", "d": "竟然；连……都", "e": "则天地曾不能以一瞬。", "s": "（《前赤 壁赋》）", "ch": "C"}, {"w": "曾", "p": "céng", "d": "同“增”，增加", "e": "所以动心忍性，曾益其所不能。", "s": "（《生于忧患，死于安乐》）", "ch": "C"}, {"w": "曾", "p": "céng", "d": "同“层”，重叠", "e": "荡胸生曾云。", "s": "（《望岳》）", "ch": "C"}, {"w": "差", "p": "chà", "d": "差别，相差", "e": "且罪等，然以逆顺为差。", "s": "（《张释之 冯唐列传》）", "ch": "C"}, {"w": "差", "p": "chà", "d": "差错，错误", "e": "若有差失，乞斩全家。", "s": "（《失街亭》）", "ch": "C"}, {"w": "差", "p": "chà", "d": "差遣，派遣", "e": "特地差两员官来这里开仓卖米。", "s": "（《陈 州粜米》）", "ch": "C"}, {"w": "差", "p": "chà", "d": "同“瘥”(chai)，病愈", "e": "后虽小差，犹尚，无所娱遣。", "s": "（《祭妹文》）", "ch": "C"}, {"w": "差", "p": "chà", "d": "不齐的样子", "e": "其岸势犬牙差互，不可知其源。", "s": "（《小 石潭记》）", "ch": "C"}, {"w": "察", "p": "chá", "d": "观察、考察", "e": "徐而察之，则山下皆石穴罅。", "s": "（《石 钟山记》）", "ch": "C"}, {"w": "察", "p": "chá", "d": "看清楚", "e": "仰观宇宙之大，俯察品类之盛。", "s": "（《兰亭 集序》）", "ch": "C"}, {"w": "察", "p": "chá", "d": "清楚，明白", "e": "小大之狱，虽不能察，必以情。", "s": "（《曹 刿论战》）", "ch": "C"}, {"w": "察", "p": "chá", "d": "举荐、选拔", "e": "前太守臣逵察臣孝廉，后剌史臣荣举臣 秀才。", "s": "（《陈情表》）", "ch": "C"}, {"w": "觇", "p": "chān", "d": "窥看、侦察", "e": "忽闻门外虫鸣，惊起觇视。", "s": "（《促织》）", "ch": "C"}, {"w": "常", "p": "cháng", "d": "永久的、固定的", "e": "圣人无常师。", "s": "（《师说》）", "ch": "C"}, {"w": "常", "p": "cháng", "d": "经常、一直", "e": "试使斗而才，因责常供。", "s": "（《促织》）", "ch": "C"}, {"w": "常", "p": "cháng", "d": "平常、普通", "e": "而世之奇伟、瑰怪、非常之观。", "s": "（《游 褒禅山记》）", "ch": "C"}, {"w": "常", "p": "cháng", "d": "规律；准则", "e": "天行有常，不为尧存，不为桀亡。", "s": "（《荀 子 天论》）", "ch": "C"}, {"w": "常", "p": "cháng", "d": "长度单位，古代八尺为“寻”，十六尺为“常”。布 帛寻常，庸人不释", "e": "", "s": "（《韩非子 五蠹》）", "ch": "C"}, {"w": "常", "p": "cháng", "d": "通“尝”，曾经", "e": "项伯常杀人，从良匿。", "s": "（《史记 留侯世家》）", "ch": "C"}, {"w": "陈", "p": "chén", "d": "陈列，陈设", "e": "信臣精卒陈利兵而谁何。", "s": "（《过秦论》）", "ch": "C"}, {"w": "陈", "p": "chén", "d": "陈述", "e": "陈情表。", "s": "（《陈情表》）", "ch": "C"}, {"w": "陈", "p": "chén", "d": "同“阵”，军阵（名）、列阵（名作动）", "e": "前未到匈 奴陈二里所。", "s": "（《史记 李将军列传》）", "ch": "C"}, {"w": "陈", "p": "chén", "d": "旧的", "e": "向之所欣，俯仰之间，已为陈迹。", "s": "（《兰亭 集序》）", "ch": "C"}, {"w": "诚", "p": "chéng", "d": "诚心，真心", "e": "必竭诚以待下。", "s": "（《谏太宗十思疏》）", "ch": "C"}, {"w": "诚", "p": "chéng", "d": "确实，的确", "e": "臣诚恐见欺于王而负赵。", "s": "（《廉颇蔺 相如列传》）", "ch": "C"}, {"w": "诚", "p": "chéng", "d": "表示假设，果真", "e": "诚能见可欲，则思知足以自戒。", "s": "（《谏太宗十思疏》）", "ch": "C"}, {"w": "乘", "p": "chéng", "d": "乘坐", "e": "独与迈乘小舟。", "s": "（《石钟山记》）", "ch": "C"}, {"w": "乘", "p": "chéng", "d": "登，升", "e": "具乘高台。", "s": "（《列子 黄帝》）", "ch": "C"}, {"w": "乘", "p": "chéng", "d": "趁着，凭借", "e": "因利乘便，宰割天下，分裂山河。", "s": "（《过 秦论》）", "ch": "C"}, {"w": "乘", "p": "chéng", "d": "一车四马", "e": "然秦以区区之地，致万乘之势。", "s": "（《过 秦论》）", "ch": "C"}, {"w": "乘", "p": "chéng", "d": "四", "e": "以乘韦先，牛十二犒师。", "s": "（《秦晋崤之战》）", "ch": "C"}, {"w": "齿", "p": "chǐ", "d": "岁数，年龄", "e": "退而甘食齐土之有，以尽吾齿。", "s": "（《捕 蛇者说》）", "ch": "C"}, {"w": "齿", "p": "chǐ", "d": "并列，并列", "e": "君子不齿。", "s": "（《师说》）", "ch": "C"}, {"w": "饬", "p": "chì", "d": "整顿，整治", "e": "戎车既饬。", "s": "（《诗经 小雅》）", "ch": "C"}, {"w": "冲", "p": "chōng", "d": "向上冲", "e": "虽无飞，飞必冲天。", "s": "（《韩非子·喻老》）", "ch": "C"}, {"w": "冲", "p": "chōng", "d": "虚，空虚", "e": "大盈若冲，其用不穷。", "s": "（《老子》）", "ch": "C"}, {"w": "冲", "p": "chōng", "d": "谦虚", "e": "皆谦冲节俭。", "s": "（《三国志·魏书·荀彧传》）", "ch": "C"}, {"w": "冲", "p": "chōng", "d": "交通要道", "e": "及冲，击之以戈。 《左传·昭公元年》）", "s": "", "ch": "C"}, {"w": "酬", "p": "choú", "d": "劝酒", "e": "樽前自献自为酬。", "s": "（《念昔游》）", "ch": "C"}, {"w": "酬", "p": "choú", "d": "酬谢，报答", "e": "壮心剖出酬知己。", "s": "（《走笔赠独孤驸马》）", "ch": "C"}, {"w": "酬", "p": "choú", "d": "偿付，偿还", "e": "成安公主夺民园，不酬值。", "s": "（《新唐 书·李朝隐传》）", "ch": "C"}, {"w": "酬", "p": "choú", "d": "实现", "e": "壮志未酬三尺剑。", "s": "（《春日思归》）", "ch": "C"}, {"w": "酬", "p": "choú", "d": "用诗词互相赠答唱和", "e": "酬乐天扬州初逢席上见赠。", "s": "（《酬乐天扬州初逢席上见赠》）", "ch": "C"}, {"w": "出", "p": "chū", "d": "离开京城", "e": "予出官二年。 这个相对比较难，其余的根据语境解释即可。", "s": "（《琵琶行》）", "ch": "C"}, {"w": "除", "p": "chú", "d": "台阶", "e": "扶辇下除,触柱折辕。", "s": "（《汉书·李广苏建传》）", "ch": "C"}, {"w": "除", "p": "chú", "d": "任命，授职", "e": "除臣洗马。", "s": "（《陈情表》）", "ch": "C"}, {"w": "除", "p": "chú", "d": "修治，修整", "e": "将为子除馆于西河，其若之何？", "s": "（《左 传·昭公十三年》）", "ch": "C"}, {"w": "除", "p": "chú", "d": "清除，去除", "e": "诸乱除害。", "s": "（《史记·秦始皇本纪》）", "ch": "C"}, {"w": "黜", "p": "chù", "d": "消除、去掉", "e": "惧谗邪，则思正身以黜恶。", "s": "（《谏太 宗十思疏》）", "ch": "C"}, {"w": "黜", "p": "chù", "d": "贬退", "e": "元和初，以前大理评事言得失黜官。", "s": "（《蓝 田县丞厅壁记》）", "ch": "C"}, {"w": "绌", "p": "chù", "d": "不足", "e": "相形见绌。", "s": "", "ch": "C"}, {"w": "舛", "p": "chuǎn", "d": "相违背、错乱", "e": "时运不齐，命途多舛。", "s": "（《滕王阁 序》）", "ch": "C"}, {"w": "垂", "p": "chuí", "d": "同“陲”，边疆", "e": "边境之臣处，则边垂不丧。", "s": "（《荀 子 臣道》）", "ch": "C"}, {"w": "垂", "p": "chuí", "d": "流传", "e": "名成于前，德垂于后，治之至也。", "s": "（《诸子 喻山水 韩非子》）", "ch": "C"}, {"w": "垂", "p": "chuí", "d": "临近", "e": "以大杖击二十，垂死，舆来庭中。", "s": "（《段太 尉逸事状》）", "ch": "C"}, {"w": "垂", "p": "chuí", "d": "垂挂", "e": "入门，群犬垂涎，扬尾皆来。", "s": "（《三戒》）", "ch": "C"}, {"w": "次", "p": "cì", "d": "临时驻扎和住宿", "e": "《次北固山下》。", "s": "", "ch": "C"}, {"w": "次", "p": "cì", "d": "等次", "e": "贤能不能待次而举。", "s": "（《荀子 王制》）", "ch": "C"}, {"w": "次", "p": "cì", "d": "按顺序排列、编排", "e": "取其自洛阳至于吴兴已来所作， 次为十卷。", "s": "（《梅圣俞诗集序》）", "ch": "C"}, {"w": "次", "p": "cì", "d": "在排列上次一等，第二", "e": "留其根，次年尽变而劣。 一些较为固定的搭配解释：", "s": "（《聊斋志异 黄英》）", "ch": "C"}, {"w": "次", "p": "cì", "d": "【次韵】", "e": "按照原诗的韵和用韵的次序来和诗。", "s": "（《水 龙吟 次韵章质夫杨花词》）", "ch": "C"}, {"w": "次", "p": "cì", "d": "【水次】", "e": "水边。引以为流觞曲水，列坐其次。", "s": "（《兰 亭集序》）", "ch": "C"}, {"w": "次", "p": "cì", "d": "【郊次】", "e": "郊外。秦伯素服郊次，乡师而哭曰。", "s": "（《秦 晋崤之战》）", "ch": "C"}, {"w": "从", "p": "cóng", "d": "跟随", "e": "子路从而后，遇丈人，以杖荷蓧。", "s": "（《论语 荷蓧丈人》）", "ch": "C"}, {"w": "从", "p": "cóng", "d": "使……跟从", "e": "沛公旦日从百余骑来见项王。", "s": "（《鸿 门宴》）", "ch": "C"}, {"w": "从", "p": "cóng", "d": "顺从、听从", "e": "吾已失恩义，会不相从许！", "s": "（《孔雀 东南飞》）", "ch": "C"}, {"w": "从", "p": "cóng", "d": "同“纵”，合纵", "e": "约从离衡。", "s": "（《过秦论》）", "ch": "C"}, {"w": "从", "p": "cóng", "d": "参加", "e": "夫士卒尽家人子，起田中从军，安知尺籍伍符。", "s": "（《张释之冯唐列传》）", "ch": "C"}, {"w": "从", "p": "cóng", "d": "自、由", "e": "施施从外来，骄其妻妾。", "s": "（《齐人有一妻 一妾》）", "ch": "C"}, {"w": "蹙", "p": "cù", "d": "紧迫、窘迫", "e": "今三分其务，吏万员，财赋日蹙。", "s": "（《新 唐书 吴武陵传》）", "ch": "C"}, {"w": "蹙", "p": "cù", "d": "紧缩", "e": "举疾首蹙頞而相告曰。", "s": "（《庄暴见孟子》）", "ch": "C"}, {"w": "错", "p": "cuò", "d": "错杂，交错", "e": "射者中，弈者胜，觥筹交错。", "s": "（《醉翁 亭记》）", "ch": "C"}, {"w": "错", "p": "cuò", "d": "错误，不正确", "e": "映柳认人多错误，误花窥鸟最分明。", "s": "（《襄州春游》）", "ch": "C"}, {"w": "错", "p": "cuò", "d": "通“措”，安置", "e": "民安所错其手足？唯陛下察之。", "s": "（《张释之冯唐列传》）", "ch": "C"}, {"w": "达", "p": "dá", "d": "通畅", "e": "撰长书以为贽，辞甚畅达。", "s": "（《送东阳马生序》）", "ch": "D"}, {"w": "达", "p": "dá", "d": "通晓，明白", "e": "其亦不达于理矣。", "s": "（《张中丞传后叙》）", "ch": "D"}, {"w": "达", "p": "dá", "d": "到；到达", "e": "指通豫南，达达于汉阴。", "s": "（《愚公移山》）", "ch": "D"}, {"w": "达", "p": "dá", "d": "显达；显贵", "e": "苟全性命于乱世，不求闻达于诸候。", "s": "（《出 师表》）", "ch": "D"}, {"w": "达", "p": "dá", "d": "有道德、学有问的人", "e": "尝趋百里外从乡之先达执经叩 问。", "s": "（《送东阳马生序》）", "ch": "D"}, {"w": "逮", "p": "dǎi", "d": "及；赶上；等到", "e": "逮奉圣朝，沐浴清化。", "s": "（《陈情表》）", "ch": "D"}, {"w": "逮", "p": "dǎi", "d": "趁着；乘", "e": "逮吴之未定，君其取分焉。 (《左传·定 公四年》)", "s": "", "ch": "D"}, {"w": "谛", "p": "dì", "d": "详细、仔细", "e": "谛视之，履险阻如坦途。", "s": "（《阅微草堂 笔记》）", "ch": "D"}, {"w": "谛", "p": "dì", "d": "仔细看、详察", "e": "审谛之，短小，黑赤色，顿非前物。", "s": "（《促织》）", "ch": "D"}, {"w": "弟", "p": "dì", "d": "同“悌”，弟弟顺从兄长", "e": "孝弟也者。", "s": "（《论语·学 而》）", "ch": "D"}, {"w": "弟", "p": "dì", "d": "同“第”，只管", "e": "君弟重射，吾能令君胜。", "s": "（《史记 孙膑传》）", "ch": "D"}, {"w": "第", "p": "dì", "d": "府第", "e": "治居第于封丘门内。", "s": "（《训俭示康》）", "ch": "D"}, {"w": "第", "p": "dì", "d": "次第，次序", "e": "呈卷，即面署第一。", "s": "（《左忠毅公逸事》）", "ch": "D"}, {"w": "第", "p": "dì", "d": "科举考试的等级", "e": "擢进士上第。", "s": "（《宋史·王安石传》）", "ch": "D"}, {"w": "第", "p": "dì", "d": "只管", "e": "第持我书往。", "s": "（《后汉书·贾复传》）", "ch": "D"}, {"w": "典", "p": "diǎn", "d": "重要的文献、书籍", "e": "是良史也，子善视之，是能读《三 坟》、《五典》、《八索》、《九丘》。", "s": "（《左传·昭 公十二年》）", "ch": "D"}, {"w": "典", "p": "diǎn", "d": "前代的文物、制度、故事", "e": "数典而忘其祖。", "s": "（《左传·昭 公十五年》）", "ch": "D"}, {"w": "典", "p": "diǎn", "d": "掌管、主持", "e": "专典机密。", "s": "（《三国志·吴书·是仪传》）", "ch": "D"}, {"w": "吊", "p": "diào", "d": "安慰、慰问", "e": "茕茕孑立，形影相吊。", "s": "（《陈情表》）", "ch": "D"}, {"w": "丁", "p": "dīng", "d": "健壮", "e": "身气丁强。", "s": "（《论衡·无形》）", "ch": "D"}, {"w": "丁", "p": "dīng", "d": "成年男子", "e": "户有三丁点一丁。", "s": "（《新丰折臂翁》）", "ch": "D"}, {"w": "丁", "p": "dīng", "d": "人口", "e": "因科敛丁口。", "s": "（《促织》）", "ch": "D"}, {"w": "丁", "p": "dīng", "d": "遭逢", "e": "出为邺令，丁母忧去职。", "s": "（《周弘正传》）", "ch": "D"}, {"w": "丁", "p": "dīng", "d": "天干的第四位", "e": "元丰七年六月丁丑。 “丁忧”作为文化常识可以记一记：指遭逢父母丧事。", "s": "（《石钟山记》）", "ch": "D"}, {"w": "洞", "p": "dòng", "d": "洞察、透彻了解", "e": "洞识此心，始可言史矣。", "s": "（《史通 叙事》）", "ch": "D"}, {"w": "洞", "p": "dòng", "d": "明亮", "e": "日影反照，室始洞然。", "s": "（《项脊轩志》）", "ch": "D"}, {"w": "毒", "p": "dú", "d": "残害", "e": "上无忿怒之毒，下无伏怨之患。", "s": "（《韩非子 大 体》）", "ch": "D"}, {"w": "毒", "p": "dú", "d": "怨恨", "e": "若毒之乎？", "s": "（《捕蛇者说》）", "ch": "D"}, {"w": "独", "p": "dú", "d": "独自", "e": "飘飘乎如遗世独立，羽化而登仙。", "s": "（《前赤壁 赋》）", "ch": "D"}, {"w": "独", "p": "dú", "d": "唯独", "e": "独是成氏子以蠹贫，以促织富，裘马扬扬。", "s": "（《促 织》）", "ch": "D"}, {"w": "独", "p": "dú", "d": "难道", "e": "相如虽驽，独畏廉将军哉？", "s": "（《廉颇蔺相如列 传》）", "ch": "D"}, {"w": "独", "p": "dú", "d": "残暴无道", "e": "独夫之心，日益坚固。", "s": "（《阿房宫赋》）", "ch": "D"}, {"w": "独", "p": "dú", "d": "老而无子", "e": "鳏寡孤独。", "s": "", "ch": "D"}, {"w": "笃", "p": "dǔ", "d": "忠诚、厚道", "e": "君子笃于亲。", "s": "（《论语 泰伯》）", "ch": "D"}, {"w": "笃", "p": "dǔ", "d": "病重", "e": "臣欲奉诏奔驰，则刘病日笃。", "s": "（《陈情表》）", "ch": "D"}, {"w": "笃", "p": "dǔ", "d": "坚定", "e": "博学之，审问之，慎思之，明辨之，笃行之。 （《礼记·中庸》", "s": "", "ch": "D"}, {"w": "笃", "p": "dǔ", "d": "束缚、限制", "e": "夏虫不可以语于冰者，笃于时也。", "s": "（《秋 水》）", "ch": "D"}, {"w": "度", "p": "dù", "d": "度过，越过", "e": "我欲因之梦吴越，一夜飞度镜湖月。", "s": "（《梦 游天姥吟留别》）", "ch": "D"}, {"w": "度", "p": "dù", "d": "揣测，估量", "e": "秦王度之，终不可强夺。", "s": "（《廉颇蔺相 如列传》）", "ch": "D"}, {"w": "度", "p": "dù", "d": "考虑，谋虑", "e": "以小舟涉鲸波，出无可奈何，而死固付 之度外矣。", "s": "（《指南录后序》）", "ch": "D"}, {"w": "度", "p": "dù", "d": "标准，限度", "e": "乐盘游，则思三驱以为度。", "s": "（《谏太宗 十思疏》）", "ch": "D"}, {"w": "度", "p": "dù", "d": "比较，衡量", "e": "试使山东之国与陈涉度长絮大，比权量 力，则不可同年而语矣。", "s": "（《过秦沦》）", "ch": "D"}, {"w": "度", "p": "dù", "d": "法令，制度", "e": "当是时也，商君佐之，内立法度，务耕 织。", "s": "（《过秦论》）", "ch": "D"}, {"w": "多", "p": "duō", "d": "称赞、夸耀", "e": "而吾未尝以此自多者。", "s": "（《秋水》）", "ch": "D"}, {"w": "恶", "p": "è", "d": "讨厌", "e": "太山不立好恶，故能成其高。", "s": "（《诸子喻山水》）", "ch": "E"}, {"w": "恶", "p": "è", "d": "不好、坏的、丑的", "e": "今君与廉颇同列，廉君宣恶言。", "s": "（《廉颇蔺相如列传》）", "ch": "E"}, {"w": "恶", "p": "è", "d": "哪里", "e": "学恶乎始，恶乎终。", "s": "（《劝学》）", "ch": "E"}, {"w": "尔", "p": "ěr", "d": "句末语气词，相当于“罢了”", "e": "橐驼非能使木寿且孳 也，能顺木之天，以致其性焉尔。", "s": "（《种树郭橐驼》）", "ch": "E"}, {"w": "尔", "p": "ěr", "d": "你、你们", "e": "与尔三矢，尔其无忘乃父之志！", "s": "（《伶官 传序》）", "ch": "E"}, {"w": "尔", "p": "ěr", "d": "形容词副词词尾，……的样子", "e": "鼓瑟希，铿尔。", "s": "（《子 路、曾皙、冉有、公西华侍坐》）", "ch": "E"}, {"w": "尔", "p": "ěr", "d": "这样、如此", "e": "问君何能尔，心远地自偏。", "s": "（《饮酒》）", "ch": "E"}, {"w": "尔", "p": "ěr", "d": "同“迩”，近", "e": "名相近者相远也，实相近者相尔也。", "s": "（《周礼》）", "ch": "E"}, {"w": "尔", "p": "ěr", "d": "同“迩”，浅近", "e": "其说甚尔。", "s": "（《荀子 天论》）", "ch": "E"}, {"w": "贰（兼“二”）", "p": "èr （ jiān “ èr ”）", "d": "副的", "e": "丞之职所以贰令，於一邑无所不当问。", "s": "（《蓝 田县丞厅壁记》）", "ch": "E"}, {"w": "贰（兼“二”）", "p": "èr （ jiān “ èr ”）", "d": "不专一", "e": "不一于汝，而二于物，故一鼠之啮而为之变 也。", "s": "（《黠鼠赋》）", "ch": "E"}, {"w": "贰（兼“二”）", "p": "èr （ jiān “ èr ”）", "d": "从属二主", "e": "以其无礼于晋，且贰于楚也。", "s": "（《烛之武 退秦师》）", "ch": "E"}, {"w": "贰（兼“二”）", "p": "èr （ jiān “ èr ”）", "d": "背叛、有二心", "e": "诸侯贰，则晋国坏。", "s": "（《左传·襄公 二十四年》）", "ch": "E"}, {"w": "发", "p": "fā", "d": "打开", "e": "于败堵丛草处探石发穴，靡计不施。", "s": "（《促织》）", "ch": "F"}, {"w": "发", "p": "fā", "d": "泄露，败露", "e": "张胜闻之，恐前语发，以状语武。", "s": "（《苏 武传》）", "ch": "F"}, {"w": "伐", "p": "fá", "d": "砍伐", "e": "坎坎伐檀兮，置之河之干兮。", "s": "（《诗经 伐檀》）", "ch": "F"}, {"w": "伐", "p": "fá", "d": "讨伐、攻打", "e": "秦不哀吾丧而伐吾同姓。", "s": "（《秦晋崤之 战》）", "ch": "F"}, {"w": "伐", "p": "fá", "d": "功劳", "e": "北救赵而西却秦，此五霸之伐也。", "s": "（《信陵君 窃符救赵》）", "ch": "F"}, {"w": "伐", "p": "fá", "d": "夸耀", "e": "每一令出，平伐其功。", "s": "（《史记 屈原列传》）", "ch": "F"}, {"w": "访", "p": "fǎng", "d": "询问", "e": "穆公访诸蹇叔。", "s": "（《秦晋崤之战》）", "ch": "F"}, {"w": "访", "p": "fǎng", "d": "看望、拜访", "e": "径造庐访成，视成所蓄。", "s": "（《聊斋志 异 促织》）", "ch": "F"}, {"w": "访", "p": "fǎng", "d": "寻求", "e": "至唐李渤始访其遗踪。", "s": "（《石钟山记》）", "ch": "F"}, {"w": "非", "p": "fēi", "d": "不对的，错误的", "e": "实迷途其未远，觉今是而昨非。", "s": "（《归去来兮辞》）", "ch": "F"}, {"w": "非", "p": "fēi", "d": "非难、责怪、批评", "e": "当时士大夫家皆然，人不相非也。", "s": "（《训俭示康》）", "ch": "F"}, {"w": "非", "p": "fēi", "d": "不是，表否定的判断", "e": "官理，非吾业也。", "s": "（《种树 郭橐驼传》）", "ch": "F"}, {"w": "非", "p": "fēi", "d": "不、没有", "e": "鬼神非人实亲，惟德是依。", "s": "（《宫之奇 谏假道》）", "ch": "F"}, {"w": "匪", "p": "fěi", "d": "非，不是", "e": "我心匪石，不可转也。", "s": "（《诗经 柏舟》）", "ch": "F"}, {"w": "废", "p": "fèi", "d": "废弃、停止", "e": "臣侍汤药，未曾废离。", "s": "（《陈情表》）", "ch": "F"}, {"w": "废", "p": "fèi", "d": "衰败", "e": "洛阳之盛衰，候于园圃之废兴而得。", "s": "（《书 洛阳名园记后》）", "ch": "F"}, {"w": "分", "p": "fēn", "d": "分开、区分", "e": "两第竟合为一，不分疆界矣。", "s": "（《聊 斋志异 黄英》）", "ch": "F"}, {"w": "分", "p": "fēn", "d": "分担、分配", "e": "其下主簿、尉，主簿、尉乃有分职。", "s": "（《蓝 田县丞厅壁记》）", "ch": "F"}, {"w": "分", "p": "fēn", "d": "职分、名分", "e": "予分当引决，然而隐忍以行。", "s": "（《指 南录后序》）", "ch": "F"}, {"w": "分", "p": "fēn", "d": "料想", "e": "自分已死久矣。", "s": "（《苏武传》）", "ch": "F"}, {"w": "风", "p": "fēng", "d": "同“讽”，用含蓄的话暗示或劝告", "e": "意属黄英，微使 人风示之。", "s": "（《聊斋志异 黄英》）", "ch": "F"}, {"w": "风", "p": "fēng", "d": "风俗、风气", "e": "然吾尝闻风俗与化移易。", "s": "（《送董邵 南序》）", "ch": "F"}, {"w": "风", "p": "fēng", "d": "风度", "e": "铨学涉，有长者风。", "s": "（《魏书 杜铨传》）", "ch": "F"}, {"w": "风", "p": "fēng", "d": "民歌、歌谣", "e": "风有《采蘩》、《采苹》。", "s": "（《左传 隐公三年》）", "ch": "F"}, {"w": "风", "p": "fēng", "d": "代指《诗经》", "e": "原其飙流所始，莫不同祖风骚。", "s": "（《宋 书 谢灵运传》）", "ch": "F"}, {"w": "讽", "p": "fěng", "d": "背诵", "e": "少不讽诵。", "s": "（《荀子 大略》）", "ch": "F"}, {"w": "讽", "p": "fěng", "d": "用委婉的言辞暗示或劝告", "e": "玉之言盖有讽焉。", "s": "（《黄 州快哉亭记》）", "ch": "F"}, {"w": "奉", "p": "fèng", "d": "同“捧”，两手捧着", "e": "王必无人，臣愿奉璧往使。", "s": "（《廉颇蔺相如列传》）", "ch": "F"}, {"w": "奉", "p": "fèng", "d": "进献、送", "e": "谨使臣良奉白璧一双。", "s": "（《鸿门宴》）", "ch": "F"}, {"w": "奉", "p": "fèng", "d": "供奉、给养", "e": "自奉养如为河阳掌书记时。", "s": "（《训俭 示康》）", "ch": "F"}, {"w": "奉", "p": "fèng", "d": "遵从、遵守、恭敬地接受", "e": "臣欲奉诏奔驰，则刘病日 笃。", "s": "（《陈情表》）", "ch": "F"}, {"w": "奉", "p": "fèng", "d": "侍奉", "e": "逮奉圣朝，沐浴清化。", "s": "（《陈情表》）", "ch": "F"}, {"w": "奉", "p": "fèng", "d": "同“俸”，俸禄", "e": "位尊而无功，奉厚而无劳，而挟重 器多也。", "s": "（《战国策 秦策》）", "ch": "F"}, {"w": "奉", "p": "fèng", "d": "敬词", "e": "如“奉陪”。", "s": "", "ch": "F"}, {"w": "否", "p": "foǔ", "d": "不然，不是这样", "e": "王曰：“否。吾何快于是？将以求 吾所大欲也。”", "s": "（《齐桓晋文之事》）", "ch": "F"}, {"w": "否", "p": "foǔ", "d": "表否定", "e": "例以嫌不可否事。", "s": "（《蓝田县丞厅壁记》）", "ch": "F"}, {"w": "否", "p": "foǔ", "d": "恶、坏", "e": "否泰如天地，足以荣汝身。", "s": "（《孔雀东南 飞》）", "ch": "F"}, {"w": "负", "p": "fù", "d": "背负、承担", "e": "廉颇闻之，肉袒负荆//均之二策，宁许 以负秦曲。", "s": "（《廉颇蔺 相如列传》）", "ch": "F"}, {"w": "负", "p": "fù", "d": "依仗", "e": "秦贪，负其强。", "s": "（《廉颇蔺相如列传》）", "ch": "F"}, {"w": "负", "p": "fù", "d": "违背、背弃", "e": "相如度秦王虽斋，决负约不偿城。", "s": "（《廉 颇蔺相如列传》）", "ch": "F"}, {"w": "负", "p": "fù", "d": "辜负", "e": "臣诚恐见欺于王而负赵。", "s": "（《廉颇蔺相如列 传》）", "ch": "F"}, {"w": "负", "p": "fù", "d": "依靠、靠近", "e": "子夏蹶然而起，负墙而立。", "s": "（《史记 越王勾践世家》）", "ch": "F"}, {"w": "负", "p": "fù", "d": "失败", "e": "故不战而强弱胜负已判矣。", "s": "（《六国论》）", "ch": "F"}, {"w": "盖", "p": "gài", "d": "遮蔽、掩盖", "e": "枝枝相覆盖，叶叶相交通。", "s": "（《孔雀 东南飞》）", "ch": "G"}, {"w": "盖", "p": "gài", "d": "大概", "e": "善始者实繁，克终者盖寡。", "s": "（《谏太宗十思 疏》）", "ch": "G"}, {"w": "盖", "p": "gài", "d": "承接上文，表原因", "e": "盖失强援，不能独完。", "s": "（《六 国论》）", "ch": "G"}, {"w": "盖", "p": "gài", "d": "句首语气词，无实义", "e": "盖民之役，非以役民而已也。", "s": "（《送薛存义之任序》）", "ch": "G"}, {"w": "盖", "p": "gài", "d": "同“盍”，何不", "e": "盖亦反其本矣。", "s": "（《齐桓晋文之 事》）", "ch": "G"}, {"w": "干", "p": "gàn", "d": "盾牌", "e": "刑天舞干戚，猛志固常在。", "s": "（《读山海经》）", "ch": "G"}, {"w": "干", "p": "gàn", "d": "冒犯、冲犯", "e": "或依势以干非其类。", "s": "（《三戒》）", "ch": "G"}, {"w": "干", "p": "gàn", "d": "求取", "e": "亦不敢服垢弊以矫俗干名。", "s": "（《训俭示康》）", "ch": "G"}, {"w": "干", "p": "gàn", "d": "同“岸”，岸边", "e": "坎坎伐檀兮，置之河之干兮。", "s": "（《伐 檀》）", "ch": "G"}, {"w": "膏", "p": "gāo", "d": "油脂、脂肪", "e": "焚膏油以继晷 恒兀兀以穷年。", "s": "（《进学解》）", "ch": "G"}, {"w": "膏", "p": "gāo", "d": "肥沃", "e": "村外治膏田二十顷，甲第益壮。", "s": "（《黄英》）", "ch": "G"}, {"w": "膏", "p": "gāo", "d": "滋润，使……肥沃", "e": "空以身膏草野，谁复知之。", "s": "（《苏 武传》）", "ch": "G"}, {"w": "工", "p": "gōng", "d": "工匠，从事某种手工技艺劳动的人", "e": "巫医乐师百工之 人。", "s": "（《师说》）", "ch": "G"}, {"w": "工", "p": "gōng", "d": "精巧", "e": "然则非诗之能穷人，殆穷者而后工也。", "s": "（《梅 圣俞诗集序》）", "ch": "G"}, {"w": "工", "p": "gōng", "d": "擅长", "e": "人有所工，固有所拙。", "s": "（《论衡 书解》）", "ch": "G"}, {"w": "苟", "p": "goǔ", "d": "苟且、随便", "e": "终苟免而不怀仁，貌恭而不心服。", "s": "（《谏 太宗十思疏》）", "ch": "G"}, {"w": "苟", "p": "goǔ", "d": "如果、假设", "e": "苟为无本，七、八月之间雨集。", "s": "（《我 善养吾浩然之气》）", "ch": "G"}, {"w": "诟", "p": "goù", "d": "耻辱", "e": "诟莫大于宫刑。", "s": "（《报任安书》）", "ch": "G"}, {"w": "诟", "p": "goù", "d": "辱骂、指责", "e": "古人以俭为美德，今人乃以俭相诟病。", "s": "（《训俭示康》）", "ch": "G"}, {"w": "构", "p": "goù", "d": "搭架、构筑", "e": "构木为巢以避群害。", "s": "（《韩非子 五 蠹》）", "ch": "G"}, {"w": "构", "p": "goù", "d": "制造事端、设计陷害", "e": "不幸吕师孟构恶于前，贾余庆 献谄于后。", "s": "（《指南录后序》）", "ch": "G"}, {"w": "构", "p": "goù", "d": "挑拨", "e": "彼实构吾二君，寡君若得而食之不厌。", "s": "（《秦 晋崤之战》）", "ch": "G"}, {"w": "购", "p": "goù", "d": "悬赏征求", "e": "穷饿无聊，追购又急。", "s": "（《指南录后序》）", "ch": "G"}, {"w": "辜", "p": "gū", "d": "罪", "e": "至海陵，如高沙，常恐无辜死。", "s": "（《指南录后 序》）", "ch": "G"}, {"w": "孤", "p": "gū", "d": "幼儿丧父", "e": "哀鳏寡，恤孤独，振困穷，补不足。", "s": "（《赵 威后问齐使》）", "ch": "G"}, {"w": "孤", "p": "gū", "d": "帝王对自己的谦称", "e": "是以侯王称孤、寡、不谷。", "s": "（《齐 宣王见颜斶》）", "ch": "G"}, {"w": "顾", "p": "gù", "d": "回头、回头看", "e": "勿动勿虑，去不复顾。", "s": "（《种树郭 橐驼传》）", "ch": "G"}, {"w": "顾", "p": "gù", "d": "看", "e": "成顾蟋蟀笼虚，则气断声吞。", "s": "（《促织》）", "ch": "G"}, {"w": "顾", "p": "gù", "d": "顾念、考虑", "e": "大行不顾细谨，大礼不辞小让。", "s": "（《鸿 门宴》）", "ch": "G"}, {"w": "顾", "p": "gù", "d": "不过、只是", "e": "官无卑，顾材不足塞职。", "s": "（《蓝田县 丞厅壁记》）", "ch": "G"}, {"w": "固", "p": "gù", "d": "地势险要、牢固", "e": "秦孝公据崤函之固，拥雍州之地。", "s": "（《过秦论》）", "ch": "G"}, {"w": "固", "p": "gù", "d": "使……固、巩固", "e": "臣闻求木之长者，必固其根本。", "s": "（《谏太宗十思疏》）", "ch": "G"}, {"w": "固", "p": "gù", "d": "顽固、固执", "e": "独夫之心，日益骄固。", "s": "（《过秦论》）", "ch": "G"}, {"w": "固", "p": "gù", "d": "坚定、坚决", "e": "自增惭怍，不敢与较。少年固强之。", "s": "（《促 织》）", "ch": "G"}, {"w": "固", "p": "gù", "d": "固陋、浅薄", "e": "人皆嗤吾固陋，吾不以为病。", "s": "（《训 俭示康》）", "ch": "G"}, {"w": "固", "p": "gù", "d": "本来", "e": "则秦之所大欲，诸侯之所大患，固不在战矣。", "s": "（《六国论》）", "ch": "G"}, {"w": "固", "p": "gù", "d": "的确", "e": "甚善。名我固当。", "s": "（《种树郭橐驼传》）", "ch": "G"}, {"w": "固", "p": "gù", "d": "难道", "e": "副元帅固负若属耶？", "s": "（《段太尉逸事状》）", "ch": "G"}, {"w": "固", "p": "gù", "d": "同“故”，所以，因此", "e": "吾固曰：“非圣人之意也， 势也”。", "s": "（《封建论》）", "ch": "G"}, {"w": "乖", "p": "guāi", "d": "违背，不一致", "e": "天人相违，赏罚乖也。", "s": "（《论衡 雷 虚》）", "ch": "G"}, {"w": "冠", "p": "guān", "d": "帽子", "e": "怒发上冲冠，谓秦王曰。", "s": "（《廉颇蔺相如列 传》）", "ch": "G"}, {"w": "冠", "p": "guān", "d": "戴帽子", "e": "冠者五六人，童子六七人。", "s": "（《子路、曾 皙、冉有、公西华侍坐》）", "ch": "G"}, {"w": "冠", "p": "guān", "d": "古时成人礼节", "e": "及太子既冠成人。", "s": "（《汉书 贾谊 传》）", "ch": "G"}, {"w": "冠", "p": "guān", "d": "位居第一", "e": "近世寇莱公豪侈冠一时，然以功业大。", "s": "（《训俭示康》）", "ch": "G"}, {"w": "归", "p": "guī", "d": "女子出嫁", "e": "吾妻来归。", "s": "（《项脊轩志》）", "ch": "G"}, {"w": "归", "p": "guī", "d": "返回", "e": "虽生，何面目以归汉。", "s": "（《苏武传》）", "ch": "G"}, {"w": "归", "p": "guī", "d": "归向、归附", "e": "阴相与谋劫单于母阏氏归汉。", "s": "（《苏 武传》）", "ch": "G"}, {"w": "归", "p": "guī", "d": "同“馈”，馈赠", "e": "阳货欲见孔子，孔子不见，归孔子 豚。", "s": "（《论语 阳货》）", "ch": "G"}, {"w": "果", "p": "guǒ", "d": "饱满、充实", "e": "适苍莽者，三餐而反，腹犹果然。", "s": "（《庄 子 逍遥游》）", "ch": "G"}, {"w": "果", "p": "guǒ", "d": "实现、完成", "e": "言必信，行必果。", "s": "（《论语 子路》）", "ch": "G"}, {"w": "果", "p": "guǒ", "d": "果真、当真", "e": "果不如先愿，又非君所详。", "s": "（《孔雀 东南飞》）", "ch": "G"}, {"w": "果", "p": "guǒ", "d": "果断、坚决", "e": "君盍使之伐狄，以观其果于众也。", "s": "（《国 语 晋语》）", "ch": "G"}, {"w": "过", "p": "guò", "d": "经过", "e": "将有西师过轶我，击之，必大捷焉。", "s": "（《秦 晋殽之战》）", "ch": "G"}, {"w": "过", "p": "guò", "d": "超过、胜过", "e": "从此道至吾军，不过二十里耳。", "s": "（《鸿 门宴》）", "ch": "G"}, {"w": "过", "p": "guò", "d": "过错、犯过错", "e": "则知明而行无过矣。", "s": "（《劝学》）", "ch": "G"}, {"w": "过", "p": "guò", "d": "指出……过失、责备", "e": "闻大王有意督过之，脱身独去。", "s": "（《鸿门宴》）", "ch": "G"}, {"w": "过", "p": "guò", "d": "拜访、探望", "e": "一日，大母过余曰。", "s": "（《项脊轩志》）", "ch": "G"}, {"w": "过", "p": "guò", "d": "过分", "e": "过蒙拔擢，宠命优渥。", "s": "（《陈情表》）", "ch": "G"}, {"w": "给济", "p": "gěi jì", "d": "渡河", "e": "同舟共济。", "s": "", "ch": "G"}, {"w": "给济", "p": "gěi jì", "d": "成功、实现", "e": "夫济大事必以人为本。", "s": "（《三国志 先 主传》）", "ch": "G"}, {"w": "给济", "p": "gěi jì", "d": "帮助、救助", "e": "探石发穴，靡计不施，迄无济。", "s": "（《促 织》）", "ch": "G"}, {"w": "盍", "p": "hé", "d": "何不", "e": "盍各言尔志？", "s": "（《论语 公冶长》）", "ch": "H"}, {"w": "盍", "p": "hé", "d": "何", "e": "盍不出从乎？ 注：“盍”后无“不”，则一般解释为“盍不”；有 “不”，则解释为“何”。", "s": "（《管子 戒篇》）", "ch": "H"}, {"w": "阖", "p": "hé", "d": "关闭", "e": "假五六猫，阖门撤瓦，灌穴。", "s": "（《永某氏之 鼠》）", "ch": "H"}, {"w": "阖", "p": "hé", "d": "全", "e": "阖家欢乐。", "s": "", "ch": "H"}, {"w": "何", "p": "hé", "d": "同“呵”，呵斥、盘问", "e": "信臣精卒陈利兵而谁何。", "s": "（《过秦论》）", "ch": "H"}, {"w": "何", "p": "hé", "d": "什么", "e": "郭橐驼，不知始何名。", "s": "（《种树郭橐驼传》）", "ch": "H"}, {"w": "何", "p": "hé", "d": "哪里", "e": "将何适而非快？", "s": "（《黄州快哉亭记》）", "ch": "H"}, {"w": "何", "p": "hé", "d": "怎么，为什么", "e": "何竟日默默在此，大类女郎也？", "s": "（《项 脊轩志》）", "ch": "H"}, {"w": "何", "p": "hé", "d": "多么", "e": "吏呼一何怒，妇啼一何苦。", "s": "（《石壕吏》）", "ch": "H"}, {"w": "何", "p": "hé", "d": "【无何】", "e": "不久：无何，宰以卓异闻。", "s": "（《促织》）", "ch": "H"}, {"w": "恨", "p": "hèn", "d": "遗憾、后悔", "e": "为此传颇详密，然尚恨有阙者。", "s": "（《张 中丞传后叙》）", "ch": "H"}, {"w": "恨", "p": "hèn", "d": "怨恨、不满", "e": "念谁为之戕贼，亦何恨乎秋声。", "s": "（《秋 声赋》）", "ch": "H"}, {"w": "候", "p": "hoù", "d": "守望、观察", "e": "且天下之治乱，候于洛阳之盛衰而知。", "s": "（《书洛阳名园记后》）", "ch": "H"}, {"w": "候", "p": "hoù", "d": "侦查、探听", "e": "募士、斥候百余人俱。", "s": "（《苏武传》）", "ch": "H"}, {"w": "候", "p": "hoù", "d": "拜访", "e": "素与副张胜相知，私候胜。", "s": "（《苏武传》）", "ch": "H"}, {"w": "候", "p": "hoù", "d": "看望、问候", "e": "单于壮其节，朝夕遣人候问武。", "s": "（《苏 武传》）", "ch": "H"}, {"w": "候", "p": "hoù", "d": "征兆", "e": "洛阳之盛衰，天下治乱之候也。", "s": "（《书洛阳 名园记后》）", "ch": "H"}, {"w": "候", "p": "hoù", "d": "等候", "e": "僮仆欢迎，稚子候门。", "s": "（《归去来兮辞》）", "ch": "H"}, {"w": "遑", "p": "huáng", "d": "闲暇、空闲", "e": "不遑启居，玁狁之故。", "s": "（《采薇》）", "ch": "H"}, {"w": "遑", "p": "huáng", "d": "【遑遑】", "e": "心神不安的样子：忧惧遑遑，未知其方。", "s": "（《后汉书 明帝纪》）", "ch": "H"}, {"w": "麾", "p": "huī", "d": "旗子", "e": "于是项王乃上马骑，麾下壮士骑从者八百余人。", "s": "（《垓下之围》）", "ch": "H"}, {"w": "麾", "p": "huī", "d": "同“挥”，挥动、指挥", "e": "独韩文公起布衣，谈笑而麾 之。", "s": "（《潮州韩文公庙碑》）", "ch": "H"}, {"w": "隳", "p": "huī", "d": "毁坏", "e": "隳名城，杀豪杰。", "s": "（《过秦论》）", "ch": "H"}, {"w": "晦", "p": "huì", "d": "阴历每月最后一天", "e": "十一月晦，日有食之。", "s": "（《史 记 文帝本纪》）", "ch": "H"}, {"w": "晦", "p": "huì", "d": "昏暗", "e": "晦明变化者，山间之朝暮也。", "s": "（《醉翁亭记》）", "ch": "H"}, {"w": "晦", "p": "huì", "d": "隐晦，含蓄", "e": "《春秋》之称，微而显，志而晦，婉而 成章。", "s": "（《左传 成公十四年》）", "ch": "H"}, {"w": "会", "p": "huì", "d": "聚集、会合", "e": "与其骑会为三处。", "s": "（《垓下之围》）", "ch": "H"}, {"w": "会", "p": "huì", "d": "会面、相见", "e": "留待作遗施，于今无会因。", "s": "（《孔雀 东南飞》）", "ch": "H"}, {"w": "会", "p": "huì", "d": "盟会、宴会", "e": "欲与王为好会于西河外渑池。", "s": "（《廉 颇蔺相如列传》）", "ch": "H"}, {"w": "会", "p": "huì", "d": "恰巧、适逢", "e": "会征促织，成不敢敛户口。", "s": "（《促织》）", "ch": "H"}, {"w": "会", "p": "huì", "d": "应当、一定", "e": "吾已失恩义，会不相从许！", "s": "（《孔雀 东南飞》）", "ch": "H"}, {"w": "会", "p": "huì", "d": "算账", "e": "谁习计会？", "s": "（《冯谖客孟尝君》）", "ch": "H"}, {"w": "贾", "p": "jiǎ", "d": "商人", "e": "商贾皆欲藏于王之市，行旅皆欲出于王之涂。", "s": "（《齐桓晋文之事》）", "ch": "J"}, {"w": "贾", "p": "jiǎ", "d": "做买卖", "e": "长袖善舞，多钱善贾。", "s": "（《韩 非子 五蠹》）", "ch": "J"}, {"w": "贾", "p": "jiǎ", "d": "买或卖", "e": "家幸充盈，但可坐享，无须复贾。", "s": "（《黄 英》）", "ch": "J"}, {"w": "贾", "p": "jiǎ", "d": "同“价”，价钱", "e": "贾知贾之贵贱。", "s": "（《管子 乘马》）", "ch": "J"}, {"w": "贾", "p": "jiǎ", "d": "求取、招引", "e": "匹夫无罪，怀璧其罪，吾焉用此，其以 贾害也。", "s": "（《左传 桓公十年》）", "ch": "J"}, {"w": "赍", "p": "jī", "d": "送物与人", "e": "马立遣人一一赍还之。", "s": "（《黄英》）", "ch": "J"}, {"w": "赍", "p": "jī", "d": "携带", "e": "阴遣谋士，赍持金玉以游说诸侯。", "s": "（《史记 李斯列传》）", "ch": "J"}, {"w": "稽", "p": "jī", "d": "考证、考核", "e": "无稽之谈。", "s": "", "ch": "J"}, {"w": "稽", "p": "jī", "d": "计较、争辩", "e": "马惭，不复稽，一切听诸黄英。", "s": "（《黄 英》）", "ch": "J"}, {"w": "羁", "p": "jī", "d": "马笼头", "e": "白马饰金羁。", "s": "（《白马篇》）", "ch": "J"}, {"w": "羁", "p": "jī", "d": "束缚、拘留", "e": "予羁縻不得还，国事遂不可收拾。", "s": "（《指 南录后序》）", "ch": "J"}, {"w": "羁", "p": "jī", "d": "寄居在外", "e": "乃徒发于虫鱼物类、羁愁感叹之言。", "s": "（《梅 圣俞诗集序》）", "ch": "J"}, {"w": "藉", "p": "jí", "d": "凭借、借助、依靠", "e": "相与枕藉乎舟中，不知东方之既 白。", "s": "（《赤壁赋》）", "ch": "J"}, {"w": "藉", "p": "jí", "d": "【狼藉】", "e": "杂乱的样子：肴核既尽，杯盘狼藉。", "s": "（《赤 壁赋》）", "ch": "J"}, {"w": "籍", "p": "jí", "d": "名册、户口册", "e": "今邠人恶子弟以货窜名军籍中。", "s": "（《段 太尉逸事状》）", "ch": "J"}, {"w": "籍", "p": "jí", "d": "登记", "e": "籍吏民,封府库，而待将军。", "s": "（《鸿门宴》）", "ch": "J"}, {"w": "籍", "p": "jí", "d": "同“藉”，借助、依靠", "e": "其学者则称先王之道以籍仁 义。", "s": "（《韩非子 五蠹》）", "ch": "J"}, {"w": "籍", "p": "jí", "d": "【狼籍】", "e": "同“狼藉”，杂乱的样子：狼籍道上。麋 至死不悟。", "s": "（《三戒》）", "ch": "J"}, {"w": "疾", "p": "jí", "d": "病", "e": "臣少多疾病，九岁不行。", "s": "（《陈情表》）", "ch": "J"}, {"w": "疾", "p": "jí", "d": "毛病、缺点", "e": "寡人有疾，寡人好色。", "s": "（《孟子 梁惠 王下》）", "ch": "J"}, {"w": "疾", "p": "jí", "d": "厌恶、憎恨", "e": "君子疾夫舍曰欲之，而必为之辞。", "s": "（《季 氏将伐颛臾》）", "ch": "J"}, {"w": "疾", "p": "jí", "d": "快、急速", "e": "衔枚疾走，不闻号令。", "s": "（《秋声赋》）", "ch": "J"}, {"w": "疾", "p": "jí", "d": "同“嫉”，妒忌", "e": "膑至，庞涓恐其贤于己，疾之。", "s": "（《史 记 孙子吴起列传》）", "ch": "J"}, {"w": "即", "p": "jí", "d": "走近、靠近", "e": "清河张君梦得谪居齐安，即其庐之西南 为亭。", "s": "（《黄州快哉亭记》）", "ch": "J"}, {"w": "即", "p": "jí", "d": "立即、马上", "e": "无俟奸人构陷，吾今即扑杀汝。", "s": "（《左 忠毅公逸事》）", "ch": "J"}, {"w": "即", "p": "jí", "d": "就是、就", "e": "项伯即入见沛公。", "s": "（《鸿门宴》）", "ch": "J"}, {"w": "即", "p": "jí", "d": "如果、假如", "e": "即谋单于，何以复加？", "s": "（《苏武传》）", "ch": "J"}, {"w": "亟", "p": "jí", "d": "急忙、赶快", "e": "我死，乃亟去之。", "s": "（《左传 隐公十一 年》）", "ch": "J"}, {"w": "亟", "p": "jí", "d": "多次", "e": "仲尼亟称于水。", "s": "（《诸子喻山水》）", "ch": "J"}, {"w": "洎", "p": "jì", "d": "等到、至", "e": "洎牧以谗诛。", "s": "（《六国论》）", "ch": "J"}, {"w": "假", "p": "jiǎ", "d": "借、借助", "e": "假此科敛丁口，每责一头，辄倾数家之产。", "s": "（《促织》）", "ch": "J"}, {"w": "假", "p": "jiǎ", "d": "临时担任、代理", "e": "存义假令零陵二年矣。", "s": "（《送薛 存义之任序》）", "ch": "J"}, {"w": "假", "p": "jiǎ", "d": "如果、假如", "e": "假令愚民取长陵一抔土，陛下何以加其 法乎？", "s": "（《张释之冯唐列传》）", "ch": "J"}, {"w": "间", "p": "jiān", "d": "间隙、空隙", "e": "至京口，得间奔真州。", "s": "（《指南录后 序》）", "ch": "J"}, {"w": "间", "p": "jiān", "d": "隔阂、疏远", "e": "诸侯有间矣。", "s": "（《左传 昭公十三年》）", "ch": "J"}, {"w": "间", "p": "jiān", "d": "离间", "e": "屈平正道直行，竭忠尽智以事其君，谗人间之， 可谓穷矣。", "s": "（《史记 屈原贾生列传》）", "ch": "J"}, {"w": "间", "p": "jiān", "d": "间隔、间断、间或", "e": "予在患难中，间以诗记所遭。", "s": "（《指 南录后序》）", "ch": "J"}, {"w": "间", "p": "jiān", "d": "夹杂", "e": "中间力拉崩倒之声。", "s": "（《口技》）", "ch": "J"}, {"w": "间", "p": "jiān", "d": "从小路、偷偷地", "e": "故令人持璧归，间至赵矣。", "s": "（《廉颇蔺相如列传》）", "ch": "J"}, {"w": "间", "p": "jiān", "d": "同“闲”，空闲", "e": "吾子取其麋鹿，以间敝邑，若何？", "s": "（《秦晋崤之战》）", "ch": "J"}, {"w": "间", "p": "jiān", "d": "【少间】", "e": "不久：少间，帘内掷一纸出。", "s": "（《促织》）", "ch": "J"}, {"w": "简", "p": "jiǎn", "d": "竹简", "e": "迄孝武世，书缺简脱，礼坏乐崩。", "s": "（《汉书 艺文志》）", "ch": "J"}, {"w": "简", "p": "jiǎn", "d": "选拔、选择", "e": "简能而任之，择善而从之。", "s": "（《谏太 宗十思疏》）", "ch": "J"}, {"w": "简", "p": "jiǎn", "d": "简略、简易", "e": "余是以记之，盖叹郦元之简。", "s": "（《石 钟山记》）", "ch": "J"}, {"w": "贱", "p": "jiàn", "d": "地位低下、卑贱", "e": "是故无贵无贱，无长无少。", "s": "（《师 说》）", "ch": "J"}, {"w": "贱", "p": "jiàn", "d": "轻视、看不起", "e": "吴起见公主之贱君也，则必辞。", "s": "（《孙 子吴起列传》）", "ch": "J"}, {"w": "贱", "p": "jiàn", "d": "谦词", "e": "贱妾留空房，相见常日稀。", "s": "（《孔雀东南飞》）", "ch": "J"}, {"w": "矫", "p": "jiǎo", "d": "假托、诈称", "e": "乃矫郑伯之命以劳之。", "s": "（《吕氏春秋 悔过》）", "ch": "J"}, {"w": "矫", "p": "jiǎo", "d": "违背", "e": "亦不敢服垢弊以矫俗干名，但顺吾性而已。", "s": "（《训俭示康》）", "ch": "J"}, {"w": "矫", "p": "jiǎo", "d": "举起、扬起", "e": "策扶老以流憩，时矫首而遐观。", "s": "（《归 去来兮辞》）", "ch": "J"}, {"w": "孑", "p": "jié", "d": "孤单", "e": "茕茕孑立，形影相吊。", "s": "（《陈情表》）", "ch": "J"}, {"w": "介", "p": "jiè", "d": "个", "e": "大王遣一介之使至赵。", "s": "（《廉颇蔺相如列传》）", "ch": "J"}, {"w": "介", "p": "jiè", "d": "独特、不合群、清高孤傲", "e": "马素介，闻陶言，甚鄙之。", "s": "（《黄英》）", "ch": "J"}, {"w": "介", "p": "jiè", "d": "铠甲、甲士", "e": "既而与为公介，倒戟以御公徒。", "s": "（《晋 灵公不君》）", "ch": "J"}, {"w": "矜", "p": "jīn", "d": "矛柄", "e": "锄櫌棘矜，非铦于钩戟长铩也。", "s": "（《过秦论》）", "ch": "J"}, {"w": "矜", "p": "jīn", "d": "怜悯、同情", "e": "凡在故老，犹蒙矜育。", "s": "（《陈情表》）", "ch": "J"}, {"w": "矜", "p": "jīn", "d": "骄傲", "e": "虫翘然矜鸣，似报主知。", "s": "（《促织》）", "ch": "J"}, {"w": "矜", "p": "jīn", "d": "夸耀", "e": "自矜功伐，奋其私智而不师古。", "s": "（《史记 项 羽本纪》）", "ch": "J"}, {"w": "矜", "p": "jīn", "d": "慎重、谨慎", "e": "然闻信至，咸自矜持。", "s": "（《晋书 王羲 之传》）", "ch": "J"}, {"w": "靳", "p": "jìn", "d": "吝惜", "e": "床头金任君挥去之，妾不靳也。", "s": "（《黄英》）", "ch": "J"}, {"w": "旌", "p": "jīng", "d": "旗子", "e": "旌旗蔽空，酾酒临江。", "s": "（《赤壁赋》）", "ch": "J"}, {"w": "旌", "p": "jīng", "d": "表彰", "e": "以旌其美。", "s": "（《表论田畴功》）", "ch": "J"}, {"w": "景", "p": "jǐng", "d": "日光", "e": "景翳翳以将入，抚孤松而盘桓。", "s": "（《归 去来兮辞》）", "ch": "J"}, {"w": "景", "p": "jǐng", "d": "同“影”，影子，像影子一样", "e": "天下云集响应，赢粮 而景从。", "s": "（《过秦论》）", "ch": "J"}, {"w": "景", "p": "jǐng", "d": "大", "e": "凡百元首，承天景命。", "s": "（《谏太宗十思疏》）", "ch": "J"}, {"w": "景", "p": "jǐng", "d": "景色", "e": "以欹为美，正则无景。", "s": "（《病梅馆记》）", "ch": "J"}, {"w": "竟", "p": "jìng", "d": "完毕、终了", "e": "秦王竟酒，终不能加胜于赵。", "s": "（《廉 颇蔺相如列传》）", "ch": "J"}, {"w": "竟", "p": "jìng", "d": "从头至尾、整", "e": "何竟日默默在此，大类女郎也？", "s": "（《项 脊轩志》）", "ch": "J"}, {"w": "就", "p": "jiù", "d": "靠近、接近", "e": "客至无器皿、肴、果，故就酒家觞之。", "s": "（《训俭示康》）", "ch": "J"}, {"w": "就", "p": "jiù", "d": "完成、成就", "e": "吴起于是欲就名，逐杀其妻。", "s": "（《孙 子吴起列传》）", "ch": "J"}, {"w": "咎", "p": "jiù", "d": "罪过、过失", "e": "跋前踬后，动辄得咎。", "s": "（《进 学解》）", "ch": "J"}, {"w": "咎", "p": "jiù", "d": "归罪、责怪", "e": "成事不说，逐事不谏，既往不咎。", "s": "（《论语 八佾》）", "ch": "J"}, {"w": "居", "p": "jū", "d": "停留、止息", "e": "居则具一日之积，行则备一夕之卫。", "s": "（《秦晋殽之战》）", "ch": "J"}, {"w": "居", "p": "jū", "d": "处于", "e": "此乃吾所以居子之上也。", "s": "（《孙子吴起列传》）", "ch": "J"}, {"w": "居", "p": "jū", "d": "平日", "e": "居则曰：‘不吾知也。’", "s": "（《子路、曾皙、 冉有、公西华侍坐》）", "ch": "J"}, {"w": "居", "p": "jū", "d": "用在时间此前，可译为“过了”", "e": "居顷之，其母死， 起终不归。", "s": "（《孙子吴起列传》）", "ch": "J"}, {"w": "居", "p": "jū", "d": "积蓄、储存", "e": "昂其直，居为奇货。", "s": "（《促织》）", "ch": "J"}, {"w": "居", "p": "jū", "d": "镇守", "e": "汾阳王以副元帅居蒲。", "s": "（《段太尉逸事状》）", "ch": "J"}, {"w": "举", "p": "jǔ", "d": "举起、抬起", "e": "手裁举，则又超忽而跃。", "s": "（《促织》）", "ch": "J"}, {"w": "举", "p": "jǔ", "d": "发动、进攻", "e": "即具以北虚实告东西二阃，约以连兵大 举。", "s": "（《指南录后序》）", "ch": "J"}, {"w": "举", "p": "jǔ", "d": "占领、攻下", "e": "戍卒叫，函谷举。", "s": "（《过秦论》）", "ch": "J"}, {"w": "举", "p": "jǔ", "d": "推举、举荐", "e": "后刺史臣荣举臣秀才。", "s": "（《陈情表》）", "ch": "J"}, {"w": "举", "p": "jǔ", "d": "参加科举考试", "e": "累举进士，辄抑于有司。", "s": "（《梅圣 俞诗集序》）", "ch": "J"}, {"w": "举", "p": "jǔ", "d": "全", "e": "大喜，笼归，举家庆贺。", "s": "（《促织》）", "ch": "J"}, {"w": "举", "p": "jǔ", "d": "尽", "e": "杀人如不能举，刑人如恐不胜。", "s":  "（《孔雀东南 飞》）", "ch": "L"}, {"w": "陋", "p": "loù", "d": "偏僻", "e": "楚国僻陋，托东海之上。", "s": "（《战国策 楚策》）", "ch": "L"}, {"w": "陋", "p": "loù", "d": "狭小、简陋", "e": "又以故居陋，欲使就南第居。", "s": "（《黄 英》）", "ch": "L"}, {"w": "陋", "p": "loù", "d": "见识少、浅陋", "e": "人皆嗤吾固陋，吾不以为病。", "s": "（《训 俭示康》）", "ch": "L"}, {"w": "履", "p": "lv", "d": "鞋子", "e": "走卒类士服，农夫蹑丝履。", "s": "（《训俭示康》）", "ch": "L"}, {"w": "履", "p": "lv", "d": "踩、踏", "e": "如履薄冰。", "s": "", "ch": "L"}, {"w": "履", "p": "lv", "d": "登上", "e": "吞二周而亡诸侯，履至尊而制六合。", "s": "（《过 秦论》）", "ch": "L"}, {"w": "伦", "p": "lún", "d": "类、辈", "e": "田忌、廉颇、赵奢之伦制其兵。", "s": "（《过秦 论》）", "ch": "L"}, {"w": "伦", "p": "lún", "d": "人伦、人际道德关系", "e": "欲洁其身，而乱大伦。", "s": "（《荷 蓧丈人》）", "ch": "L"}, {"w": "论", "p": "lùn", "d": "判决、定罪", "e": "会论虞常，欲因此时降武。", "s": "（《苏武 传》）", "ch": "L"}, {"w": "率", "p": "lv", "d": "率领、带领", "e": "率疲弊之卒，将数百之众。", "s": "（《过秦 论》）", "ch": "L"}, {"w": "率", "p": "lv", "d": "大都", "e": "饮食大率鼠之余也。", "s": "（《永某氏之鼠》）", "ch": "L"}, {"w": "率", "p": "lv", "d": "一律、一概", "e": "六国互丧，率赂秦耶？", "s": "（《六国论》）", "ch": "L"}, {"w": "率", "p": "lv", "d": "轻率", "e": "子路率尔而对曰。", "s": "（《子路、曾皙、冉有、 公西华侍坐》）", "ch": "L"}, {"w": "靡", "p": "mí", "d": "无、没有、不", "e": "靡计不施，迄无济。", "s": "（《促织》）", "ch": "M"}, {"w": "靡", "p": "mí", "d": "倒下", "e": "相如张目叱之，左右皆靡。", "s": "（《廉颇蔺相如 列传》）", "ch": "M"}, {"w": "靡", "p": "mí", "d": "浪费、奢侈", "e": "吾性不喜华靡", "s": "（《训俭示康》）", "ch": "M"}, {"w": "縻", "p": "mí", "d": "牵制、束缚", "e": "予羁縻不得还，国事遂不可收拾。", "s": "（《指 南录后序》）", "ch": "M"}, {"w": "弥", "p": "mí", "d": "满、充满", "e": "马畜弥山，富贵如此。", "s": "（《苏武传》）", "ch": "M"}, {"w": "弥", "p": "mí", "d": "更加", "e": "奉之弥繁，侵之愈急。", "s": "（《六国论》）", "ch": "M"}, {"w": "弭", "p": "mǐ", "d": "消除、停止", "e": "而不能弭皇甫镈、李逢吉之谤。", "s": "（《潮 州韩文公庙碑》）", "ch": "M"}, {"w": "闵", "p": "mǐn", "d": "同“悯”，忧患、凶丧", "e": "臣以险衅，夙遭闵凶。", "s": "（《陈 情表》）", "ch": "M"}, {"w": "闵", "p": "mǐn", "d": "同“悯”，哀怜、怜悯", "e": "宋人有闵其苗之不长而揠之 者。", "s": "（《我善养吾浩然之气》）", "ch": "M"}, {"w": "莫", "p": "mò", "d": "同“暮”，日落时分，傍晚", "e": "至莫夜月明，独与迈乘 小舟。", "s": "（《石钟山记》）", "ch": "M"}, {"w": "莫", "p": "mò", "d": "无、没有、不、不要", "e": "童子莫对，垂头而睡。", "s": "（《秋 声赋》）", "ch": "M"}, {"w": "莫", "p": "mò", "d": "没有什么、没有谁", "e": "保民而王，莫之能御也。", "s": "（《齐 桓晋文之事》）", "ch": "M"}, {"w": "莫", "p": "mò", "d": "同“幕”，幕帐", "e": "上功莫府，一言不相应，文吏以法 绳之。", "s": "（《张释之冯唐列传》）", "ch": "M"}, {"w": "没", "p": "méi", "d": "沉没、消失", "e": "日与北骑相出没于长淮间。", "s": "（《指南 录后序》）", "ch": "M"}, {"w": "没", "p": "méi", "d": "陷落", "e": "后随浞野侯没胡中。", "s": "（《苏武传》）", "ch": "M"}, {"w": "没", "p": "méi", "d": "同“殁”，死", "e": "孝公既没，惠文、武、昭襄蒙故业。", "s": "（《过秦论》）", "ch": "M"}, {"w": "牧", "p": "mù", "d": "放养", "e": "胡人不敢南下而牧马。", "s": "（《过秦论》）", "ch": "M"}, {"w": "牧", "p": "mù", "d": "古代最高统治者或地方长官", "e": "非独蜀之人士及二州牧 伯所见明知。", "s": "（《陈情表》）", "ch": "M"}, {"w": "牧", "p": "mù", "d": "养", "e": "念高危，则思谦冲而自牧。", "s": "（《谏太宗十思疏》）", "ch": "M"}, {"w": "难", "p": "nán", "d": "反驳、质问", "e": "尝与其父言兵事，奢不能难。", "s": "（《廉 颇蔺相如列传》）", "ch": "N"}, {"w": "难", "p": "nán", "d": "灾难、祸殃", "e": "予在患难中，间以诗记所遭。", "s": "（《指 南录后序》）", "ch": "N"}, {"w": "难", "p": "nán", "d": "困难、不易", "e": "然贫者愿富为难，富者求贫固亦甚易。", "s": "（《黄英》）", "ch": "N"}, {"w": "难", "p": "nán", "d": "发难", "e": "陈涉首难，豪杰蜂起，相与并争。", "s": "（《史记 项羽本纪》）", "ch": "N"}, {"w": "曩", "p": "nǎng", "d": "以往、过去", "e": "寡人曩不知，今知矣。", "s": "（《韩非子 外 储说右下》）", "ch": "N"}, {"w": "内", "p": "nèi", "d": "同“纳”，接纳、交纳", "e": "距关，毋内诸侯，秦地可尽 王也。", "s": "（《鸿门宴》）", "ch": "N"}, {"w": "逆", "p": "nì", "d": "迎接", "e": "入自皇门，郑伯肉袒牵羊以逆。", "s": "（《史记 楚 世家》）", "ch": "N"}, {"w": "逆", "p": "nì", "d": "揣测、预料", "e": "恐不任我意，逆以煎我怀。", "s": "（《孔雀 东南飞》）", "ch": "N"}, {"w": "逆", "p": "nì", "d": "背叛、叛逆", "e": "且以一璧之故逆强秦之欢，不可。", "s": "（《廉 颇蔺相如列传》）", "ch": "N"}, {"w": "宁", "p": "níng", "d": "难道", "e": "当二公之初守也，宁能知人之卒不救。", "s": "（《张 中丞传后叙》）", "ch": "N"}, {"w": "宁", "p": "níng", "d": "宁可", "e": "均之二策，宁许以负秦曲。", "s": "（《廉颇蔺相如 列传》）", "ch": "N"}, {"w": "辟", "p": "pì", "d": "法度、法律", "e": "辟言不信，如彼行迈。", "s": "（《诗经》）", "ch": "P"}, {"w": "辟", "p": "pì", "d": "征召", "e": "举孝廉，不行，连辟公府，不就。", "s": "（《后汉书 张衡传》）", "ch": "P"}, {"w": "辟", "p": "pì", "d": "开、开辟", "e": "辟病梅之馆以贮之。", "s": "（《病梅馆记》）", "ch": "P"}, {"w": "辟", "p": "pì", "d": "同“避”，躲开、避免", "e": "文王之所辟风雨也。", "s": "（《秦 晋崤之战》）", "ch": "P"}, {"w": "辟", "p": "pì", "d": "同“僻”，偏僻", "e": "秦国辟远。 （《史记 范雎传》", "s": "", "ch": "P"}, {"w": "畔", "p": "pàn", "d": "同“叛”，背叛", "e": "不顾恩义，畔主背亲。", "s": "（《苏武 传》）", "ch": "P"}, {"w": "朋", "p": "péng", "d": "结党、勾结", "e": "朋比为奸。", "s": "", "ch": "P"}, {"w": "朋", "p": "péng", "d": "比", "e": "硕大无朋。", "s": "", "ch": "P"}, {"w": "殍", "p": "piǎo", "d": "饿死（的人）", "e": "野有饿殍。", "s": "", "ch": "P"}, {"w": "屏", "p": "píng", "d": "除去、排除", "e": "屏流言之迹，塞朋党之门。", "s": "（《史记 苏秦列传》）", "ch": "P"}, {"w": "屏", "p": "píng", "d": "退、隐退", "e": "籍因以疾辞，屏于田里。", "s": "（《晋书 阮籍 传》）", "ch": "P"}, {"w": "期", "p": "qī", "d": "约定、约会", "e": "令四面骑驰下，期山东为三处。", "s": "（《垓 下之围》）", "ch": "Q"}, {"w": "期", "p": "qī", "d": "整年、一周年", "e": "期年之后，虽欲言，无可进者。", "s": "（《邹 忌讽齐王纳谏》）", "ch": "Q"}, {"w": "期", "p": "qī", "d": "期望、要求", "e": "富贵非吾愿，帝乡不可期。", "s": "（《归去 来兮辞》）", "ch": "Q"}, {"w": "戚", "p": "qī", "d": "斧", "e": "刑天舞干戚。", "s": "（《读山海经》）", "ch": "Q"}, {"w": "戚", "p": "qī", "d": "忧愁、悲伤", "e": "使其中无可欲者，虽无石椁，又何戚焉！", "s": "（《张释之冯唐列传》）", "ch": "Q"}, {"w": "戚", "p": "qī", "d": "亲属", "e": "虽其兄弟亲戚不能相保。", "s": "（《朋党论》）", "ch": "Q"}, {"w": "讫", "p": "qì", "d": "完毕、结束", "e": "祠谒既讫。", "s": "（《后汉书 张禹传》）", "ch": "Q"}, {"w": "迄", "p": "qì", "d": "到", "e": "自辰以迄四漏，计各尽百壶。", "s": "（《黄英》）", "ch": "Q"}, {"w": "迄", "p": "qì", "d": "最终", "e": "靡计不施，迄无济。", "s": "（《促织》）", "ch": "Q"}, {"w": "迁", "p": "qiān", "d": "迁移", "e": "战、守、迁皆不及施。", "s": "（《指南录后序》）", "ch": "Q"}, {"w": "迁", "p": "qiān", "d": "调动官职，一般指升官", "e": "稍迁至栘中厩监。", "s": "（《苏 武传》）", "ch": "Q"}, {"w": "迁", "p": "qiān", "d": "【左迁】", "e": "贬官：余左迁九江军司马。", "s": "（《琵琶行 并序》）", "ch": "Q"}, {"w": "迁", "p": "qiān", "d": "放逐、流放", "e": "然陈涉瓮牖绳枢之子，氓隶之人，而迁 徙之徒也。", "s": "（《》）", "ch": "Q"}, {"w": "愆", "p": "qiān", "d": "过失、过错", "e": "元首无失道之愆。", "s": "（《汉书 刘辅传》）", "ch": "Q"}, {"w": "慊", "p": "qiàn", "d": "不满足、遗憾", "e": "贵不慊于上。", "s": "（《礼记 坊记》）", "ch": "Q"}, {"w": "慊", "p": "qiàn", "d": "同“惬”，满足、快意", "e": "行有不慊于心，则馁矣。", "s": "（《我 善养吾浩然之气》）", "ch": "Q"}, {"w": "寝", "p": "qǐn", "d": "躺着休息", "e": "暮寝而思之，曰：“吾妻之美我者。”", "s": "（《邹忌讽齐王纳谏》）", "ch": "Q"}, {"w": "寝", "p": "qǐn", "d": "停止", "e": "任殷浩以抗温，寝温疏不报。", "s": "（《晋略 桓温 传》）", "ch": "Q"}, {"w": "穷", "p": "qióng", "d": "阻塞不通", "e": "穷途末路。", "s": "", "ch": "Q"}, {"w": "穷", "p": "qióng", "d": "尽", "e": "穷予生之光阴以疗梅也哉！", "s": "（《病梅馆记》）", "ch": "Q"}, {"w": "穷", "p": "qióng", "d": "不得志、困窘", "e": "予闻世谓诗人少达而多穷。", "s": "（《梅 圣俞诗集序》）", "ch": "Q"}, {"w": "穷", "p": "qióng", "d": "生活困难", "e": "子孙习其家风，今多穷困。", "s": "（《训俭示 康》）", "ch": "Q"}, {"w": "茕", "p": "qióng", "d": "【茕茕】孤单的样子", "e": "茕茕孑立。", "s": "（《陈情表》）", "ch": "Q"}, {"w": "区", "p": "qū", "d": "【区区】", "e": "少、小：然秦以区区之地，致万乘之势。", "s": "（《过秦论》）", "ch": "Q"}, {"w": "区", "p": "qū", "d": "【区区】", "e": "见识少：何乃太区区！此妇无礼节。", "s": "（《孔 雀东南飞》）", "ch": "Q"}, {"w": "区", "p": "qū", "d": "【区区】", "e": "诚挚、情义深厚：感君区区怀！君既若见 录。", "s": "（《孔雀东南飞》）", "ch": "Q"}, {"w": "区", "p": "qū", "d": "【区区】", "e": "自称谦词：区区所献，唯将军省焉。", "s": "（《后 汉书 窦融传》）", "ch": "Q"}, {"w": "趋", "p": "qū", "d": "小步快走", "e": "急趋之，折过墙隅，迷其所在。", "s": "（《促 织》）", "ch": "Q"}, {"w": "趋", "p": "qū", "d": "趋向、前往", "e": "夜趋高邮，迷失道，几陷死。", "s": "（《指 南录后序》）", "ch": "Q"}, {"w": "趋", "p": "qū", "d": "同“促”，催促、赶快", "e": "定公越席而起，曰：“趋驾 召颜渊。”", "s": "（《荀子 哀公》）", "ch": "Q"}, {"w": "渠", "p": "qú", "d": "同“趋”，趋向、前往、小步快走", "e": "农赴时，商趣利。", "s": "（《列子 力命》）", "ch": "Q"}, {"w": "渠", "p": "qú", "d": "【趣舍】", "e": "进取或退止：虽趣舍万殊，静躁不同。", "s": "（《兰 亭集序》）", "ch": "Q"}, {"w": "渠", "p": "qú", "d": "同“促”，催促、赶快", "e": "乃令军中趣修攻具。", "s": "（《后 汉书》）", "ch": "Q"}, {"w": "劝", "p": "quàn", "d": "鼓励", "e": "《劝学》", "s": "", "ch": "Q"}, {"w": "劝", "p": "quàn", "d": "劝说", "e": "或劝以少休，公曰。", "s": "（《左忠毅公逸事》）", "ch": "Q"}, {"w": "俟", "p": "qí", "d": "等待", "e": "以俟乎观人风者得焉。", "s": "（《捕蛇者说》）", "ch": "Q"}, {"w": "让", "p": "ràng", "d": "责备", "e": "如惠语以让单于。", "s": "（《苏武传》）", "ch": "R"}, {"w": "让", "p": "ràng", "d": "辞让、退让、谦让", "e": "更相称美、更相推让。", "s": "（《朋 党论》）", "ch": "R"}, {"w": "如", "p": "rú", "d": "到……去", "e": "纵一苇之所如，凌万顷之茫然。", "s": "（《赤 壁赋》）", "ch": "R"}, {"w": "如", "p": "rú", "d": "象、如同", "e": "成妻纳钱案上，焚拜如前人。", "s": "（《促织》）", "ch": "R"}, {"w": "如", "p": "rú", "d": "按照", "e": "如惠语以让单于。", "s": "（《苏武传》）", "ch": "R"}, {"w": "如", "p": "rú", "d": "及、比得上", "e": "他植者虽窥伺效慕，莫能如也。", "s": "（《种 树郭橐驼传》）", "ch": "R"}, {"w": "如", "p": "rú", "d": "形容词词尾，……的样子", "e": "突如其来。", "s": "", "ch": "R"}, {"w": "杀", "p": "shā", "d": "衰退、残败", "e": "夷，戮也，物过盛而当杀。", "s": "（《秋声 赋》）", "ch": "S"}, {"w": "杀", "p": "shā", "d": "极", "e": "白蘋愁杀白头翁。", "s": "（《清明》）", "ch": "S"}, {"w": "善", "p": "shàn", "d": "好、好的", "e": "裂裳衣疮，手注善药。", "s": "（《段太尉逸事 状》）", "ch": "S"}, {"w": "善", "p": "shàn", "d": "交好、亲善", "e": "项羽季父也，素善留侯张良。", "s": "（《鸿 门宴》）", "ch": "S"}, {"w": "善", "p": "shàn", "d": "擅长、善于", "e": "溪虽莫利于世，而善鉴万类。", "s": "（《愚 溪诗序》）", "ch": "S"}, {"w": "赡", "p": "shàn", "d": "富足、充足", "e": "此惟救死而恐不赡，奚暇治礼义哉。", "s": "（《齐桓晋文之事》）", "ch": "S"}, {"w": "稍", "p": "shāo", "d": "逐渐", "e": "兄弟并为郎。稍迁至栘中厩监。", "s": "（《苏武传》）", "ch": "S"}, {"w": "稍", "p": "shāo", "d": "稍微、略微", "e": "半夜复苏。夫妻心稍慰。", "s": "（《促织》）", "ch": "S"}, {"w": "少", "p": "shǎo", "d": "同“稍”，稍微", "e": "公宜少从众。", "s": "（《训俭示康》）", "ch": "S"}, {"w": "少", "p": "shǎo", "d": "轻视、看不起", "e": "且夫我尝闻少仲尼之闻，而轻伯夷之 义者。", "s": "（《秋水》）", "ch": "S"}, {"w": "少", "p": "shǎo", "d": "【少焉】", "e": "不久：少焉，月出于东山之上。", "s": "（《赤 壁赋》）", "ch": "S"}, {"w": "摄", "p": "shè", "d": "夹", "e": "千乘之国，摄乎大国之间。", "s": "（《子路、曾皙、 冉有、公西华侍坐》）", "ch": "S"}, {"w": "摄", "p": "shè", "d": "整理、整顿", "e": "独夜不能寐，摄衣起抚琴。", "s": "（《七哀》）", "ch": "S"}, {"w": "摄", "p": "shè", "d": "辅佐、辅助", "e": "摄政王。", "s": "", "ch": "S"}, {"w": "申", "p": "shēn", "d": "同“伸”，舒展、伸直", "e": "衣焦不申，头尘不去。", "s": "（《苏 秦始将连横》）", "ch": "S"}, {"w": "申", "p": "shēn", "d": "告诫", "e": "约束既布，乃设鈇钺，即三令五申之。", "s": "（《孙 子吴起列传》）", "ch": "S"}, {"w": "申", "p": "shēn", "d": "反复陈述、重复", "e": "谨庠序之教，申之以孝悌之义。", "s": "（《齐桓晋文之事》）", "ch": "S"}, {"w": "审", "p": "shěn", "d": "详细、周密", "e": "博学之，审问之，慎思之，明辨之。", "s": "（《礼 记 中庸》）", "ch": "S"}, {"w": "审", "p": "shěn", "d": "清楚、明白", "e": "其为不虚取值也的矣，其知恐而畏也审 矣。", "s": "（《送薛存义之任序》）", "ch": "S"}, {"w": "审", "p": "shěn", "d": "仔细、仔细考察", "e": "审视，巨身修尾，青项金翅。", "s": "（《促 织》）", "ch": "S"}, {"w": "矧", "p": "shěn", "d": "何况", "e": "矧燕赵之士出乎其性者哉。", "s": "（《送董邵南序》）", "ch": "S"}, {"w": "绳", "p": "shéng", "d": "木工用的墨线", "e": "木直中绳，輮以为轮。", "s": "（《劝学》）", "ch": "S"}, {"w": "绳", "p": "shéng", "d": "标准、法则", "e": "若是，则百吏莫不畏法而遵绳也。", "s": "（《荀 子 王霸》）", "ch": "S"}, {"w": "绳", "p": "shéng", "d": "按一定的标准衡量、纠正", "e": "未可明诏大号以绳天下之 梅也。", "s": "（《病梅馆记》）", "ch": "S"}, {"w": "绳", "p": "shéng", "d": "约束、制裁", "e": "绳之以法。", "s": "", "ch": "S"}, {"w": "省", "p": "shěng", "d": "察看、检查", "e": "君子博学而日参省乎己，则知明而行无 过矣。", "s": "（《劝学》）", "ch": "S"}, {"w": "省", "p": "shěng", "d": "减少、节省", "e": "省徭役，减赋税。", "s": "（《三国志 吴主 传》）", "ch": "S"}, {"w": "省", "p": "shěng", "d": "【省亲】", "e": "探望父母。", "s": "", "ch": "S"}, {"w": "胜", "p": "shèng", "d": "能承受", "e": "沛公不胜杯杓，不能辞。", "s": "（《鸿门宴》）", "ch": "S"}, {"w": "胜", "p": "shèng", "d": "尽、完", "e": "杀人如不能举，刑人如恐不胜。", "s": "（《鸿门 宴》）", "ch": "S"}, {"w": "胜", "p": "shèng", "d": "优美的", "e": "胜地不常，盛筵难再。", "s": "（《滕王阁序》）", "ch": "S"}, {"w": "胜", "p": "shèng", "d": "美景", "e": "即其庐之西南为亭，以览观江流之胜。", "s": "（《黄 州快哉亭记》）", "ch": "S"}, {"w": "胜", "p": "shèng", "d": "战胜、胜利", "e": "较秦之年得，与战胜而得者。", "s": "（《六 国论》）", "ch": "S"}, {"w": "胜", "p": "shèng", "d": "超过、胜过", "e": "质胜文则野，文胜质则史。", "s": "（《论语》）", "ch": "S"}, {"w": "是", "p": "shì", "d": "正确、对", "e": "实迷途其未远，觉今是而昨非。", "s": "（《归 去来兮辞》）", "ch": "S"}, {"w": "是", "p": "shì", "d": "这、这个", "e": "故姓是溪为冉溪。", "s": "（《愚溪诗序》）", "ch": "S"}, {"w": "是", "p": "shì", "d": "【是以】【是故】", "e": "因此：是故燕虽小国而后亡，斯 用兵之效也。", "s": "（《六国论》）", "ch": "S"}, {"w": "适", "p": "shì", "d": "到……去", "e": "不以物伤性，将何适而非快？", "s": "（《黄州 快哉亭记》）", "ch": "S"}, {"w": "适", "p": "shì", "d": "女子出嫁", "e": "贫贱有此女，始适还家门。", "s": "（《孔雀东 南飞》）", "ch": "S"}, {"w": "适", "p": "shì", "d": "恰好、刚才", "e": "适得府君书，明日来迎汝。", "s": "（《孔雀 东南飞》）", "ch": "S"}, {"w": "适", "p": "shì", "d": "依照、按照", "e": "处分适兄意，那得自任专。", "s": "（《孔雀 东南飞》）", "ch": "S"}, {"w": "适", "p": "shì", "d": "满足、快意", "e": "揖西山之白云 ，穷耳目之胜以自适也哉。", "s": "（《黄州快哉亭记》）", "ch": "S"}, {"w": "疏", "p": "shū", "d": "奏章的一种", "e": "《谏太宗十思疏》", "s": "", "ch": "S"}, {"w": "疏", "p": "shū", "d": "分条陈述", "e": "以金笼进上，细疏其能。", "s": "（《促织》）", "ch": "S"}, {"w": "疏", "p": "shū", "d": "稀疏", "e": "摇其本以观其疏密。", "s": "（《种树郭橐驼传》）", "ch": "S"}, {"w": "疏", "p": "shū", "d": "疏远", "e": "捐不急之官，废公族疏远者。", "s": "（《孙子吴起 列传》）", "ch": "S"}, {"w": "殊", "p": "shū", "d": "不同", "e": "始皇既没，余威震于殊俗。", "s": "（《过秦论》）", "ch": "S"}, {"w": "殊", "p": "shū", "d": "很、非常", "e": "而君畏匿之，恐惧殊甚。", "s": "（《廉颇蔺相 如列传》）", "ch": "S"}, {"w": "纾", "p": "shū", "d": "缓解", "e": "众谓予一行为可以纾祸。", "s": "（《指南录后序》）", "ch": "S"}, {"w": "孰", "p": "shú", "d": "同“熟”，仔细、周详", "e": "唯大王与群臣孰计议之。", "s": "（《廉颇蔺相如列传》）", "ch": "S"}, {"w": "孰", "p": "shú", "d": "谁、哪一个", "e": "可以无悔矣，其孰能讥之乎？", "s": "（《游 褒禅山记》）", "ch": "S"}, {"w": "孰", "p": "shú", "d": "【孰与】", "e": "和……相比，哪一个……：公之视廉将军 孰与秦王？", "s": "（《廉颇蔺相如列传》）", "ch": "S"}, {"w": "熟", "p": "shú", "d": "仔细、周详", "e": "愿陛下熟图之。", "s": "（《韩非子》）", "ch": "S"}, {"w": "熟", "p": "shú", "d": "熟练、熟悉", "e": "嵩曰：“未熟也。”", "s": "（《张中丞传后 叙》）", "ch": "S"}, {"w": "熟", "p": "shú", "d": "习惯", "e": "熟视无睹。", "s": "", "ch": "S"}, {"w": "属", "p": "shǔ", "d": "连接", "e": "见市人买花者，车载肩负，道相属也。", "s": "（《黄 英》）", "ch": "S"}, {"w": "属", "p": "shǔ", "d": "跟随、跟从", "e": "驾一叶之扁舟，举匏樽以相属。", "s": "（《赤 壁赋》）", "ch": "S"}, {"w": "属", "p": "shǔ", "d": "同“嘱”，委托、交付", "e": "于是使骑捕，属之廷尉。", "s": "（《张 释之冯唐列传》）", "ch": "S"}, {"w": "属", "p": "shǔ", "d": "同“嘱”，嘱托", "e": "使人属孟尝君，愿寄食门下。", "s": "（《冯 谖客孟尝君》）", "ch": "S"}, {"w": "属", "p": "shǔ", "d": "同“嘱”，劝人饮酒", "e": "举酒属客，诵明月之诗。", "s": "（《赤 壁赋》）", "ch": "S"}, {"w": "属", "p": "shǔ", "d": "类、辈", "e": "徐尚、苏秦、杜赫之属为之谋。", "s": "（《过秦 论》）", "ch": "S"}, {"w": "属", "p": "shǔ", "d": "隶属、归属、归向", "e": "意属黄英，微使人风示之。", "s": "（《黄 英》）", "ch": "S"}, {"w": "庶", "p": "shù", "d": "或许，表示可能或期望", "e": "庶刘侥幸，保卒余年。", "s": "（《陈 情表》）", "ch": "S"}, {"w": "庶", "p": "shù", "d": "差不多", "e": "王之好乐甚，则齐国其庶几乎。", "s": "（《庄暴 见孟子》）", "ch": "S"}, {"w": "数", "p": "shù", "d": "屡次、多次", "e": "范增数目项王，举所佩玉玦以示之者三。", "s": "（《鸿门宴》）", "ch": "S"}, {"w": "数", "p": "shù", "d": "计算", "e": "豪杰蜂起，相与并争，不可胜数。", "s": "（《史记 项羽本纪》）", "ch": "S"}, {"w": "数", "p": "shù", "d": "列举", "e": "谚数慢，必曰丞，至以相訾謷。", "s": "（《蓝田县 丞厅壁记》）", "ch": "S"}, {"w": "数", "p": "shù", "d": "密", "e": "其节数以急，其辞淫以哀。", "s": "（《送孟东野序》）", "ch": "S"}, {"w": "数", "p": "shù", "d": "命运、气数", "e": "则胜负之数，存亡之理，当与秦相较， 或未易量。", "s": "（《六国论》）", "ch": "S"}, {"w": "数", "p": "shù", "d": "几、几个", "e": "兵少食尽，汉军及诸侯兵围之数重。", "s": "（《垓 下之围》）", "ch": "S"}, {"w": "爽", "p": "shuǎng", "d": "差错", "e": "即道人意中事，无毫发爽。", "s": "（《促织》）", "ch": "S"}, {"w": "爽", "p": "shuǎng", "d": "败坏", "e": "五味令人口爽。", "s": "（《老子》）", "ch": "S"}, {"w": "朔", "p": "shuò", "d": "农历每月初一", "e": "元丰六年十一月朔日，赵郡苏辙记。", "s": "（《黄州快哉亭记》）", "ch": "S"}, {"w": "朔", "p": "shuò", "d": "北方", "e": "姊厌金陵，欲卜居于河朔耳。", "s": "（《黄英》）", "ch": "S"}, {"w": "私", "p": "sī", "d": "偏爱", "e": "吾妻之美我者，私我也。", "s": "（《邹忌讽齐王纳 谏》）", "ch": "S"}, {"w": "私", "p": "sī", "d": "私下、私自", "e": "燕王私握臣手曰。", "s": "（《廉颇蔺相如列 传》）", "ch": "S"}, {"w": "司", "p": "sī", "d": "掌管、主管", "e": "各司其职。", "s": "", "ch": "S"}, {"w": "司", "p": "sī", "d": "【有司】", "e": "主管某部门的官吏：董生举进士，连不得 志于有司。", "s": "（《送董邵南序》）", "ch": "S"}, {"w": "司", "p": "sī", "d": "【百司】", "e": "百官：何必劳神苦思，代百司之职役哉？", "s": "（《谏太宗十思疏》）", "ch": "S"}, {"w": "素", "p": "sù", "d": "白色", "e": "秦伯素服郊次，乡师而哭曰。", "s": "（《秦晋崤之 战》）", "ch": "S"}, {"w": "素", "p": "sù", "d": "一向、平素", "e": "项羽季父也，素善留侯张良。", "s": "（《鸿 门宴》）", "ch": "S"}, {"w": "速", "p": "sù", "d": "招致", "e": "至丹以荆卿为计，始速祸焉。", "s": "（《六国论》）", "ch": "S"}, {"w": "速", "p": "sù", "d": "快速", "e": "一鸣辄跃去，行且速。", "s": "（《促织》）", "ch": "S"}, {"w": "速", "p": "sù", "d": "邀请", "e": "不速之客", "s": "", "ch": "S"}, {"w": "夙", "p": "sù", "d": "早晨", "e": "夙兴夜寐。", "s": "", "ch": "S"}, {"w": "夙", "p": "sù", "d": "早、早年", "e": "臣以险衅，夙遭闵凶。", "s": "（《陈情表》）", "ch": "S"}, {"w": "夙", "p": "sù", "d": "向来、往日", "e": "欲稍引用，以平夙怨。", "s": "（《宋史 苏辙 传》）", "ch": "S"}, {"w": "遂", "p": "suì", "d": "成功、实现", "e": "其少时，家累千金，游仕不遂。", "s": "（《孙 子吴起列传》）", "ch": "S"}, {"w": "遂", "p": "suì", "d": "使……顺利成长", "e": "字而幼孩，遂而鸡豚。", "s": "（《种树 郭橐驼传》）", "ch": "S"}, {"w": "遂", "p": "suì", "d": "终于、竟", "e": "予羁縻不得还，国事遂不可收拾。", "s": "（《指 南录后序》）", "ch": "S"}, {"w": "遂", "p": "suì", "d": "于是、就", "e": "遂墨以葬文公。", "s": "（《秦晋崤之战》）", "ch": "S"}, {"w": "岁", "p": "suì", "d": "年成、收成", "e": "岁亦无恙耶？民亦无恙耶？", "s": "（《赵威 后问齐使》）", "ch": "S"}, {"w": "特", "p": "tè", "d": "只、仅仅、不过", "e": "相如度秦王特以诈佯为予赵城，实 不可得。", "s": "（《廉颇蔺相如列传》）", "ch": "T"}, {"w": "特", "p": "tè", "d": "【岂特】【非特】", "e": "不只、不仅仅。", "s": "", "ch": "T"}, {"w": "特", "p": "tè", "d": "特地、特别", "e": "诏书特下，拜臣郎中。", "s": "（《陈情表》）", "ch": "T"}, {"w": "悌", "p": "tì", "d": "弟弟顺从兄长", "e": "谨庠序之教，申之以孝悌之义。", "s": "（《齐 桓晋文之事》）", "ch": "T"}, {"w": "殄", "p": "tiǎn", "d": "灭绝、断绝", "e": "暴殄天物。", "s": "", "ch": "T"}, {"w": "忝", "p": "tiǎn", "d": "辱、辱没", "e": "奕世载德，不忝前人。", "s": "（《国语 周语》）", "ch": "T"}, {"w": "忝", "p": "tiǎn", "d": "谦词，愧、有愧于", "e": "二十忝科名，闻喜宴独不戴花。", "s": "（《训俭示康》）", "ch": "T"}, {"w": "徒", "p": "tú", "d": "类、辈", "e": "楼缓、翟景、苏厉、乐毅之徒通其意。", "s": "（《过 秦论》）", "ch": "T"}, {"w": "徒", "p": "tú", "d": "只、仅仅", "e": "今视息人间，徒依裙带而食，真无一毫丈 夫气矣。", "s": "（《黄英》）", "ch": "T"}, {"w": "徒", "p": "tú", "d": "白白地", "e": "欲予秦，秦城城恐不可得，徒见欺。", "s": "（《廉 颇蔺相如列传》）", "ch": "T"}, {"w": "图", "p": "tú", "d": "考虑、计议", "e": "阙秦以利晋，唯君图之。", "s": "（《烛之武 退秦师》）", "ch": "T"}, {"w": "图", "p": "tú", "d": "图谋、谋取", "e": "本图宦达，不矜名节。", "s": "（《陈情表》）", "ch": "T"}, {"w": "图", "p": "tú", "d": "预料、料想", "e": "阿母大拊掌，不图子自归", "s": "（《孔雀东 南飞》）", "ch": "T"}, {"w": "亡", "p": "wáng", "d": "逃跑、逃亡", "e": "窃计欲亡走燕。", "s": "（《廉颇蔺相如列传》）", "ch": "W"}, {"w": "亡", "p": "wáng", "d": "丢失、失去", "e": "秦无亡矢遗镞之费，而天下诸侯已困矣。", "s": "（《过秦论》）", "ch": "W"}, {"w": "亡", "p": "wáng", "d": "同“无”，没有", "e": "初并天下，亡不宾服。", "s": "（《史记 秦始皇本纪》）", "ch": "W"}, {"w": "亡", "p": "wáng", "d": "灭亡、死亡", "e": "岂若吾居位、去位、身在、身亡，常如 一日乎。", "s": "（《训俭示康》）", "ch": "W"}, {"w": "罔", "p": "wǎng", "d": "欺骗、骗取", "e": "故君子可欺以方，难罔以非其道。", "s": "（《孟 子 万章上》）", "ch": "W"}, {"w": "罔", "p": "wǎng", "d": "无、没有、不", "e": "其蓓蕾在畦者，罔不佳妙。", "s": "（《黄 英》）", "ch": "W"}, {"w": "罔", "p": "wǎng", "d": "迷惘无所得", "e": "学而不思则罔，思而不学则殆。", "s": "（《论 语》）", "ch": "W"}, {"w": "罔", "p": "wǎng", "d": "同“网”，捕猎的工具", "e": "走者可以为罔，游者可以为 纶。", "s": "（《史记 老子韩非列传》）", "ch": "W"}, {"w": "罔", "p": "wǎng", "d": "用网捕捉、陷害", "e": "及陷于罪，然后从而刑之，是罔民 也。", "s": "（《齐桓晋文之事》）", "ch": "W"}, {"w": "枉", "p": "wǎng", "d": "弯曲、不正", "e": "君子多欲则贪慕富贵，枉道速祸。", "s": "（《训 俭示康》）", "ch": "W"}, {"w": "妄", "p": "wàng", "d": "胡乱、随意", "e": "小人多欲则多求妄用，败家丧身。", "s": "（《训 俭示康》）", "ch": "W"}, {"w": "妄", "p": "wàng", "d": "荒谬、荒诞、无根据", "e": "固知一死生为虚诞，齐彭殇为 妄作。", "s": "（《兰亭集序》）", "ch": "W"}, {"w": "望", "p": "wàng", "d": "农历每月十五", "e": "壬戌之秋，七月既望，苏子与客泛舟。 【既望】：农历每月十六：壬戌之秋，七月既望，苏子 与客泛舟。", "s": "（《赤壁赋》）", "ch": "W"}, {"w": "望", "p": "wàng", "d": "埋怨、责怪", "e": "商君相秦十年，宗室贵戚多怨望者。", "s": "（《史记 商君列传》）", "ch": "W"}, {"w": "望", "p": "wàng", "d": "期望、盼望", "e": "君既若见录，不久望君来。", "s": "（《孔雀 东南飞》）", "ch": "W"}, {"w": "望", "p": "wàng", "d": "声望、名望", "e": "卿为清望官，奈何饮于酒肆？", "s": "（《训 俭示康》）", "ch": "W"}, {"w": "望", "p": "wàng", "d": "远望、看", "e": "怅然遥相望，知是故人来。", "s": "（《孔雀东 南飞》）", "ch": "W"}, {"w": "望", "p": "wàng", "d": "面对、对着", "e": "于是焉河伯始旋其面目，望洋向若而叹 曰。", "s": "（《秋水》）", "ch": "W"}, {"w": "微", "p": "wēi", "d": "如果没有", "e": "微斯人，吾谁与归。", "s": "（《岳阳楼记》）", "ch": "W"}, {"w": "微", "p": "wēi", "d": "隐藏、不显露", "e": "从数骑出，微行入古寺。", "s": "（《左忠 毅公逸事》）", "ch": "W"}, {"w": "微", "p": "wēi", "d": "暗暗地、悄悄地", "e": "微指左公私处，则席地倚墙而坐。", "s": "（《左忠毅公逸事》）", "ch": "W"}, {"w": "微", "p": "wēi", "d": "微小、轻微、衰微", "e": "微风鼓浪，水石相搏。", "s": "（《石 钟山记》）", "ch": "W"}, {"w": "微", "p": "wēi", "d": "低贱、卑下", "e": "猥以微贱，当侍东宫。", "s": "（《陈情表》）", "ch": "W"}, {"w": "危", "p": "wēi", "d": "高", "e": "危楼高百尺，手可摘星辰。", "s": "（《夜宿山寺》）", "ch": "W"}, {"w": "危", "p": "wēi", "d": "正、端正", "e": "苏子愀然，正襟危坐而问客曰。", "s": "（《赤 壁赋》）", "ch": "W"}, {"w": "危", "p": "wēi", "d": "危险", "e": "不念居安思危，戒奢以俭。", "s": "（《谏太宗十思 疏》）", "ch": "W"}, {"w": "韪", "p": "wěi", "d": "对、正确", "e": "冒天下之大不韪。", "s": "", "ch": "W"}, {"w": "委", "p": "wěi", "d": "托付、交付", "e": "俯首系颈，委命下吏。", "s": "（《过秦论》）", "ch": "W"}, {"w": "委", "p": "wěi", "d": "舍弃、丢弃", "e": "玉山倾倒，委衣于侧，即地化为菊。", "s": "（《黄 英》）", "ch": "W"}, {"w": "委", "p": "wěi", "d": "末尾", "e": "有源有委，不以远绝。", "s": "（《吕居任集序》）", "ch": "W"}, {"w": "文", "p": "wén", "d": "同“纹”，花纹", "e": "蝮蛇多文。", "s": "（《论衡 言毒》）", "ch": "W"}, {"w": "文", "p": "wén", "d": "掩饰", "e": "庸儒末学，文过饰非。", "s": "（《史通 惑经》）", "ch": "W"}, {"w": "闻", "p": "wén", "d": "听见、听说", "e": "母闻之，面色灰死。", "s": "（《促织》）", "ch": "W"}, {"w": "闻", "p": "wén", "d": "使……闻", "e": "臣具以表闻，辞不就职。", "s": "（《陈情表》）", "ch": "W"}, {"w": "闻", "p": "wén", "d": "见识、见闻", "e": "且夫我尝闻少仲尼之闻，而轻伯夷之义 者。", "s": "（《秋水》）", "ch": "W"}, {"w": "闻", "p": "wén", "d": "声誉、名声", "e": "故声闻过情，君子耻之。", "s": "（《诸子喻 山水》）", "ch": "W"}, {"w": "闻", "p": "wén", "d": "闻名、著称", "e": "拜为上卿，以勇气闻于诸侯。", "s": "（《廉 颇蔺相如列传》）", "ch": "W"}, {"w": "闻", "p": "wén", "d": "懂得、了解", "e": "生乎吾前，其闻道也固先乎吾。", "s": "（《师 说》）", "ch": "W"}, {"w": "渥", "p": "wò", "d": "深厚、优厚", "e": "过蒙拔擢，宠命优渥。", "s": "（《陈情表》）", "ch": "W"}, {"w": "务", "p": "wù", "d": "致力于、从事", "e": "内立法度，务耕织，修守战之具。", "s": "（《过 秦论》）", "ch": "W"}, {"w": "息", "p": "xī", "d": "停止", "e": "归去来兮，请息交以绝游。", "s": "（《归去来 兮辞》）", "ch": "X"}, {"w": "息", "p": "xī", "d": "增长、繁殖", "e": "是助王息其民者也，何以至今不业也？", "s": "（《赵威后问齐使》）", "ch": "X"}, {"w": "息", "p": "xī", "d": "子女", "e": "门衰祚薄，晚有儿息。", "s": "（《陈情表》）", "ch": "X"}, {"w": "息", "p": "xī", "d": "休息", "e": "鸡鸣入机织，夜夜不得息。", "s": "（《孔雀东南飞》）", "ch": "X"}, {"w": "隙", "p": "xì", "d": "缝隙、漏洞", "e": "石隙低而隘。", "s": "（《徐霞客游记》）", "ch": "X"}, {"w": "隙", "p": "xì", "d": "嫌隙、感情上的裂痕", "e": "袁术与绍有隙。", "s": "（《三国志 武帝纪》）", "ch": "X"}, {"w": "郤", "p": "xì", "d": "同“隙”，嫌隙、感情上的裂痕", "e": "今者有小人之言， 令将军与臣有郤。", "s": "（《鸿门宴》）", "ch": "X"}, {"w": "系", "p": "xì", "d": "拴、悬挂", "e": "得雁，足有系帛书。", "s": "（《苏武传》）", "ch": "X"}, {"w": "系", "p": "xì", "d": "拴、用绳子捆绑", "e": "方其系燕父子以组，函梁君臣 之首。", "s": "（《伶官传序》）", "ch": "X"}, {"w": "系", "p": "xì", "d": "拘囚", "e": "朝夕遣人候问武，而收系张胜。", "s": "（《苏武传》）", "ch": "X"}, {"w": "系", "p": "xì", "d": "牵涉、关联", "e": "情随事迁，感慨系之矣。", "s": "（《兰亭集 序》）", "ch": "X"}, {"w": "狎", "p": "xiá", "d": "亲近而不庄重", "e": "抵触偃仆，益狎。", "s": "（《临江之麋》）", "ch": "X"}, {"w": "遐", "p": "xiá", "d": "远", "e": "遐迩闻名。", "s": "", "ch": "X"}, {"w": "衔", "p": "xián", "d": "怀恨", "e": "兢大怒，畏宪不敢发，心衔之。", "s": "（《后汉书 班固传》）", "ch": "X"}, {"w": "衔", "p": "xián", "d": "口含", "e": "又如赴敌之兵，衔枚疾走。", "s": "（《秋声赋》）", "ch": "X"}, {"w": "乡", "p": "xiāng", "d": "同“向”，面对", "e": "秦伯素服郊次，乡师而哭曰。", "s": "（《秦 晋崤之战》）", "ch": "X"}, {"w": "乡", "p": "xiāng", "d": "同“向”，从前、过去", "e": "乡为身死而不受，今为宫室 之美为之。", "s": "（《鱼我所欲也》）", "ch": "X"}, {"w": "响", "p": "xiǎng", "d": "回声、声音", "e": "且下之化上，疾于景响。", "s": "（《张释之 冯唐列传》）", "ch": "X"}, {"w": "响", "p": "xiǎng", "d": "象回声一样", "e": "天下云集响应，赢粮而景从。", "s": "（《过 秦论》）", "ch": "X"}, {"w": "飨", "p": "xiǎng", "d": "用酒食款待，犒劳", "e": "旦日飨士卒，为击破沛公军！", "s": "（《鸿门宴》）", "ch": "X"}, {"w": "相", "p": "xiāng", "d": "互相、交互", "e": "若知我不降明，欲令两国相攻。", "s": "（《苏 武传》）", "ch": "X"}, {"w": "相", "p": "xiāng", "d": "表示动作偏指一方", "e": "便可白公姥，及时相遣归。", "s": "（《孔 雀东南飞》）", "ch": "X"}, {"w": "相", "p": "xiāng", "d": "省视、察看", "e": "伯乐相马。", "s": "", "ch": "X"}, {"w": "相", "p": "xiāng", "d": "辅助、辅佐", "e": "今由与求也，相夫子，远人不服而不能 来也。", "s": "（《季氏将伐颛臾》）", "ch": "X"}, {"w": "相", "p": "xiāng", "d": "扶助盲人的人", "e": "危而不持，颠而不扶，则将焉用彼相 矣？", "s": "（《季氏将伐颛臾》）", "ch": "X"}, {"w": "相", "p": "xiāng", "d": "司仪赞礼的人", "e": "如会同，端章甫，愿为小相焉。", "s": "（《子 路、曾皙、冉有、公西华侍坐》）", "ch": "X"}, {"w": "相", "p": "xiāng", "d": "形貌、状貌", "e": "儿已薄禄相，幸复得此妇。", "s": "（《孔雀 东南飞》）", "ch": "X"}, {"w": "相", "p": "xiāng", "d": "【相与】", "e": "一起：阴相与谋劫单于母阏氏归汉。", "s": "（《苏 武传》）", "ch": "X"}, {"w": "相", "p": "xiāng", "d": "【相与】", "e": "彼此交往：夫人之相与，俯仰一世。", "s": "（《兰 亭集序》）", "ch": "X"}, {"w": "向", "p": "xiàng", "d": "过去、从前", "e": "不似尔向之自多于水乎？", "s": "（《秋水》）", "ch": "X"}, {"w": "向", "p": "xiàng", "d": "朝着、面对", "e": "夫妻向隅，茅舍无烟。", "s": "（《促织》）", "ch": "X"}, {"w": "向", "p": "xiàng", "d": "【向使】", "e": "假使：向使三国各爱其地，齐人勿附于秦。", "s": "（《六国论》）", "ch": "X"}, {"w": "谢", "p": "xiè", "d": "道歉、谢罪", "e": "旦日不可不蚤自来谢项王。", "s": "（《鸿门 宴》）", "ch": "X"}, {"w": "谢", "p": "xiè", "d": "推辞、拒绝", "e": "阿母谢媒人：“女子先有誓，老姥岂敢 言！”", "s": "（《孔雀东南飞》）", "ch": "X"}, {"w": "谢", "p": "xiè", "d": "辞别、告辞", "e": "乃令张良留谢。", "s": "（《鸿门宴》）", "ch": "X"}, {"w": "谢", "p": "xiè", "d": "衰退、凋落", "e": "桃花谢了春红，太匆匆。", "s": "（《相见欢》）", "ch": "X"}, {"w": "谢", "p": "xiè", "d": "告诉、劝告", "e": "多谢后世人，戒之慎勿忘。", "s": "（《孔雀 东南飞》）", "ch": "X"}, {"w": "谢", "p": "xiè", "d": "感谢", "e": "哙拜谢，起，立而饮之。", "s": "（《鸿门宴》）", "ch": "X"}, {"w": "信", "p": "xìn", "d": "的确、确实", "e": "三子者之鸣信善矣。", "s": "（《送孟东野序》）", "ch": "X"}, {"w": "信", "p": "xìn", "d": "连住两晚", "e": "子庚门于纯门，信于城下而还。", "s": "（《左 传·襄公十八年》）", "ch": "X"}, {"w": "信", "p": "xìn", "d": "真实、诚实", "e": "而贼来益众，必以其言为信。", "s": "（《张 中丞传后叙》）", "ch": "X"}, {"w": "信", "p": "xìn", "d": "守信用", "e": "所守者道义，所行者忠信。", "s": "（《朋党论》）", "ch": "X"}, {"w": "信", "p": "xìn", "d": "相信、信任", "e": "今法如此而更重之，是法不信于民也。", "s": "（《张释之冯唐列传》）", "ch": "X"}, {"w": "信", "p": "xìn", "d": "随意", "e": "低眉信手续续弹，说尽心中无限事。", "s": "（《琵 琶行》）", "ch": "X"}, {"w": "形", "p": "xíng", "d": "形体、身体", "e": "既自以心为形役，奚惆怅而独悲？", "s": "（《归去来兮辞》）", "ch": "X"}, {"w": "形", "p": "xíng", "d": "形状、形象", "e": "夫兵形象水，水之形避高而趋下。", "s": "（《诸子喻山水》）", "ch": "X"}, {"w": "形", "p": "xíng", "d": "表现、显露", "e": "不为者与不能者之形何以异？", "s": "（《齐 桓晋文之事》）", "ch": "X"}, {"w": "形", "p": "xíng", "d": "对照、比较", "e": "长短相形，高下相倾。", "s": "（《老子》）", "ch": "X"}, {"w": "形", "p": "xíng", "d": "【形容】", "e": "形体和容貌：行吟泽畔，颜色憔悴，形容 枯槁。", "s": "（《渔父》）", "ch": "X"}, {"w": "行", "p": "xíng", "d": "将要", "e": "善万物之得时，感吾生之行休。", "s": "（《归去来 兮辞》）", "ch": "X"}, {"w": "行", "p": "xíng", "d": "量词，表示斟酒的遍数", "e": "客至未尝不置酒，或三行、 五行。", "s": "（《训俭示康》）", "ch": "X"}, {"w": "行", "p": "xíng", "d": "辈分、班辈", "e": "汉天子，我丈人行也。", "s": "（《苏武传》）", "ch": "X"}, {"w": "行", "p": "xíng", "d": "经历", "e": "行年四岁，舅夺母志。", "s": "（《陈情表》）", "ch": "X"}, {"w": "行", "p": "xíng", "d": "兼任、兼摄", "e": "丞相薨，安国行丞相事。", 【俨然】庄重的样子", "e": "将俨然作矜庄之色。", "s": "（《非 有先生论》）", "ch": "Y"}, {"w": "俨", "p": "yǎn", "d": "【俨然】整齐的样子", "e": "土地平旷，屋舍俨然。", "s": "（《桃 花源记》）", "ch": "Y"}, {"w": "俨", "p": "yǎn", "d": "【俨然】", "e": "形容很像：见蹲石鳞鳞，俨然类画。", "s": "（《促 织》）", "ch": "Y"}, {"w": "晏", "p": "yàn", "d": "晚、迟", "e": "冉子退朝。子曰:“何晏也?”", "s": "（《论语 子 路》）", "ch": "Y"}, {"w": "晏", "p": "yàn", "d": "安宁、安逸", "e": "而上下晏然，殆古所未有。", "s": "（《移沧 州过阙上殿劄子》）", "ch": "Y"}, {"w": "晏", "p": "yàn", "d": "【晏朝】", "e": "晚朝。", "s": "", "ch": "Y"}, {"w": "晏", "p": "yàn", "d": "【晏驾】", "e": "帝王死的委婉说法。", "s": "", "ch": "Y"}, {"w": "晏", "p": "yàn", "d": "【晏如】", "e": "安定的样子。", "s": "", "ch": "Y"}, {"w": "厌", "p": "yàn", "d": "同“餍”，吃饱、满足", "e": "彼实构吾二君，寡君若得而 食之不厌。", "s": "（《秦晋崤之战》）", "ch": "Y"}, {"w": "厌", "p": "yàn", "d": "厌弃、厌恶", "e": "姊厌金陵，欲卜居于河朔耳。", "s": "（《黄 英》）", "ch": "Y"}, {"w": "燕", "p": "yàn", "d": "同“宴”，安逸、安闲", "e": "虽燕居必冠。", "s": "（《史记 万 石君传》）", "ch": "Y"}, {"w": "燕", "p": "yàn", "d": "同“宴”，以酒食待客", "e": "帝与齐王燕饮。", "s": "（《汉书 高五王传》）", "ch": "Y"}, {"w": "央", "p": "yāng", "d": "尽、完", "e": "度清夜之未央，酌兰英以奉君。", "s": "（《幽兰 赋》）", "ch": "Y"}, {"w": "央", "p": "yāng", "d": "央求、恳求", "e": "我如今央红娘去书院里。", "s": "（《西厢记》）", "ch": "Y"}, {"w": "殃", "p": "yāng", "d": "祸害、使……受损害", "e": "祸国殃民。", "s": "", "ch": "Y"}, {"w": "佯", "p": "yáng", "d": "假装", "e": "相如度秦王特以诈佯为予赵城。", "s": "（《廉颇蔺 相如列传》）", "ch": "Y"}, {"w": "阳", "p": "yáng", "d": "山的南面，水的北面", "e": "灌水之阳有溪焉。", "s": "（《愚溪 诗序》）", "ch": "Y"}, {"w": "阳", "p": "yáng", "d": "假装、表面上", "e": "阳奉阴违。", "s": "", "ch": "Y"}, {"w": "杳", "p": "yǎo", "d": "遥远", "e": "辘辘远听，杳不知其所之也。", "s": "（《阿房宫赋》）", "ch": "Y"}, {"w": "杳", "p": "yǎo", "d": "幽暗", "e": "深林杳以冥冥兮，乃猿貁之所居。", "s": "（《楚辞 涉江》）", "ch": "Y"}, {"w": "窈", "p": "yǎo", "d": "幽深", "e": "由山以上五六里，有穴窈然。", "s": "（《游褒禅山 记》）", "ch": "Y"}, {"w": "要", "p": "yào", "d": "同“腰”，腰部", "e": "昔者先君灵王好小要。", "s": "（《战国 策 楚策》）", "ch": "Y"}, {"w": "要", "p": "yào", "d": "同“邀”，邀请、约请", "e": "张良出，要项伯。", "s": "（《鸿 门宴》）", "ch": "Y"}, {"w": "要", "p": "yào", "d": "半路拦截", "e": "吴人要而击之。", "s": "（《左传 襄公三年》）", "ch": "Y"}, {"w": "要", "p": "yào", "d": "要挟、威胁", "e": "虽曰不要君，吾不信也。", "s": "（《论语 宪 问》）", "ch": "Y"}, {"w": "要", "p": "yào", "d": "关键、要领", "e": "要在强兵，破驰说之言纵横者。", "s": "（《孙 子吴起列传》）", "ch": "Y"}, {"w": "要", "p": "yào", "d": "总括、概括（一般后面跟“之”）", "e": "要之，死日然后 是非乃定。", "s": "（《报任安书》）", "ch": "Y"}, {"w": "谒", "p": "yè", "d": "拜谒、拜见", "e": "太子即位为帝，谒高庙。", "s": "（《史记 吕 太后本纪》）", "ch": "Y"}, {"w": "一", "p": "yī", "d": "相同、一样", "e": "春秋冬夏不更其节，古今一也。", "s": "（《管 子 形势》）", "ch": "Y"}, {"w": "一", "p": "yī", "d": "全、整个（后跟名词）", "e": "丞之职所以贰令，于一邑无 所不当问。", "s": "（《蓝田县丞厅壁记》）", "ch": "Y"}, {"w": "一", "p": "yī", "d": "都、一概（后跟动词）", "e": "一蹑故迹，破崖岸而为之。", "s": "（《蓝田县丞厅壁记》）", "ch": "Y"}, {"w": "一", "p": "yī", "d": "整体", "e": "先是庭中通南北为一。", "s": "（《项脊轩志》）", "ch": "Y"}, {"w": "一", "p": "yī", "d": "专一", "e": "上食埃土，下饮黄泉，用心一也。", "s": "（《劝学》）", "ch": "Y"}, {"w": "一", "p": "yī", "d": "统一", "e": "六王毕，四海一。", "s": "（《阿房宫赋》）", "ch": "Y"}, {"w": "一", "p": "yī", "d": "【一何】", "e": "多么：吏呼一何怒。", "s": "（《石壕吏》）", "ch": "Y"}, {"w": "一", "p": "yī", "d": "【一旦】", "e": "有一天：一旦不能有，输来其间。", "s": "（《阿 房宫赋》）", "ch": "Y"}, {"w": "夷", "p": "yí", "d": "平、平坦", "e": "夫夷以近，则游者众。", "s": "（《游褒禅山记》）", "ch": "Y"}, {"w": "夷", "p": "yí", "d": "诛灭、消灭", "e": "坐射起而夷宗者七十余家。", "s": "（《孙子 吴起列传》）", "ch": "Y"}, {"w": "夷", "p": "yí", "d": "平定、安宁", "e": "境内清夷。", "s": "（《后汉书 王涣传》）", "ch": "Y"}, {"w": "遗", "p": "yí", "d": "送、赠送", "e": "秦昭王闻之，使人遗赵王书。", "s": "（《廉颇 蔺相如列传》）", "ch": "Y"}, {"w": "遗", "p": "yí", "d": "遗留、遗失", "e": "瞻顾遗迹，如在昨日。", "s": "（《项脊轩志》）", "ch": "Y"}, {"w": "已", "p": "yǐ", "d": "停止、废止", "e": "君子曰：学不可以已。", "s": "（《劝学》）", "ch": "Y"}, {"w": "已", "p": "yǐ", "d": "完、完毕", "e": "剑斩虞常已，律曰：", "s": "（《苏武传》）", "ch": "Y"}, {"w": "已", "p": "yǐ", "d": "治愈、病愈", "e": "可以已大风。", "s": "（《捕蛇者说》）", "ch": "Y"}, {"w": "已", "p": "yǐ", "d": "不久", "e": "庭中始为篱，已为墙，凡再变矣。", "s": "（《项脊 轩志》）", "ch": "Y"}, {"w": "已", "p": "yǐ", "d": "同“以”，用", "e": "非此二公子者，将无已也。", "s": "（《管 子 太匡》）", "ch": "Y"}, {"w": "已", "p": "yǐ", "d": "同“以”，表示时间或方位的界限", "e": "公侯已下，玉石 杂糅。", "s": "（《论衡 累害》）", "ch": "Y"}, {"w": "已", "p": "yǐ", "d": "同“矣”，句末语气词", "e": "亦不敢服垢弊以矫俗干名， 但顺吾性而已。", "s": "（《训俭示康》）", "ch": "Y"}, {"w": "已", "p": "yǐ", "d": "太、甚", "e": "不亦待其身者已廉乎？", "s": "（《原毁》）", "ch": "Y"}, {"w": "已", "p": "yǐ", "d": "已经", "e": "为太祝奉礼厅事已宽矣。", "s": "（《训俭示康》）", "ch": "Y"}, {"w": "已", "p": "yǐ", "d": "【已而】", "e": "不久：已而相如出，望见廉颇。", "s": "（《廉 颇蔺相如列传》）", "ch": "Y"}, {"w": "意", "p": "yì", "d": "料想、意料", "e": "然不自意能先入关破秦。", "s": "（《鸿门宴》）", "ch": "Y"}, {"w": "意", "p": "yì", "d": "意思、意图", "e": "此文人画士，心知其意。", "s": "（《促织》）", "ch": "Y"}, {"w": "意", "p": "yì", "d": "想法、志向", "e": "帘内掷一纸出，即道人意中事。", "s": "（《促 织》）", "ch": "Y"}, {"w": "意", "p": "yì", "d": "情景、景象", "e": "梅花翅，方首，长胫，意似良。", "s": "（《促 织》）", "ch": "Y"}, {"w": "意", "p": "yì", "d": "【意气】", "e": "意志、气概：其意气之盛，可谓壮哉！", "s": "（《伶官传序》）", "ch": "Y"}, {"w": "益", "p": "yì", "d": "增加", "e": "项梁益沛公卒五千人，五大夫将十人。", "s": "（《汉 书 高帝纪》）", "ch": "Y"}, {"w": "益", "p": "yì", "d": "好处", "e": "死何裨益？不如自行搜觅。", "s": "（《促织》）", "ch": "Y"}, {"w": "益", "p": "yì", "d": "更加", "e": "成益愕，急逐趁之。", "s": "（《促织》）", "ch": "Y"}, {"w": "益", "p": "yì", "d": "逐渐", "e": "单于益骄，非汉所望也。", "s": "（《苏武传》）", "ch": "Y"}, {"w": "易", "p": "yì", "d": "交换", "e": "何可废也？以羊易之！", "s": "（《齐桓晋文之事》）", "ch": "Y"}, {"w": "易", "p": "yì", "d": "改变", "e": "他植者则不然，根拳而土易。", "s": "（《种树郭橐 驼传》）", "ch": "Y"}, {"w": "易", "p": "yì", "d": "轻视", "e": "时尚少，县人颇易之，及观公所为，乃皆大畏 服。", "s": "（《尚书都官员外郎王公墓志铭》）", "ch": "Y"}, {"w": "易", "p": "yì", "d": "【辟易】", "e": "后退：赤泉侯人马俱惊，辟易数里。", "s": "（《垓 下之围》）", "ch": "Y"}, {"w": "易", "p": "yì", "d": "容易、轻易、简易等义项，根据语境解释", "e": "", "s": "", "ch": "Y"}, {"w": "怿", "p": "yì", "d": "高兴", "e": "于是秦王不怿，为一击缻。", "s": "（《廉颇蔺相如 列传》）", "ch": "Y"}, {"w": "轶", "p": "yì", "d": "超过、经过", "e": "将有西师过轶我，击之，必大捷焉。", "s": "（《秦 晋崤之战》）", "ch": "Y"}, {"w": "轶", "p": "yì", "d": "同“佚”，散失", "e": "至其书，世多有之，是以不论，论 其轶事。", "s": "（《史记 管晏列传》）", "ch": "Y"}, {"w": "轶", "p": "yì", "d": "同“逸”，隐遁", "e": "圣主在上，无隐士，无轶民。", "s": "（《后 汉书 赵岐传》）", "ch": "Y"}, {"w": "佚", "p": "yì", "d": "安逸、舒适", "e": "出则以车，入则以辇，务以自佚。", "s": "（《吕 氏春秋 本生》）", "ch": "Y"}, {"w": "佚", "p": "yì", "d": "丢失、散失", "e": "牛马畜兽有放佚者，取之不诘。", "s": "（《吕 氏春秋 仲冬》）", "ch": "Y"}, {"w": "佚", "p": "yì", "d": "同“逸”，隐遁", "e": "继绝世，举佚民。", "s": "（《论衡 异 虚》）", "ch": "Y"}, {"w": "逸", "p": "yì", "d": "同“佚”，散失", "e": "太尉逸事如右。", "s": "（《段太尉逸事 状》）", "ch": "Y"}, {"w": "逸", "p": "yì", "d": "逃跑", "e": "随侯逸。", "s": "（《左传 桓公八年》）", "ch": "Y"}, {"w": "逸", "p": "yì", "d": "隐遁", "e": "离人群而遁逸。", "s": "（《楚辞 远游》）", "ch": "Y"}, {"w": "逸", "p": "yì", "d": "释放", "e": "明日复战，乃逸楚囚。", "s": "（《左传 成公十六 年》）", "ch": "Y"}, {"w": "逸", "p": "yì", "d": "安逸", "e": "逸豫可以亡身，自然之理也。", "s": "（《伶官传序》）", "ch": "Y"}, {"w": "抑", "p": "yì", "d": "表选择，还是、或者", "e": "抑本其成败之迹而皆自于人欤？", "s": "（《伶官传序》）", "ch": "Y"}, {"w": "抑", "p": "yì", "d": "表转折，不过", "e": "捐他人之金，抑亦良丑。", "s": "（《黄英》）", "ch": "Y"}, {"w": "抑", "p": "yì", "d": "压抑、压制、遏止", "e": "破东胡，灭澹林，西抑强秦，南 支韩、魏。", "s": "（《张释之冯唐列传》）", "ch": "Y"}, {"w": "诣", "p": "yì", "d": "到……去，前往", "e": "成妻具资诣问。", "s": "（《促织》）", "ch": "Y"}, {"w": "诣", "p": "yì", "d": "拜访", "e": "文书行，吏抱成案诣丞。", "s": "（《蓝田县丞厅壁 记》）", "ch": "Y"}, {"w": "因", "p": "yīn", "d": "依靠、凭借", "e": "然后践华为城，因河为池。", "s": "（《过秦 论》）", "ch": "Y"}, {"w": "因", "p": "yīn", "d": "根据、按照", "e": "水因地而制流，兵因敌而制胜。", "s": "（《诸 子喻山水》）", "ch": "Y"}, {"w": "因", "p": "yīn", "d": "通过", "e": "肉袒负荆，因宾客至蔺相如门谢罪", "s": "（《廉颇 蔺相如列传》）", "ch": "Y"}, {"w": "因", "p": "yīn", "d": "趁", "e": "不如因而厚遇之，使归赵。", "s": "（《廉颇蔺相如列 传》）", "ch": "Y"}, {"w": "因", "p": "yīn", "d": "继续、延续", "e": "惠文、武、昭襄蒙故业，因遗策。", "s": "（《过 秦论》）", "ch": "Y"}, {"w": "因", "p": "yīn", "d": "机会、理由", "e": "留待作遗施，于今无会因。", "s": "（《孔雀 东南飞》）", "ch": "Y"}, {"w": "因", "p": "yīn", "d": "于是、就", "e": "试使斗而才，因责常供。", "s": "（《促织》）", "ch": "Y"}, {"w": "殷", "p": "yīn", "d": "深厚", "e": "盖在殷忧，必竭诚以待下。", "s": "（《谏太宗十思 疏》）", "ch": "Y"}, {"w": "阴", "p": "yīn", "d": "山的北面，水的南面", "e": "会于会稽山阴之兰亭。", "s": "（《兰 亭集序》）", "ch": "Y"}, {"w": "阴", "p": "yīn", "d": "暗中", "e": "阴相与谋劫单于母阏氏归汉。", "s": "（《苏武传》）", "ch": "Y"}, {"w": "淫", "p": "yín", "d": "过分、过度", "e": "若夫淫雨霏霏，连月不开。", "s": "（《岳阳 楼记》）", "ch": "Y"}, {"w": "引", "p": "yǐn", "d": "牵、拉", "e": "左右或欲引相如去。", "s": "（《廉颇蔺相如列传》）", "ch": "Y"}, {"w": "引", "p": "yǐn", "d": "掉转", "e": "望见廉颇，相如引车避匿。", "s": "（《廉颇蔺相如 列传》）", "ch": "Y"}, {"w": "引", "p": "yǐn", "d": "邀请", "e": "引赵使者蔺相如。", "s": "（《廉颇蔺相如列传》）", "ch": "Y"}, {"w": "引", "p": "yǐn", "d": "率领", "e": "项王乃复引兵而东。", "s": "（《垓下之围》）", "ch": "Y"}, {"w": "引", "p": "yǐn", "d": "举、拿", "e": "引壶觞以自酌，眄庭柯以怡颜。", "s": "（《归去 来兮辞》）", "ch": "Y"}, {"w": "引", "p": "yǐn", "d": "牵连、供出、揭发", "e": "虞常果引张胜。", "s": "（《苏武传》）", "ch": "Y"}, {"w": "引", "p": "yǐn", "d": "自杀", "e": "予分当引决，然而隐忍以行。", "s": "（《指南录后 序》）", "ch": "Y"}, {"w": "婴", "p": "yīng", "d": "缠绕", "e": "而刘夙婴疾病，常在床蓐。", "s": "（《陈情表》）", "ch": "Y"}, {"w": "赢", "p": "yíng", "d": "背负", "e": "天下云集响应，赢粮而景从。", "s": "（《过秦论》）", "ch": "Y"}, {"w": "庸", "p": "yōng", "d": "岂、难道", "e": "夫庸知其年之先后生于吾乎？", "s": "（《师说》）", "ch": "Y"}, {"w": "庸", "p": "yōng", "d": "用、使用、采用", "e": "公曰：“无庸，将自及。”", "s": "（《郑 伯克段于鄢》）", "ch": "Y"}, {"w": "庸", "p": "yōng", "d": "同“佣”，受雇佣、出卖劳动力", "e": "庸客致力而疾耕耘， 尽巧而正畦陌者，非爱主人也。", "s": "（《韩非子 外储说左 上》）", "ch": "Y"}, {"w": "庸", "p": "yōng", "d": "平庸", "e": "且庸人尚羞之，况于将相乎。", "s": "（《廉颇蔺相 如列传》）", "ch": "Y"}, {"w": "壅", "p": "yōng", "d": "堵塞、阻塞", "e": "虑壅蔽，则思虚心以纳下。", "s": "（《谏太 宗十思疏》）", "ch": "Y"}, {"w": "用", "p": "yòng", "d": "因为", "e": "上食埃土，下饮黄泉，用心一也。", "s": "（《劝学》）", "ch": "Y"}, {"w": "用", "p": "yòng", "d": "资财、费用", "e": "小人寡欲，则能谨身节用。", "s": "（《训俭 示康》）", "ch": "Y"}, {"w": "用", "p": "yòng", "d": "任用、使用", "e": "文武并用，垂拱而治。", "s": "（《谏太宗十 思疏》）", "ch": "Y"}, {"w": "用", "p": "yòng", "d": "【用事】", "e": "执掌政权：赵太后新用事。", "s": "（《触龙说 赵太后》）", "ch": "Y"}, {"w": "游", "p": "yoú", "d": "交往", "e": "归去来兮，请息交以绝游。", "s": "（《归去来兮辞》）", "ch": "Y"}, {"w": "游", "p": "yoú", "d": "外出求学、求官", "e": "家累千金，游仕不遂。", "s": "（《孙子 吴起列传》）", "ch": "Y"}, {"w": "游", "p": "yoú", "d": "游览、游玩", "e": "苏子与客泛舟，游于赤壁之下。", "s": "（《赤 壁赋》）", "ch": "Y"}, {"w": "尤", "p": "yoú", "d": "错误、罪过", "e": "夫唯不争，故无尤。", "s": "（《诸子喻山水》）", "ch": "Y"}, {"w": "尤", "p": "yoú", "d": "抱怨、指责", "e": "观者见其然，从而尤之，其亦不达于理 矣。", "s": "（《张中丞传后叙》）", "ch": "Y"}, {"w": "尤", "p": "yoú", "d": "尤其、特别", "e": "入二三里，得其尤绝者家焉。", "s": "（《愚 溪诗序》）", "ch": "Y"}, {"w": "尤", "p": "yoú", "d": "优异、杰出", "e": "从吾游者，李翱、张籍其尤也。", "s": "（《送 孟东野序》）", "ch": "Y"}, {"w": "右", "p": "yoù", "d": "上", "e": "拜为上卿，位在廉颇之右。", "s": "（《廉颇蔺相如列 传》）", "ch": "Y"}, {"w": "宥", "p": "yoù", "d": "宽恕、宽容", "e": "赦罪戾，宥小过，此谓宽其政。", "s": "（《管 子 五辅》）", "ch": "Y"}, {"w": "囿", "p": "yoù", "d": "局限、拘泥", "e": "囿于见闻。", "s": "", "ch": "Y"}, {"w": "囿", "p": "yoù", "d": "古代帝王蓄养禽兽的园林", "e": "郑之有原圃，犹秦之有具 囿也。", "s": "（《秦晋崤之战》）", "ch": "Y"}, {"w": "虞", "p": "yú", "d": "猜度、料想", "e": "不虞君之涉吾地也", "s": "（《晋楚城濮之战》）", "ch": "Y"}, {"w": "虞", "p": "yú", "d": "忧虑、忧患", "e": "今天下无虞，百姓安乐。", "s": "（《后汉书 杨震传》）", "ch": "Y"}, {"w": "虞", "p": "yú", "d": "同“娱”，欢乐", "e": "无罪以当贵，清净贞正以自虞。", "s": "（《齐宣王见严斶》）", "ch": "Y"}, {"w": "舁", "p": "yú", "d": "抬、扛", "e": "以两仆舁药浸白酒一坛，约与共尽。", "s": "（《黄 英》）", "ch": "Y"}, {"w": "与", "p": "yǔ", "d": "亲附、结交", "e": "何哉？与赢而不助五国也。", "s": "（《六国 论》）", "ch": "Y"}, {"w": "与", "p": "yǔ", "d": "交往", "e": "夫人之相与，俯仰一世。", "s": "（《兰亭集序》）", "ch": "Y"}, {"w": "与", "p": "yǔ", "d": "赞同、赞许", "e": "夫子喟然叹曰：“吾与点也。”", "s": "（《子 路、曾皙、冉有、公西华侍坐》）", "ch": "Y"}, {"w": "与", "p": "yǔ", "d": "帮助", "e": "君之谋过矣，君不与胜者而与不胜者，何故也？", "s": "（《战国策 齐策》）", "ch": "Y"}, {"w": "与", "p": "yǔ", "d": "参加、参与", "e": "蹇叔之子与师，哭而送之。", "s": "（《秦晋 崤之战》）", "ch": "Y"}, {"w": "与", "p": "yǔ", "d": "给予", "e": "玉斗一双，欲与亚父。", "s": "（《鸿门宴》）", "ch": "Y"}, {"w": "与", "p": "yǔ", "d": "对付", "e": "汉易与耳，今释弗取，后必悔之。", "s": "（《史记 项羽本纪》）", "ch": "Y"}, {"w": "与", "p": "yǔ", "d": "同“欤”，语助词。唯赤则非邦也与？", "e": "", "s": "（《子路、 曾皙、冉有、公西华侍坐》）", "ch": "Y"}, {"w": "遇", "p": "yù", "d": "对待、接待", "e": "不如因而厚遇之，使归赵。", "s": "（《廉颇 蔺相如列传》）", "ch": "Y"}, {"w": "遇", "p": "yù", "d": "遇合，指受到赏识", "e": "夫风无雌雄之异，而人有遇，不 遇之变。", "s": "（《黄州快哉亭记》）", "ch": "Y"}, {"w": "遇", "p": "yù", "d": "碰到", "e": "归至中途，遇一少年。", "s": "（《黄英》）", "ch": "Y"}, {"w": "谕/喻", "p": "yù / yù", "d": "晓谕、告示", "e": "因谕曰：“尚书固负若属耶？”", "s": "（《段 太尉逸事状》）", "ch": "Y"}, {"w": "谕/喻", "p": "yù / yù", "d": "明白、清楚", "e": "未尝不临文嗟悼，不能喻之于怀。", "s": "（《兰 亭集序》）", "ch": "Y"}, {"w": "狱", "p": "yù", "d": "案件、官司", "e": "小大之狱，虽不能察，必以情。", "s": "（《曹 刿论战》）", "ch": "Y"}, {"w": "豫", "p": "yù", "d": "同“预”，预备、事先准备", "e": "于是太子豫求天下之利 匕首。", "s": "（《史记 刺客列传》）", "ch": "Y"}, {"w": "豫", "p": "yù", "d": "同“与”，参与", "e": "于是延之屏居不豫人间者七载矣。", "s": "（《南史 颜延之传》）", "ch": "Y"}, {"w": "豫", "p": "yù", "d": "安乐、安逸", "e": "忧劳可以兴国，逸豫可以亡身，自然之 理也。", "s": "（《伶官传序》）", "ch": "Y"}, {"w": "豫", "p": "yù", "d": "迟疑不决", "e": "犹豫不决。", "s": "", "ch": "Y"}, {"w": "原", "p": "yuán", "d": "河流的源头", "e": "夫上见其原，下通其流。", "s": "（《齐宣王 见严斶》）", "ch": "Y"}, {"w": "原", "p": "yuán", "d": "起源、根源、来源", "e": "地者，万物之本原。", "s": "（《管子 水地》）", "ch": "Y"}, {"w": "原", "p": "yuán", "d": "推究、考察", "e": "原庄宗之所以得天下，与其所以失之者。", "s": "（《伶官传序》）", "ch": "Y"}, {"w": "缘", "p": "yuán", "d": "边、边缘", "e": "今缘边膏壤。", "s": "（《新唐书 吴武陵传》）", "ch": "Y"}, {"w": "缘", "p": "yuán", "d": "攀援、攀爬", "e": "以若所为求若所欲，犹缘木而求鱼也。", "s": "（《齐桓晋文之事》）", "ch": "Y"}, {"w": "缘", "p": "yuán", "d": "因缘、机遇", "e": "虽与府吏要，渠会永无缘。", "s": "（《孔雀 东南飞》）", "ch": "Y"}, {"w": "再", "p": "zài", "d": "第二次", "e": "拔根再植之，无不活。", "s": "（《黄英》）", "ch": "Z"}, {"w": "再", "p": "zài", "d": "两次", "e": "后秦击赵者再，李牧连却之。", "s": "（《六国论》）", "ch": "Z"}, {"w": "臧", "p": "zāng", "d": "善、好", "e": "陟罚臧否，不宜异同。", "s": "（《出师表》）", "ch": "Z"}, {"w": "造", "p": "zào", "d": "至、到", "e": "径造庐访成，视成所蓄。", "s": "（《促织》）", "ch": "Z"}, {"w": "造", "p": "zào", "d": "【造次】", "e": "匆忙、仓促：造次必于是。", "s": "（《论语》）", "ch": "Z"}, {"w": "责", "p": "zé", "d": "求、要求、索取", "e": "试使斗而才，因责常供。", "s": "（《促 织》）", "ch": "Z"}, {"w": "责", "p": "zé", "d": "责备、责罚", "e": "诏书切峻，责臣逋慢。", "s": "（《陈情表》）", "ch": "Z"}, {"w": "箴", "p": "zhēn", "d": "规劝、告诫", "e": "贤袭人娇嗔箴宝玉，俏平儿软语救贾琏。", "s": "（《红楼梦》）", "ch": "Z"}, {"w": "臻", "p": "zhēn", "d": "至、到", "e": "舟车所臻，足迹所及，莫不被泽。", "s": "（《盐 铁论》）", "ch": "Z"}, {"w": "振", "p": "zhèn", "d": "挥动、抖动", "e": "奋六世之余烈，振长策而御宇内。", "s": "（《过 秦论》）", "ch": "Z"}, {"w": "振", "p": "zhèn", "d": "奋起、振作", "e": "虫暴怒，直奔，遂相腾击，振奋作声。", "s": "（《促织》）", "ch": "Z"}, {"w": "振", "p": "zhèn", "d": "同“震”，震动、威震", "e": "虽董之以严刑，振之以威怒。", "s": "（《谏太宗十思疏》）", "ch": "Z"}, {"w": "振", "p": "zhèn", "d": "同“赈”，救济", "e": "哀鳏寡，恤孤独，振困穷，补不足。", "s": "（《赵威后问齐使》）", "ch": "Z"}, {"w": "知", "p": "zhī", "d": "主持、掌管", "e": "考功郎中、知制诰韩愈记。", "s": "（《蓝田 县丞厅壁记》）", "ch": "Z"}, {"w": "知", "p": "zhī", "d": "同“智”，智慧、聪明", "e": "知者乐水，仁者乐山。", "s": "（《诸 子喻山水》）", "ch": "Z"}, {"w": "知", "p": "zhī", "d": "知道、了解、懂得、认识等", "e": "斩将，刈旗，令诸君知 天亡我。", "s": "（《垓下之围》）", "ch": "Z"}, {"w": "直", "p": "zhí", "d": "同“值”，逢、遇到", "e": "以为己生岁直子，鼠，子神也。", "s": "（《永某氏之鼠》）", "ch": "Z"}, {"w": "直", "p": "zhí", "d": "同“值”，价钱、价值、报酬", "e": "昂其直，居为奇货。", "s": "（《促织》）", "ch": "Z"}, {"w": "直", "p": "zhí", "d": "只、只是", "e": "寡人非能好先王之乐也，直好世俗之乐耳。", "s": "（《庄暴见孟子》）", "ch": "Z"}, {"w": "直", "p": "zhí", "d": "径直、一直", "e": "虫暴怒，直奔，遂相腾击。", "s": "（《促织》）", "ch": "Z"}, {"w": "直", "p": "zhí", "d": "正、正直", "e": "淮西寓军帅尹少荣，刚直士也。", "s": "（《段 太尉逸事状》）", "ch": "Z"}, {"w": "值", "p": "zhí", "d": "遇、遇到、逢", "e": "值花朝，曾乃造访。", "s": "（《黄英》）", "ch": "Z"}, {"w": "值", "p": "zhí", "d": "价钱、价值、报酬", "e": "今受其值怠其事者，天下皆然。", "s": "（《送薛存义之任序》）", "ch": "Z"}, {"w": "絷", "p": "zhí", "d": "拴、绑", "e": "言授之絷，以絷其马。", "s": "（《诗经 有客》）", "ch": "Z"}, {"w": "絷", "p": "zhí", "d": "拘囚", "e": "昔萧樊囚絷，韩彭菹醢。", "s": "（《答苏武书》）", "ch": "Z"}, {"w": "旨", "p": "zhǐ", "d": "味美", "e": "虽有佳肴，弗食，不知其旨也。", "s": "（《礼记 学 记》）", "ch": "Z"}, {"w": "旨", "p": "zhǐ", "d": "美、美好", "e": "我有旨酒，以燕乐嘉宾之心。", "s": "（《诗经 鹿鸣》）", "ch": "Z"}, {"w": "旨", "p": "zhǐ", "d": "意旨、意思", "e": "其旨远，其辞文。", "s": "（《周易 系辞下》）", "ch": "Z"}, {"w": "志", "p": "zhì", "d": "记、记住", "e": "父子俱好古，博闻强志，过绝于人。", "s": "（《汉 书 楚元王传》）", "ch": "Z"}, {"w": "志", "p": "zhì", "d": "记述、记载", "e": "《聊斋志异》", "s": "", "ch": "Z"}, {"w": "志", "p": "zhì", "d": "标志、标记", "e": "吾归破贼，必灭贺兰，此矢所以志也。", "s": "（《张中丞传后叙》）", "ch": "Z"}, {"w": "志", "p": "zhì", "d": "心意、志向", "e": "董生举进士，连不得志于有司。", "s": "（《送 董邵南序》）", "ch": "Z"}, {"w": "志", "p": "zhì",
